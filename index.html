<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentry OS | V80 Tiled Intel</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --neon: #00ffcc; --bg: #000808; }
        body { margin: 0; background: var(--bg); overflow: hidden; font-family: 'Courier New', monospace; }
        
        /* Hidden Buffer for the 9-Tile Map Engine */
        #map-tiles { position: absolute; top: -9999px; display: grid; grid-template-columns: repeat(3, 512px); }
        .tile-buffer { width: 512px; height: 512px; visibility: hidden; }

        .panel { border: 1px solid var(--neon); backdrop-filter: blur(8px); background: rgba(0, 10, 10, 0.9); position: absolute; z-index: 100; }
        #hud { top: 20px; left: 20px; padding: 15px; width: 320px; border-top: 4px solid var(--neon); }
        .telemetry { font-size: 10px; color: var(--neon); margin-top: 10px; border-top: 1px solid #003333; padding-top: 5px; }
    </style>
</head>
<body>

<div id="hud" class="panel">
    <div style="font-weight: bold; letter-spacing: 2px;">AEGIS_TILED_V80</div>
    <div class="telemetry">
        INTEL_ARRAY: 3x3_ACTIVE<br>
        LABELS: STREETS/BUILDINGS/STORES<br>
        STATUS: STABLE_PROJECTION
    </div>
</div>

<div id="map-tiles">
    <div id="t1" class="tile-buffer"></div><div id="t2" class="tile-buffer"></div><div id="t3" class="tile-buffer"></div>
    <div id="t4" class="tile-buffer"></div><div id="t5" class="tile-buffer"></div><div id="t6" class="tile-buffer"></div>
    <div id="t7" class="tile-buffer"></div><div id="t8" class="tile-buffer"></div><div id="t9" class="tile-buffer"></div>
</div>

<script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 1, 20000);
    camera.position.set(1200, 1200, 1200);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    
    // --- LEAFLET TILE ENGINE ---
    const tileMaps = [];
    const tileTextures = [];
    const tileSize = 1000; // Physical size in 3D space

    for(let i=1; i<=9; i++) {
        const lMap = L.map(`t${i}`, { zoomControl: false, attributionControl: false }).setView([26.2750, -81.6881], 19);
        
        // Base Dark Map + High-Contrast Labels
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(lMap);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png').addTo(lMap);
        
        tileMaps.push(lMap);

        // Create 3D Tile
        const canvas = document.createElement('canvas');
        canvas.width = 512; canvas.height = 512;
        const tex = new THREE.CanvasTexture(canvas);
        tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
        tileTextures.push(tex);

        const material = new THREE.MeshBasicMaterial({ map: tex, transparent: true, opacity: 0.85 });
        const geometry = new THREE.PlaneGeometry(tileSize, tileSize);
        const mesh = new THREE.Mesh(geometry, material);
        
        // Arrange in 3x3 Grid
        const col = (i-1) % 3;
        const row = Math.floor((i-1) / 3);
        mesh.position.set((col - 1) * tileSize, 0, (row - 1) * tileSize);
        mesh.rotation.x = -Math.PI / 2;
        scene.add(mesh);
    }

    // --- GEOLOCATION SYNC ---
    function updateTiledIntel(lat, lon) {
        // Offset each tile so the center tile (t5) is your exact location
        const offset = 0.001; // Roughly the distance between panels
        tileMaps.forEach((m, idx) => {
            const col = (idx % 3) - 1;
            const row = Math.floor(idx / 3) - 1;
            m.setView([lat - (row * offset), lon + (col * offset)], 19);
        });
    }

    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
            updateTiledIntel(pos.coords.latitude, pos.coords.longitude);
        });
    }

    // Animation Loop with Texture Capture
    function animate() {
        requestAnimationFrame(animate);
        
        // Capture Leaflet frames into Three.js
        tileMaps.forEach((m, idx) => {
            // Note: In a browser environment, we'd use a canvas-based tile provider 
            // to pipe directly to the WebGL texture.
            tileTextures[idx].needsUpdate = true;
        });

        controls.update();
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
