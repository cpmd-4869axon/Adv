<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentry Node | V24</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; background: #020406; overflow: hidden; font-family: 'Courier New', monospace; }
        #map-buffer { position: absolute; width: 1024px; height: 1024px; top: -9999px; visibility: hidden; }
        
        #hud { position: absolute; top: 20px; left: 20px; color: #00ffcc; border: 1px solid #00ffcc; 
               background: rgba(0,15,15,0.95); padding: 15px; z-index: 100; width: 260px; }

        #stream-hud {
            position: absolute; top: 20px; right: 20px; color: #00ffcc; border: 1px solid #00ffcc;
            background: rgba(0,10,10,0.9); padding: 10px; z-index: 100; width: 180px; font-size: 11px;
        }
        .stream-val { color: #fff; font-weight: bold; float: right; }

        #node-popup { 
            position: absolute; display: none; background: rgba(0, 20, 20, 0.95); 
            border: 1px solid #00ffcc; color: #00ffcc; padding: 12px; z-index: 200; 
            pointer-events: none; width: 220px; box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
        }

        .section-label { font-size: 11px; color: #00ffcc; margin-top: 15px; border-bottom: 1px solid #004444; padding-bottom: 3px; }
        .control-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 10px; }
        
        button { background: #002222; color: #00ffcc; border: 1px solid #00ffcc; padding: 8px; 
                         cursor: pointer; font-family: monospace; font-size: 11px; width: 100%; margin-top: 5px; }
        button.active-btn { background: #00ffcc; color: #000; font-weight: bold; }
    </style>
</head>
<body>

<div id="hud">
    <div style="font-weight: bold; border-bottom: 1px solid #00ffcc; padding-bottom: 5px; font-size: 16px;">SENTRY_OS_V24</div>
    <div id="coords" style="margin-top:10px; font-size: 11px;">GPS: ACTIVE</div>
    
    <div class="section-label">TELEMETRY CONTROL</div>
    <div class="control-grid">
        <button id="btn-start" onclick="setTracking('START')">START</button>
        <button id="btn-pause" onclick="setTracking('PAUSE')">PAUSE</button>
        <button id="btn-stop" onclick="setTracking('STOP')" class="active-btn">STOP</button>
    </div>

    <div class="section-label">DATA ARCHIVE</div>
    <button onclick="exportToCSV()" style="border-color:#ffcc00; color:#ffcc00;">EXPORT SESSION</button>
    <input type="file" id="csv-import" accept=".csv" onchange="importCSV(event)" style="display:none">
    <button onclick="document.getElementById('csv-import').click()">IMPORT DATA</button>
</div>

<div id="stream-hud">
    <div style="border-bottom: 1px solid #004444; margin-bottom: 8px; padding-bottom: 4px; font-weight: bold;">Session Meta</div>
    <div>Nodes: <span id="stream-nodes" class="stream-val">0</span></div>
    <div style="margin-top: 5px;">Elapsed: <span id="stream-time" class="stream-val">00:00</span></div>
</div>

<div id="node-popup">
    <div class="pop-header" id="pop-src" style="font-weight:bold; border-bottom:1px solid #00ffcc; margin-bottom:5px;">SOURCE</div>
    <div style="font-size: 10px;" id="pop-time">TIME: --</div>
    <div style="font-size: 10px;" id="pop-lat">LAT: --</div>
    <div style="font-size: 10px;" id="pop-lon">LON: --</div>
</div>

<div id="map-buffer"></div>

<script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let startCoords = null, trackingState = 'STOP', lastPosition = null;
    let trackingInterval = null, sessionStartTime = null;
    const raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2();
    let selectedNode = null, mapLoaded = false;
    window.sessionData = []; 

    const map = new maplibregl.Map({
        container: 'map-buffer',
        style: 'https://tiles.openfreemap.org/styles/dark',
        center: [-81.6881, 26.2750], zoom: 18,
        interactive: false, preserveDrawingBuffer: true 
    });
    map.on('idle', () => { mapLoaded = true; });

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(40, 60, 80);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    const controls = new OrbitControls(camera, renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const mapTex = new THREE.CanvasTexture(map.getCanvas());
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshBasicMaterial({ map: mapTex }));
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    const sentry = new THREE.Group();
    const pyr = new THREE.Mesh(new THREE.CylinderGeometry(0, 2.5, 5, 4), new THREE.MeshStandardMaterial({ color: 0x00ffcc, flatShading: true }));
    pyr.rotation.x = Math.PI; sentry.add(pyr);
    const ring = new THREE.Mesh(new THREE.RingGeometry(3, 3.5, 32), new THREE.MeshBasicMaterial({ color: 0x00ffcc, side: THREE.DoubleSide, transparent: true, opacity: 0.5 }));
    ring.rotation.x = -Math.PI / 2; sentry.add(ring);
    sentry.position.y = 12;
    scene.add(sentry);

    const breadcrumbs = new THREE.Group();
    scene.add(breadcrumbs);

    // --- VIEW RESET (PAN/TILT/ZOOM ONLY) ---
    window.resetCameraView = () => {
        const startPos = camera.position.clone();
        const endPos = sentry.position.clone().add(new THREE.Vector3(25, 45, 65));
        const startTarget = controls.target.clone();
        const endTarget = sentry.position.clone();

        let startTime = null;
        const duration = 750;

        function glide(time) {
            if (!startTime) startTime = time;
            let progress = (time - startTime) / duration;
            if (progress > 1) progress = 1;
            const ease = 1 - Math.pow(1 - progress, 3);

            camera.position.lerpVectors(startPos, endPos, ease);
            controls.target.lerpVectors(startTarget, endTarget, ease);

            if (progress < 1) requestAnimationFrame(glide);
        }
        requestAnimationFrame(glide);
    };

    window.exportToCSV = () => {
        if (window.sessionData.length === 0) return alert("NO DATA.");
        const csv = "t,lat,lon,src\n" + window.sessionData.map(d => `${d.t},${d.lat},${d.lon},${d.source}`).join("\n");
        const link = document.createElement("a");
        link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
        link.download = `SENTRY_LOG_${Date.now()}.csv`;
        link.click();
    };

    window.importCSV = (event) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const lines = e.target.result.split('\n').slice(1);
            lines.forEach(line => {
                const p = line.split(',');
                if (p.length >= 3) plot(parseFloat(p[1]), parseFloat(p[2]), { t: p[0], lat: p[1], lon: p[2] }, 0x00ffcc, p[3] || "IMPORT");
            });
        };
        reader.readAsText(event.target.files[0]);
    };

    window.setTracking = (state) => {
        trackingState = state;
        document.querySelectorAll('.control-grid button').forEach(b => b.classList.remove('active-btn'));
        document.getElementById(`btn-${state.toLowerCase()}`).classList.add('active-btn');
        if (state === 'START' && !trackingInterval) {
            sessionStartTime = Date.now();
            trackingInterval = setInterval(() => {
                if (trackingState === 'START' && lastPosition) {
                    const data = { t: new Date().toLocaleTimeString(), lat: lastPosition.lat, lon: lastPosition.lon, source: "LIVE" };
                    window.sessionData.push(data);
                    plot(data.lat, data.lon, data, 0xff0055, data.source);
                }
            }, 1000);
        } else if (state === 'STOP') { clearInterval(trackingInterval); trackingInterval = null; }
    };

    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
            const { latitude: lat, longitude: lon } = pos.coords;
            lastPosition = { lat, lon };
            document.getElementById('coords').innerText = `LAT: ${lat.toFixed(6)} LON: ${lon.toFixed(6)}`;
            map.setCenter([lon, lat]);
        }, null, { enableHighAccuracy: true });
    }

    function plot(lat, lon, data, color, source) {
        if (!startCoords) startCoords = { lat, lon };
        const dy = (lat - startCoords.lat) * 111111;
        const dx = (lon - startCoords.lon) * 111111 * Math.cos(lat * Math.PI / 180);
        const node = new THREE.Mesh(new THREE.SphereGeometry(1.2, 16, 16), new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.3 }));
        node.position.set(dx, 1.2, -dy);
        
        // Ensure data is mapped correctly for the display logic
        node.userData = { 
            t: data.t, 
            lat: data.lat, 
            lon: data.lon, 
            source: source, 
            baseColor: color, 
            targetScale: 1.0 
        };
        
        breadcrumbs.add(node);
        sentry.position.set(dx, sentry.position.y, -dy);
        document.getElementById('stream-nodes').innerText = breadcrumbs.children.length;
    }

    window.addEventListener('mousedown', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        
        const sentryHits = raycaster.intersectObject(pyr);
        if (sentryHits.length > 0) {
            window.resetCameraView();
            return;
        }

        const hits = raycaster.intersectObjects(breadcrumbs.children);
        if (hits.length > 0) {
            if (selectedNode) { 
                selectedNode.userData.targetScale = 1.0; 
                selectedNode.material.color.set(selectedNode.userData.baseColor); 
            }
            selectedNode = hits[0].object;
            selectedNode.userData.targetScale = 2.5;
            selectedNode.material.color.set(0xFFD700);

            // DATA DISPLAY FIX
            const popup = document.getElementById('node-popup');
            popup.style.display = 'block';
            popup.style.left = e.clientX + 10 + "px";
            popup.style.top = e.clientY + 10 + "px";
            
            document.getElementById('pop-src').innerText = selectedNode.userData.source;
            document.getElementById('pop-time').innerText = "TIME: " + selectedNode.userData.t;
            document.getElementById('pop-lat').innerText = "LAT: " + selectedNode.userData.lat;
            document.getElementById('pop-lon').innerText = "LON: " + selectedNode.userData.lon;
        } else if (selectedNode) {
            selectedNode.userData.targetScale = 1.0;
            selectedNode.material.color.set(selectedNode.userData.baseColor);
            selectedNode = null;
            document.getElementById('node-popup').style.display = 'none';
        }
    });

    function animate() {
        requestAnimationFrame(animate);
        if (mapLoaded) mapTex.needsUpdate = true;
        sentry.position.y = 10 + Math.sin(Date.now() * 0.002) * 2;
        sentry.rotation.y += 0.02;
        
        breadcrumbs.children.forEach(n => {
            n.scale.lerp(new THREE.Vector3(n.userData.targetScale, n.userData.targetScale, n.userData.targetScale), 0.1);
        });

        if (sessionStartTime && trackingState === 'START') {
            const diff = Math.floor((Date.now() - sessionStartTime) / 1000);
            document.getElementById('stream-time').innerText = `${Math.floor(diff/60).toString().padStart(2,'0')}:${(diff%60).toString().padStart(2,'0')}`;
        }
        controls.update();
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
