<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentry Node | Telemetry Control</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; background: #020406; overflow: hidden; font-family: 'Courier New', monospace; }
        #map-buffer { position: absolute; width: 1024px; height: 1024px; top: -9999px; visibility: hidden; }
        
        #hud { position: absolute; top: 20px; left: 20px; color: #00ffcc; border: 1px solid #00ffcc; 
               background: rgba(0,15,15,0.95); padding: 15px; z-index: 100; width: 260px; max-height: 85vh; overflow-y: auto; }

        #node-popup { 
            position: absolute; display: none; background: rgba(0, 30, 30, 0.95); 
            border: 2px solid #00ffcc; color: #00ffcc; padding: 18px; 
            z-index: 200; pointer-events: none; border-radius: 4px;
            min-width: 240px; box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
        }
        #node-popup div { font-size: 14px; margin-bottom: 6px; line-height: 1.4; }

        .section-label { font-size: 11px; color: #00ffcc; margin-top: 15px; border-bottom: 1px solid #004444; padding-bottom: 3px; letter-spacing: 1px; }
        .control-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 10px; }
        
        button, input[type="file"] { background: #002222; color: #00ffcc; border: 1px solid #00ffcc; padding: 8px; 
                         cursor: pointer; font-family: monospace; font-size: 11px; margin-top: 8px; width: 100%; transition: 0.3s; }
        button:hover { background: #004444; }
        button.active-btn { background: #00ffcc; color: #000; }
    </style>
</head>
<body>

<div id="hud">
    <div style="font-weight: bold; border-bottom: 1px solid #00ffcc; padding-bottom: 5px; font-size: 16px;">SENTRY_OS_V12</div>
    <div id="coords" style="margin-top:10px; font-size: 12px;">SYSTEM_IDLE</div>
    
    <div class="section-label">TELEMETRY CONTROL</div>
    <div class="control-grid">
        <button id="btn-start" onclick="setTracking('START')">START</button>
        <button id="btn-pause" onclick="setTracking('PAUSE')">PAUSE</button>
        <button id="btn-stop" onclick="setTracking('STOP')" class="active-btn">STOP</button>
    </div>

    <div class="section-label">DATA UPLOAD</div>
    <input type="file" id="csv-upload" multiple accept=".csv" onchange="handleImport(event)">
</div>

<div id="node-popup">
    <div id="pop-src" style="font-weight:bold; color:#fff; border-bottom:1px solid #00ffcc; padding-bottom:4px; margin-bottom:10px;">SRC: --</div>
    <div id="pop-time">TIME: --</div>
    <div id="pop-lat">LAT: --</div>
    <div id="pop-lon">LON: --</div>
</div>

<div id="map-buffer"></div>

<script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let startCoords = null;
    let lastLoggedTime = 0;
    let trackingState = 'STOP'; // START, PAUSE, STOP
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let zoomTarget = null;
    let mapLoaded = false;
    let animatedNodes = [];

    const PALETTE = [0x00ffcc, 0xffff00, 0xff00ff, 0x00aaff, 0xff8800];
    let colorIndex = 0;

    // --- 1. MAP ---
    const map = new maplibregl.Map({
        container: 'map-buffer',
        style: 'https://tiles.openfreemap.org/styles/dark',
        center: [-81.6881, 26.2750], zoom: 18,
        interactive: false, preserveDrawingBuffer: true 
    });
    map.on('idle', () => { mapLoaded = true; });

    // --- 2. THREE SCENE ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(40, 60, 80);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    const controls = new OrbitControls(camera, renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const mapTex = new THREE.CanvasTexture(map.getCanvas());
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshBasicMaterial({ map: mapTex }));
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    const sentry = new THREE.Group();
    const pyr = new THREE.Mesh(new THREE.CylinderGeometry(0, 2.5, 5, 4), new THREE.MeshStandardMaterial({ color: 0x00ffcc, flatShading: true }));
    pyr.rotation.x = Math.PI; sentry.add(pyr);
    const ring = new THREE.Mesh(new THREE.RingGeometry(3, 3.8, 64), new THREE.MeshBasicMaterial({ color: 0x00ffcc, transparent: true, side: THREE.DoubleSide }));
    ring.rotation.x = -Math.PI / 2; sentry.add(ring);
    scene.add(sentry);

    const breadcrumbs = new THREE.Group();
    scene.add(breadcrumbs);

    // --- 3. TRACKING LOGIC ---
    window.setTracking = (state) => {
        trackingState = state;
        document.querySelectorAll('.control-grid button').forEach(b => b.classList.remove('active-btn'));
        document.getElementById(`btn-${state.toLowerCase()}`).classList.add('active-btn');
        if(state === 'STOP') {
            document.getElementById('coords').innerText = "SYSTEM_IDLE";
        }
    };

    function plot(lat, lon, data, color, source) {
        if (!startCoords) startCoords = { lat, lon };
        const dy = (lat - startCoords.lat) * 111111;
        const dx = (lon - startCoords.lon) * 111111 * Math.cos(lat * Math.PI / 180);
        
        const mat = new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.2 });
        const node = new THREE.Mesh(new THREE.SphereGeometry(1.0, 16, 16), mat);
        node.position.set(dx, 1.0, -dy);
        node.userData = { ...data, source, color, transitioning: false };
        breadcrumbs.add(node);
    }

    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
            if (trackingState === 'STOP') return;
            const { latitude: lat, longitude: lon } = pos.coords;
            map.setCenter([lon, lat]);
            document.getElementById('coords').innerText = `LAT: ${lat.toFixed(6)} LON: ${lon.toFixed(6)}`;
            
            if (trackingState === 'START' && Date.now() - lastLoggedTime > 2000) {
                lastLoggedTime = Date.now();
                plot(lat, lon, { t: new Date().toLocaleTimeString(), lat, lon }, 0xff0055, "LIVE SESSION");
            }
        });
    }

    window.handleImport = async (e) => {
        for (let file of e.target.files) {
            const text = await file.text();
            const color = PALETTE[colorIndex++ % PALETTE.length];
            text.split('\n').slice(1).forEach(line => {
                const p = line.split(',');
                if (p.length >= 3) plot(parseFloat(p[1]), parseFloat(p[2]), { t: p[0], lat: p[1], lon: p[2] }, color, file.name);
            });
        }
    };

    // --- 4. INTERACTION ---
    window.addEventListener('mousedown', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObjects(breadcrumbs.children);
        const pop = document.getElementById('node-popup');

        if (hits.length > 0) {
            const node = hits[0].object;
            pop.style.display = 'block';
            pop.style.left = Math.min(e.clientX + 20, window.innerWidth - 260) + 'px';
            pop.style.top = Math.min(e.clientY + 20, window.innerHeight - 220) + 'px';
            document.getElementById('pop-src').innerText = `SRC: ${node.userData.source}`;
            document.getElementById('pop-time').innerText = `TIME: ${node.userData.t}`;
            document.getElementById('pop-lat').innerText = `LAT: ${parseFloat(node.userData.lat).toFixed(6)}`;
            document.getElementById('pop-lon').innerText = `LON: ${parseFloat(node.userData.lon).toFixed(6)}`;
            zoomTarget = node.position.clone().add(new THREE.Vector3(12, 18, 18));

            // Anime: Shrink + Wireframe
            if (!node.userData.transitioning) {
                node.userData.transitioning = true;
                node.material.wireframe = true;
                animatedNodes.push(node);
            }
        } else {
            pop.style.display = 'none';
            zoomTarget = null;
        }
    });

    function animate() {
        requestAnimationFrame(animate);
        if (mapLoaded) mapTex.needsUpdate = true;
        const t = Date.now() * 0.001;
        
        sentry.position.y = 3.5 + Math.sin(t * 2.5) * 1.0;
        sentry.rotation.y += 0.01;
        const pulse = (Math.sin(t * 4) + 1) / 2;
        ring.scale.set(0.5 + pulse * 2.5, 0.5 + pulse * 2.5, 1);
        ring.material.opacity = 1 - pulse;

        animatedNodes.forEach((node, idx) => {
            if (node.scale.x > 0.6) {
                node.scale.multiplyScalar(0.95);
            } else {
                animatedNodes.splice(idx, 1);
            }
        });

        if (zoomTarget) {
            camera.position.lerp(zoomTarget, 0.07);
            controls.target.lerp(zoomTarget.clone().sub(new THREE.Vector3(12,18,18)), 0.07);
        }
        controls.update();
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
