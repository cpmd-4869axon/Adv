<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentry Node: Synced Tactical Map</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; }
        #map-buffer { position: absolute; width: 1024px; height: 1024px; top: -5000px; }
        #hud { position: absolute; top: 20px; left: 20px; color: #00ffcc; border: 1px solid #00ffcc; 
               background: rgba(0,20,10,0.8); padding: 10px; z-index: 10; pointer-events: none; }
    </style>
</head>
<body>

<div id="hud">
    <div>SYSTEM: ACTIVE_SENTRY_NODE</div>
    <div id="status">SYNCING GEOSPATIAL DATA...</div>
</div>
<div id="map-buffer"></div>

<script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // 1. MAP BUFFER (The "Floor" Data)
    const map = new maplibregl.Map({
        container: 'map-buffer',
        style: 'https://demotiles.maplibre.org/style.json',
        center: [-81.6881, 26.2750], // Naples, FL area
        zoom: 16,
        interactive: false,
        preserveDrawingBuffer: true // CRITICAL: Allows Three.js to read the pixels
    });

    // 2. THREE.JS SCENE
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 10, 15);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);

    // 3. THE SYNCED FLOOR
    const texture = new THREE.CanvasTexture(map.getCanvas());
    texture.minFilter = THREE.LinearFilter;
    texture.magFilter = THREE.LinearFilter;
    // Set texture to repeat so we can "scroll" the floor
    texture.wrapS = THREE.RepeatWrapping;
    texture.wrapT = THREE.RepeatWrapping;

    const floorGeometry = new THREE.PlaneGeometry(100, 100);
    const floorMaterial = new THREE.MeshBasicMaterial({ map: texture });
    const floor = new THREE.Mesh(floorGeometry, floorMaterial);
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // 4. DATA POINT (The Sentry)
    const sentry = new THREE.Group();
    sentry.add(new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshBasicMaterial({color: 0x00ffcc})));
    scene.add(sentry);

    // 5. THE SYNC LOGIC
    function syncMapWithData(deltaX, deltaY) {
        // Move the floor texture UVs in sync with data movement
        // If data moves "Right" (+X), floor texture must move "Left"
        texture.offset.x += deltaX;
        texture.offset.y += deltaY;
        
        // Update HUD
        document.getElementById('status').innerText = `X-OFFSET: ${texture.offset.x.toFixed(4)}`;
    }

    // Capture GPS to move map
    if ("geolocation" in navigator) {
        navigator.geolocation.watchPosition(pos => {
            map.setCenter([pos.coords.longitude, pos.coords.latitude]);
            texture.needsUpdate = true; // Refresh texture from map canvas
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        
        // Constant refresh of the map canvas onto the 3D plane
        if (map.loaded()) {
            texture.needsUpdate = true;
        }

        controls.update();
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
