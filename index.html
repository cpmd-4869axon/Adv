<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentry OS | V40 Spatial Intel</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        :root { --neon: #00ffcc; --warning: #ffcc00; --danger: #ff3300; --bg: #000808; }
        body { margin: 0; background: var(--bg); overflow: hidden; font-family: 'Segoe UI', 'Courier New', monospace; color: var(--neon); }
        #map-buffer { position: absolute; width: 1024px; height: 1024px; top: -9999px; visibility: hidden; }
        
        /* HUD Advanced Styling */
        .glass { background: rgba(0, 20, 20, 0.85); backdrop-filter: blur(10px); border: 1px solid var(--neon); box-shadow: 0 0 20px rgba(0, 255, 204, 0.2); }
        #hud { position: absolute; top: 20px; left: 20px; padding: 20px; z-index: 100; width: 300px; border-radius: 4px 20px 4px 20px; border-left: 4px solid var(--neon); }
        #stream-hud { position: absolute; top: 20px; right: 20px; padding: 15px; z-index: 100; width: 220px; font-size: 11px; border-radius: 4px; }
        
        #node-terminal { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: none; 
            padding: 25px; z-index: 200; width: 500px; border-bottom: 4px solid var(--warning);
        }

        .status-tag { font-size: 9px; padding: 2px 6px; background: var(--neon); color: #000; font-weight: bold; margin-left: 10px; border-radius: 2px; }
        .control-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 15px; }
        button { background: rgba(0, 40, 40, 0.5); color: var(--neon); border: 1px solid #005555; padding: 12px; cursor: pointer; font-family: inherit; font-size: 11px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        button:hover { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }
        .active-btn { background: var(--neon) !important; color: #000 !important; font-weight: bold; }
        
        #compass-container { position: relative; width: 60px; height: 60px; margin: 10px auto; border: 2px solid #003333; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        #compass-arrow { font-size: 24px; transition: transform 0.1s; color: var(--warning); }
    </style>
</head>
<body>

<div id="hud" class="glass">
    <div style="display:flex; align-items:center; justify-content:space-between;">
        <span style="font-weight: bold; font-size: 20px; letter-spacing: 3px;">SENTRY_V40</span>
        <span class="status-tag" id="main-status">STANDBY</span>
    </div>
    <div id="coords" style="margin-top:12px; font-size: 10px; color: #00cccc; border-top: 1px solid #003333; padding-top: 8px;">SIGNAL_ACQUISITION_REQ...</div>
    
    <div id="compass-container"><div id="compass-arrow">↑</div></div>
    
    <div class="control-grid">
        <button id="btn-start" onclick="setTracking('START')">ENGAGE</button>
        <button id="btn-pause" onclick="setTracking('PAUSE')">HOLD</button>
        <button id="btn-stop" onclick="setTracking('STOP')" class="active-btn">DISENGAGE</button>
    </div>
</div>

<div id="stream-hud" class="glass">
    <div style="color:var(--neon); border-bottom:1px solid #004444; margin-bottom:10px; font-weight:bold; letter-spacing: 1px;">ENVIRONMENT_INTEL</div>
    <div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>NODES:</span> <span id="stream-nodes" style="color:#fff">0</span></div>
    <div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>UPTIME:</span> <span id="uptime" style="color:#fff">00:00</span></div>
    <div style="display:flex; justify-content:space-between;"><span>SHADOWS:</span> <span style="color:var(--neon)">RAY_TRACED</span></div>
</div>

<div id="node-terminal" class="glass">
    <div style="font-size:14px; font-weight:bold; margin-bottom:15px; color:var(--warning); display:flex; justify-content:space-between;">
        <span>NODE_INTERROGATION</span>
        <span id="term-id" style="font-size:10px; color:#aaa;">#ID_NULL</span>
    </div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div id="node-stats-l"></div>
        <div id="node-stats-r"></div>
    </div>
</div>

<div id="map-buffer"></div>

<script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- SYSTEM STATE ---
    let startCoords = null, trackingState = 'STOP', lastPosition = null;
    let trackingInterval = null, mapLoaded = false, startTime = null;
    const raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2();
    let selectedNode = null;
    window.sessionData = [];

    // --- MAP ENGINE ---
    const map = new maplibregl.Map({
        container: 'map-buffer',
        style: 'https://tiles.openfreemap.org/styles/dark',
        center: [-81.6881, 26.2750], zoom: 19, interactive: false, preserveDrawingBuffer: true 
    });
    map.on('idle', () => { mapLoaded = true; });

    // --- THREE.JS ADVANCED RENDERER ---
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000808, 0.002);
    
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 5000);
    camera.position.set(120, 150, 120);

    const renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.04;
    controls.maxPolarAngle = Math.PI / 2.1;

    // --- ADVANCED LIGHTING (SHADOW ENABLED) ---
    scene.add(new THREE.AmbientLight(0x00ffff, 0.2));
    
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(100, 300, 100);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    dirLight.shadow.camera.left = -500;
    dirLight.shadow.camera.right = 500;
    dirLight.shadow.camera.top = 500;
    dirLight.shadow.camera.bottom = -500;
    scene.add(dirLight);

    const spot = new THREE.SpotLight(0x00ffcc, 10, 400, 0.45, 0.3, 1);
    spot.position.set(0, 150, 0);
    spot.castShadow = true;
    scene.add(spot);

    // --- GRID & GROUND ---
    const grid = new THREE.GridHelper(3000, 60, 0x004444, 0x001a1a);
    scene.add(grid);

    const mapTex = new THREE.CanvasTexture(map.getCanvas());
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(2000, 2000), 
        new THREE.MeshStandardMaterial({ map: mapTex, roughness: 0.7, metalness: 0.2 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // --- SENTRY ENTITY ---
    const sentry = new THREE.Group();
    const body = new THREE.Mesh(
        new THREE.CylinderGeometry(0, 6, 12, 4), 
        new THREE.MeshStandardMaterial({ color: 0x00ffcc, emissive: 0x00ffcc, emissiveIntensity: 2 })
    );
    body.rotation.x = Math.PI;
    body.castShadow = true;
    
    const ring = new THREE.Mesh(
        new THREE.TorusGeometry(8, 0.5, 16, 32),
        new THREE.MeshBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.5 })
    );
    ring.rotation.x = Math.PI/2;
    
    sentry.add(body, ring);
    sentry.position.y = 18;
    scene.add(sentry);

    const breadcrumbs = new THREE.Group();
    scene.add(breadcrumbs);

    // --- INTERFACE LOGIC ---
    function plot(lat, lon, data, color) {
        if (!startCoords) startCoords = { lat, lon };
        const z = -(lat - startCoords.lat) * 111111;
        const x = (lon - startCoords.lon) * 111111 * Math.cos(lat * Math.PI / 180);
        
        const node = new THREE.Mesh(
            new THREE.BoxGeometry(3, 3, 3), 
            new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 1 })
        );
        node.position.set(x, 1.5, z);
        node.userData = { ...data, targetScale: 1.0, originalColor: color };
        node.castShadow = true;
        breadcrumbs.add(node);
        
        // Dynamic Lighting Sync
        spot.position.set(x, 200, z);
        spot.target = sentry;
        document.getElementById('stream-nodes').innerText = breadcrumbs.children.length;
    }

    window.addEventListener('mousedown', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);

        const triHit = raycaster.intersectObject(body);
        if (triHit.length > 0) {
            // ADVANCED KINETIC RESET
            const targetPos = new THREE.Vector3(sentry.position.x, 0, sentry.position.z);
            const camTarget = new THREE.Vector3(sentry.position.x + 60, 80, sentry.position.z + 60);
            
            // Smooth LERP movement would go here, but manual snap for tactical speed
            controls.target.copy(targetPos);
            camera.position.copy(camTarget);
            controls.update();
            return;
        }

        const hits = raycaster.intersectObjects(breadcrumbs.children);
        if (hits.length > 0) {
            if (selectedNode) { selectedNode.userData.targetScale = 1.0; selectedNode.material.emissiveIntensity = 1; }
            selectedNode = hits[0].object;
            selectedNode.userData.targetScale = 4.0;
            selectedNode.material.emissiveIntensity = 10;
            
            document.getElementById('node-terminal').style.display = 'block';
            document.getElementById('term-id').innerText = `#NODE_${Math.floor(Math.random()*9000)+1000}`;
            document.getElementById('node-stats-l').innerHTML = `
                <div style="font-size:10px; color:#008888">LATITUDE</div><div style="color:#fff">${selectedNode.userData.lat.toFixed(6)}</div>
                <div style="font-size:10px; color:#008888; margin-top:10px">LONGITUDE</div><div style="color:#fff">${selectedNode.userData.lon.toFixed(6)}</div>
            `;
            document.getElementById('node-stats-r').innerHTML = `
                <div style="font-size:10px; color:#008888">TIMESTAMP</div><div style="color:#fff">${selectedNode.userData.t}</div>
                <div style="font-size:10px; color:#008888; margin-top:10px">VEC_SOURCE</div><div style="color:#fff">${selectedNode.userData.source}</div>
            `;
        } else {
            document.getElementById('node-terminal').style.display = 'none';
        }
    });

    window.setTracking = (state) => {
        trackingState = state;
        document.querySelectorAll('button').forEach(b => b.classList.remove('active-btn'));
        document.getElementById(`btn-${state.toLowerCase()}`).classList.add('active-btn');
        document.getElementById('main-status').innerText = state;
        
        if (state === 'START') {
            if (!startTime) startTime = Date.now();
            if (!trackingInterval) {
                trackingInterval = setInterval(() => {
                    if (trackingState === 'START' && lastPosition) {
                        const data = { t: new Date().toLocaleTimeString(), lat: lastPosition.lat, lon: lastPosition.lon, source: "RF_LINK" };
                        window.sessionData.push(data);
                        plot(data.lat, data.lon, data, 0xff3300);
                    }
                }, 1000);
            }
        }
    };

    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
            lastPosition = { lat: pos.coords.latitude, lon: pos.coords.longitude };
            document.getElementById('coords').innerText = `SAT_LOCK: ${lastPosition.lat.toFixed(5)} | ${lastPosition.lon.toFixed(5)}`;
            map.setCenter([lastPosition.lon, lastPosition.lat]);
            
            // Smoothed Sentry Movement
            if (startCoords) {
                const z = -(lastPosition.lat - startCoords.lat) * 111111;
                const x = (lastPosition.lon - startCoords.lon) * 111111 * Math.cos(lastPosition.lat * Math.PI / 180);
                sentry.position.x = x;
                sentry.position.z = z;
            }
        }, null, { enableHighAccuracy: true });
    }

    // --- RENDER LOOP ---
    function animate() {
        requestAnimationFrame(animate);
        if (mapLoaded) mapTex.needsUpdate = true;
        
        // Kinetic Animations
        sentry.rotation.y += 0.03;
        ring.rotation.z -= 0.05;
        sentry.position.y = 18 + Math.sin(Date.now() * 0.003) * 3;
        
        // HUD Updates
        if (startTime && trackingState === 'START') {
            const sec = Math.floor((Date.now() - startTime) / 1000);
            document.getElementById('uptime').innerText = `${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`;
        }

        // Compass Arrow
        const camDir = new THREE.Vector3();
        camera.getWorldDirection(camDir);
        const rotY = Math.atan2(camDir.x, camDir.z);
        document.getElementById('compass-arrow').style.transform = `rotate(${rotY}rad)`;

        breadcrumbs.children.forEach(n => {
            n.scale.lerp(new THREE.Vector3(n.userData.targetScale, n.userData.targetScale, n.userData.targetScale), 0.1);
            n.rotation.y += 0.02;
        });

        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
