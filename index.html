<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aegis Matrix | V90 Data Suite</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --neon: #00ffcc; --alert: #ff0055; --bg: #000808; }
        body { margin: 0; background: var(--bg); overflow: hidden; font-family: 'Courier New', monospace; }
        
        /* Tactical HUD */
        .hud-container {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            padding: 15px; border-left: 4px solid var(--neon);
            background: rgba(0, 15, 15, 0.85); color: var(--neon); pointer-events: none;
        }

        /* Command Console */
        .console {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: flex; gap: 10px; background: rgba(0, 5, 5, 0.9);
            padding: 10px; border: 1px solid #004444; border-radius: 5px;
        }
        button { 
            background: #001515; border: 1px solid var(--neon); color: var(--neon); 
            padding: 8px 15px; cursor: pointer; font-size: 10px; font-weight: bold;
            transition: 0.2s; text-transform: uppercase;
        }
        button:hover { background: var(--neon); color: #000; }
        .active { background: var(--alert) !important; color: white !important; border-color: white; }

        #map-engine { width: 1024px; height: 1024px; position: absolute; top: -9999px; }
        #file-input { display: none; }
    </style>
</head>
<body>

<div class="hud-container">
    <div style="font-weight: 900; letter-spacing: 3px;">AEGIS_MATRIX_V90</div>
    <div id="status-label" style="font-size: 10px; color: #aaa;">STATUS: IDLE</div>
    <div style="font-size: 10px; margin-top: 5px;">NODES_IN_SPHERE: <span id="node-count">0</span></div>
</div>

<div class="console">
    <button id="btn-start" onclick="setControl('START')">Start</button>
    <button id="btn-pause" onclick="setControl('PAUSE')">Pause</button>
    <button id="btn-stop" onclick="setControl('STOP')">Stop</button>
    <button onclick="document.getElementById('file-input').click()">Import CSV</button>
    <button onclick="exportData()">Export</button>
</div>

<input type="file" id="file-input" accept=".csv" onchange="importCSV(event)">
<div id="map-engine"></div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    let state = 'STOP';
    let dataPoints = [];
    const sphereNodes = new THREE.Group();
    
    // --- THREE.JS SETUP ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 15000);
    camera.position.set(1200, 1200, 1200);
    camera.lookAt(0,0,0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // --- LEAFLET 3x3 ENGINE ---
    const lMap = L.map('map-engine', { zoomControl: false, attributionControl: false, preferCanvas: true }).setView([26.2750, -81.6881], 18);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(lMap);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png').addTo(lMap);

    const mapCanvas = document.querySelector('#map-engine canvas');
    const mapTex = new THREE.CanvasTexture(mapCanvas);

    // Limited 3x3 Projection Floor
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(3000, 3000), // Scaled to represent a tight 3x3 area
        new THREE.MeshBasicMaterial({ map: mapTex, transparent: true, opacity: 0.9 })
    );
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // Grid Visualizer (3 divisions for the 3x3 look)
    const grid = new THREE.GridHelper(3000, 3, 0x00ffcc, 0x003333);
    scene.add(grid);

    // --- DATA SPHERE ---
    const dataSphere = new THREE.Group();
    const sphereWire = new THREE.Mesh(
        new THREE.SphereGeometry(200, 24, 24),
        new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: true, transparent: true, opacity: 0.1 })
    );
    dataSphere.add(sphereWire);
    dataSphere.add(sphereNodes);
    dataSphere.position.y = 200;
    scene.add(dataSphere);

    // --- CONTROL LOGIC ---
    window.setControl = (cmd) => {
        state = cmd;
        document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        if(cmd !== 'EXPORT') document.getElementById(`btn-${cmd.toLowerCase()}`).classList.add('active');
        document.getElementById('status-label').innerText = `STATUS: ${cmd}`;
    };

    // --- DATA HANDLING ---
    function plotNode(lat, lon) {
        dataPoints.push({ lat, lon, time: Date.now() });
        
        // Generate a 3D point inside the sphere
        const dot = new THREE.Mesh(
            new THREE.SphereGeometry(5, 8, 8),
            new THREE.MeshBasicMaterial({ color: 0xff0055 })
        );
        dot.position.set(
            (Math.random() - 0.5) * 150,
            (Math.random() - 0.5) * 150,
            (Math.random() - 0.5) * 150
        );
        sphereNodes.add(dot);
        document.getElementById('node-count').innerText = dataPoints.length;
        lMap.setView([lat, lon], 18);
    }

    window.importCSV = (event) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const lines = e.target.result.split('\n');
            lines.forEach(line => {
                const [lat, lon] = line.split(',');
                if(lat && lon) plotNode(parseFloat(lat), parseFloat(lon));
            });
            setControl('STOP');
        };
        reader.readAsText(event.target.files[0]);
    };

    window.exportData = () => {
        const csv = dataPoints.map(p => `${p.lat},${p.lon},${p.time}`).join('\n');
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `aegis_capture_${Date.now()}.csv`;
        a.click();
    };

    // --- GPS TRACKING ---
    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
            if(state === 'START') {
                plotNode(pos.coords.latitude, pos.coords.longitude);
            }
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        mapTex.needsUpdate = true;
        dataSphere.rotation.y += 0.005;
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
