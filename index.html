<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentry OS | V70 Aegis Prime</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        :root { --neon: #00ffcc; --warning: #ffcc00; --alert: #ff0055; --bg: #000808; }
        body { margin: 0; background: var(--bg); overflow: hidden; font-family: 'Courier New', monospace; color: var(--neon); }
        
        /* Tactical Scanning Overlay */
        body::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 1000; background-size: 100% 4px, 4px 100%; pointer-events: none;
        }

        #map-buffer { position: absolute; width: 1024px; height: 1024px; top: -9999px; visibility: hidden; }
        
        .panel { border: 1px solid var(--neon); backdrop-filter: blur(10px); background: rgba(0, 15, 15, 0.85); }
        #hud { position: absolute; top: 20px; left: 20px; padding: 20px; z-index: 100; width: 340px; border-left: 8px solid var(--neon); }
        
        #mini-map { position: absolute; bottom: 30px; right: 30px; width: 220px; height: 220px; z-index: 100; border: 2px solid var(--neon); border-radius: 12px; transform: rotate(-2deg); box-shadow: 0 0 20px var(--neon); }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 15px; }
        button { background: #001a1a; color: var(--neon); border: 1px solid var(--neon); padding: 12px; cursor: pointer; font-family: inherit; font-size: 11px; font-weight: bold; transition: 0.2s; text-transform: uppercase; }
        button:hover { background: var(--neon); color: #000; }
        .active-btn { background: var(--neon) !important; color: #000 !important; box-shadow: 0 0 15px var(--neon); }
        
        #compass { font-size: 48px; text-align: center; margin: 10px 0; color: var(--warning); text-shadow: 0 0 15px var(--warning); font-weight: bold; }
        .telemetry { font-size: 10px; border-top: 1px solid #004444; padding-top: 10px; margin-top: 10px; letter-spacing: 1px; }
    </style>
</head>
<body>

<div id="hud" class="panel">
    <div style="font-weight: bold; font-size: 22px; letter-spacing: 2px; color: white;">AEGIS_PRIME_V70</div>
    <div id="sys-loc" style="font-size: 10px; color: var(--neon); margin-top: 4px;">UPLINK_STATUS: CONNECTED</div>
    
    <div id="compass">N</div>
    
    <div class="btn-grid">
        <button id="btn-start" onclick="setTracking('START')">Engage</button>
        <button id="btn-pause" onclick="setTracking('PAUSE')">Hold</button>
        <button id="btn-stop" onclick="setTracking('STOP')" class="active-btn">Halt</button>
    </div>

    <div class="telemetry">
        <div style="display:flex; justify-content: space-between;">
            <span>VECTOR_PTS: <span id="node-count" style="color:white;">0</span></span>
            <span>PITCH_LOCK: <span id="cam-pitch" style="color:white;">45.0</span>°</span>
        </div>
        <div style="margin-top: 5px; color: #55aaaa;">SIG_STR: <span id="sig-str">98%</span> | LOAD: <span id="sys-load">4%</span></div>
    </div>
</div>

<div id="mini-map"></div>
<div id="map-buffer"></div>

<script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let startCoords = null, trackingState = 'STOP', lastPosition = null;
    let trackingInterval = null, mapLoaded = false;
    const raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2();
    let isTweening = false, pathPoints = [];
    
    const targetCamPos = new THREE.Vector3();
    const targetLookAt = new THREE.Vector3();

    // Mapbox/MapLibre Engine
    const map = new maplibregl.Map({
        container: 'map-buffer',
        style: 'https://tiles.openfreemap.org/styles/dark',
        center: [-81.6881, 26.2750], zoom: 19, interactive: false, preserveDrawingBuffer: true 
    });
    const miniMap = new maplibregl.Map({
        container: 'mini-map',
        style: 'https://tiles.openfreemap.org/styles/dark',
        center: [-81.6881, 26.2750], zoom: 16, interactive: false
    });
    map.on('idle', () => { mapLoaded = true; });

    // Scene Setup
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000808, 0.0006);
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 1, 12000);
    camera.position.set(600, 600, 600);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    scene.add(new THREE.AmbientLight(0x00ffff, 0.2));
    const mainLight = new THREE.PointLight(0x00ffcc, 800000, 2500);
    mainLight.position.set(0, 800, 0);
    scene.add(mainLight);

    // DUAL FLOOR SYSTEM
    // 1. Base Mesh (Physical Ground)
    const baseFloor = new THREE.Mesh(
        new THREE.PlaneGeometry(10000, 10000),
        new THREE.MeshStandardMaterial({ color: 0x000505, roughness: 0.8 })
    );
    baseFloor.rotation.x = -Math.PI / 2;
    baseFloor.position.y = -2; // Slightly below map
    scene.add(baseFloor);

    // 2. Tactical Map Plane (Texture Overlay)
    const mapTex = new THREE.CanvasTexture(map.getCanvas());
    const tacticalPlane = new THREE.Mesh(
        new THREE.PlaneGeometry(6000, 6000), 
        new THREE.MeshStandardMaterial({ 
            map: mapTex, 
            transparent: true, 
            opacity: 0.9,
            emissive: 0x00ffcc,
            emissiveIntensity: 0.05
        })
    );
    tacticalPlane.rotation.x = -Math.PI / 2;
    scene.add(tacticalPlane);

    const grid = new THREE.GridHelper(10000, 80, 0x003333, 0x001a1a);
    grid.position.y = -1;
    scene.add(grid);

    // Sentry Aegis Vessel
    const sentry = new THREE.Group();
    const core = new THREE.Mesh(new THREE.OctahedronGeometry(15, 0), new THREE.MeshStandardMaterial({ color: 0x00ffcc, emissive: 0x00ffcc, emissiveIntensity: 3 }));
    const shield = new THREE.Mesh(new THREE.IcosahedronGeometry(25, 1), new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: true, transparent: true, opacity: 0.2 }));
    sentry.add(core, shield);
    sentry.position.y = 60;
    scene.add(sentry);

    // Vector Path System
    const trailGeometry = new THREE.BufferGeometry();
    const trailMaterial = new THREE.LineDashedMaterial({ color: 0xff0055, dashSize: 10, gapSize: 5 });
    const trailLine = new THREE.Line(trailGeometry, trailMaterial);
    scene.add(trailLine);

    function updateTelemetry(lat, lon) {
        if (!startCoords) startCoords = { lat, lon };
        const z = -(lat - startCoords.lat) * 111111;
        const x = (lon - startCoords.lon) * 111111 * Math.cos(lat * Math.PI / 180);
        
        pathPoints.push(new THREE.Vector3(x, 5, z));
        trailGeometry.setFromPoints(pathPoints);
        trailLine.computeLineDistances();
        
        sentry.position.set(x, sentry.position.y, z);
        mainLight.position.set(x, 600, z);
        miniMap.setCenter([lon, lat]);
        
        document.getElementById('node-count').innerText = pathPoints.length;
    }

    // Interactive Core Lock
    window.addEventListener('mousedown', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        if (raycaster.intersectObject(core).length > 0) {
            targetLookAt.set(sentry.position.x, 0, sentry.position.z);
            targetCamPos.set(sentry.position.x + 450, 450, sentry.position.z + 450);
            isTweening = true;
        }
    });

    window.setTracking = (state) => {
        trackingState = state;
        document.querySelectorAll('button').forEach(b => b.classList.remove('active-btn'));
        document.getElementById(`btn-${state.toLowerCase()}`).classList.add('active-btn');
        if (state === 'START' && !trackingInterval) {
            trackingInterval = setInterval(() => {
                if (trackingState === 'START' && lastPosition) updateTelemetry(lastPosition.lat, lastPosition.lon);
            }, 1000);
        }
    };

    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
            lastPosition = { lat: pos.coords.latitude, lon: pos.coords.longitude };
            document.getElementById('sys-loc').innerText = `SAT_FIX: ${lastPosition.lat.toFixed(6)}, ${lastPosition.lon.toFixed(6)}`;
            map.setCenter([lastPosition.lon, lastPosition.lat]);
            document.getElementById('sig-str').innerText = Math.floor(90 + Math.random() * 10) + "%";
        }, null, { enableHighAccuracy: true });
    }

    function animate() {
        requestAnimationFrame(animate);
        if (mapLoaded) mapTex.needsUpdate = true;
        
        sentry.rotation.y += 0.03;
        shield.rotation.x -= 0.01;
        sentry.position.y = 60 + Math.sin(Date.now() * 0.005) * 10;
        document.getElementById('sys-load').innerText = Math.floor(Math.random() * 8) + "%";

        if (isTweening) {
            camera.position.lerp(targetCamPos, 0.08);
            controls.target.lerp(targetLookAt, 0.08);
            if (camera.position.distanceTo(targetCamPos) < 1) isTweening = false;
        }
        
        const dir = new THREE.Vector3();
        camera.getWorldDirection(dir);
        const angle = Math.atan2(dir.x, dir.z) * (180 / Math.PI);
        const sectors = ["N", "NE", "E", "SE", "S", "SW", "W", "NW"];
        document.getElementById('compass').innerText = sectors[Math.round(((angle + 180) % 360) / 45) % 8];
        document.getElementById('cam-pitch').innerText = (Math.asin(-dir.y) * (180 / Math.PI)).toFixed(1);

        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
