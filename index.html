<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentry OS | V65 Vector Flow</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        :root { --neon: #00ffcc; --warning: #ffcc00; --alert: #ff0055; --bg: #000c0c; }
        body { margin: 0; background: var(--bg); overflow: hidden; font-family: 'Courier New', monospace; color: var(--neon); }
        
        /* Tactical CRT Overlay */
        body::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 1000; background-size: 100% 3px, 3px 100%; pointer-events: none;
        }

        #map-buffer { position: absolute; width: 1024px; height: 1024px; top: -9999px; visibility: hidden; }
        
        .panel { border: 1px solid var(--neon); backdrop-filter: blur(15px); background: rgba(0, 20, 20, 0.8); box-shadow: 0 0 20px rgba(0,255,204,0.1); }
        #hud { position: absolute; top: 20px; left: 20px; padding: 20px; z-index: 100; width: 320px; border-top: 5px solid var(--neon); }
        
        #mini-map { position: absolute; bottom: 30px; right: 30px; width: 220px; height: 220px; z-index: 100; border: 2px solid var(--neon); border-radius: 50%; box-shadow: 0 0 30px rgba(0,255,204,0.3); }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px; }
        button { background: #002222; color: var(--neon); border: 1px solid #006666; padding: 10px; cursor: pointer; font-family: inherit; font-size: 10px; font-weight: bold; clip-path: polygon(0 0, 90% 0, 100% 30%, 100% 100%, 10% 100%, 0 70%); transition: 0.3s; }
        button:hover { background: var(--neon); color: #000; }
        .active-btn { background: var(--neon) !important; color: #000 !important; }
        
        #compass { font-size: 40px; text-align: center; margin: 10px 0; color: var(--warning); text-shadow: 0 0 10px var(--warning); }
        .telemetry { font-size: 10px; border-top: 1px solid #004444; padding-top: 10px; margin-top: 15px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div id="hud" class="panel">
    <div style="font-weight: bold; font-size: 18px; letter-spacing: 4px;">VECTOR_FLOW_V65</div>
    <div id="sys-loc" style="font-size: 9px; color: #00aaaa;">UPLINK_READY: STABLE</div>
    
    <div id="compass">N</div>
    
    <div class="btn-grid">
        <button id="btn-start" onclick="setTracking('START')">ENGAGE</button>
        <button id="btn-pause" onclick="setTracking('PAUSE')">WAIT</button>
        <button id="btn-stop" onclick="setTracking('STOP')" class="active-btn">KILL</button>
    </div>

    <div class="telemetry">
        <div>
            TRAIL: <span id="node-count" style="color:white;">0</span>pts<br>
            PITCH: <span id="cam-pitch" style="color:white;">45.0</span>
        </div>
        <div style="text-align: right;">
            STATUS: <span id="sys-status" style="color:var(--neon);">IDLE</span><br>
            LINK: <span style="color:var(--warning);">ENCRYPTED</span>
        </div>
    </div>
</div>

<div id="mini-map"></div>
<div id="map-buffer"></div>

<script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let startCoords = null, trackingState = 'STOP', lastPosition = null;
    let trackingInterval = null, mapLoaded = false;
    const raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2();
    let isTweening = false, pathPoints = [];
    
    const targetCamPos = new THREE.Vector3();
    const targetLookAt = new THREE.Vector3();

    // Map Engine Initialization
    const map = new maplibregl.Map({
        container: 'map-buffer',
        style: 'https://tiles.openfreemap.org/styles/dark',
        center: [-81.6881, 26.2750], zoom: 19, interactive: false, preserveDrawingBuffer: true 
    });
    const miniMap = new maplibregl.Map({
        container: 'mini-map',
        style: 'https://tiles.openfreemap.org/styles/dark',
        center: [-81.6881, 26.2750], zoom: 16, interactive: false
    });
    map.on('idle', () => { mapLoaded = true; });

    // Three.js Core
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000c0c, 0.0005);
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 1, 15000);
    camera.position.set(500, 500, 500);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    scene.add(new THREE.AmbientLight(0x00ffff, 0.4));
    const pointLight = new THREE.PointLight(0x00ffcc, 500000, 2000);
    pointLight.position.set(0, 500, 0);
    scene.add(pointLight);
    
    const grid = new THREE.GridHelper(10000, 100, 0x003333, 0x001a1a);
    scene.add(grid);

    const mapTex = new THREE.CanvasTexture(map.getCanvas());
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(6000, 6000), 
        new THREE.MeshStandardMaterial({ map: mapTex, roughness: 1, metalness: 0.2 })
    );
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // Sentry Vessel
    const sentry = new THREE.Group();
    const core = new THREE.Mesh(new THREE.OctahedronGeometry(12, 0), new THREE.MeshStandardMaterial({ color: 0x00ffcc, emissive: 0x00ffcc, emissiveIntensity: 2 }));
    const ring = new THREE.Mesh(new THREE.TorusGeometry(18, 0.5, 16, 100), new THREE.MeshBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.5 }));
    ring.rotation.x = Math.PI / 2;
    sentry.add(core, ring);
    sentry.position.y = 50;
    scene.add(sentry);

    // Neural Trail Line
    const trailGeometry = new THREE.BufferGeometry();
    const trailMaterial = new THREE.LineBasicMaterial({ color: 0xff0055, linewidth: 2 });
    const trailLine = new THREE.Line(trailGeometry, trailMaterial);
    scene.add(trailLine);

    function updateTelemetry(lat, lon) {
        if (!startCoords) startCoords = { lat, lon };
        const z = -(lat - startCoords.lat) * 111111;
        const x = (lon - startCoords.lon) * 111111 * Math.cos(lat * Math.PI / 180);
        
        pathPoints.push(new THREE.Vector3(x, 2, z));
        trailGeometry.setFromPoints(pathPoints);
        
        sentry.position.set(x, sentry.position.y, z);
        pointLight.position.set(x, 400, z);
        miniMap.setCenter([lon, lat]);
        
        document.getElementById('node-count').innerText = pathPoints.length;
    }

    // Interaction Logic
    window.addEventListener('mousedown', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        if (raycaster.intersectObject(core).length > 0) {
            targetLookAt.set(sentry.position.x, 0, sentry.position.z);
            targetCamPos.set(sentry.position.x + 400, 400, sentry.position.z + 400);
            isTweening = true;
        }
    });

    window.setTracking = (state) => {
        trackingState = state;
        document.getElementById('sys-status').innerText = state;
        document.querySelectorAll('button').forEach(b => b.classList.remove('active-btn'));
        document.getElementById(`btn-${state.toLowerCase()}`).classList.add('active-btn');
        if (state === 'START' && !trackingInterval) {
            trackingInterval = setInterval(() => {
                if (trackingState === 'START' && lastPosition) updateTelemetry(lastPosition.lat, lastPosition.lon);
            }, 1000);
        }
    };

    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
            lastPosition = { lat: pos.coords.latitude, lon: pos.coords.longitude };
            document.getElementById('sys-loc').innerText = `SAT_LOCK: ${lastPosition.lat.toFixed(5)}, ${lastPosition.lon.toFixed(5)}`;
            map.setCenter([lastPosition.lon, lastPosition.lat]);
        }, null, { enableHighAccuracy: true });
    }

    function animate() {
        requestAnimationFrame(animate);
        if (mapLoaded) mapTex.needsUpdate = true;
        
        sentry.rotation.y += 0.04;
        ring.rotation.z -= 0.02;
        sentry.position.y = 50 + Math.sin(Date.now() * 0.004) * 15;

        if (isTweening) {
            camera.position.lerp(targetCamPos, 0.07);
            controls.target.lerp(targetLookAt, 0.07);
            if (camera.position.distanceTo(targetCamPos) < 1) isTweening = false;
        }
        
        const dir = new THREE.Vector3();
        camera.getWorldDirection(dir);
        const angle = Math.atan2(dir.x, dir.z) * (180 / Math.PI);
        const sectors = ["N", "NE", "E", "SE", "S", "SW", "W", "NW"];
        document.getElementById('compass').innerText = sectors[Math.round(((angle + 180) % 360) / 45) % 8];
        document.getElementById('cam-pitch').innerText = (Math.asin(-dir.y) * (180 / Math.PI)).toFixed(1);

        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
