<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentry OS | V78 Tactical Intel</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        :root { --neon: #00ffcc; --warning: #ffcc00; --alert: #ff0055; --bg: #000808; }
        body { margin: 0; background: var(--bg); overflow: hidden; font-family: 'Courier New', monospace; color: var(--neon); }
        
        /* CRT Scanline Overlay */
        body::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            z-index: 1000; background-size: 100% 3px; pointer-events: none; opacity: 0.2;
        }

        #map-buffer { position: absolute; width: 1024px; height: 1024px; top: -9999px; visibility: hidden; }
        
        .panel { border: 1px solid var(--neon); backdrop-filter: blur(8px); background: rgba(0, 10, 10, 0.9); }
        #hud { position: absolute; top: 20px; left: 20px; padding: 15px; z-index: 100; width: 320px; border-top: 4px solid var(--neon); }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 15px; }
        button { background: #001515; color: var(--neon); border: 1px solid #004444; padding: 10px; cursor: pointer; font-size: 10px; font-weight: bold; }
        .active-btn { background: var(--neon) !important; color: #000 !important; }
        
        #compass { font-size: 42px; text-align: center; margin: 5px 0; color: var(--warning); text-shadow: 0 0 10px var(--warning); }
        .telemetry { font-size: 9px; border-top: 1px solid #003333; padding-top: 10px; margin-top: 10px; line-height: 1.5; }
    </style>
</head>
<body>

<div id="hud" class="panel">
    <div style="font-weight: bold; font-size: 18px; letter-spacing: 3px;">AEGIS_INTEL_V78</div>
    <div id="sys-loc" style="font-size: 9px; color: #00aaaa;">LABEL_PROJECTION: ACTIVE</div>
    
    <div id="compass">N</div>
    
    <div class="btn-grid">
        <button id="btn-start" onclick="setTracking('START')">ENGAGE</button>
        <button id="btn-pause" onclick="setTracking('PAUSE')">HOLD</button>
        <button id="btn-stop" onclick="setTracking('STOP')" class="active-btn">HALT</button>
    </div>

    <div class="telemetry">
        NODES: <span id="node-count" style="color:white;">0</span> | 
        INTEL: <span style="color:var(--neon);">STREET_BUILDING_LABELS_ON</span><br>
        LAT: <span id="lat-val" style="color:white;">---</span> | 
        LON: <span id="lon-val" style="color:white;">---</span>
    </div>
</div>

<div id="map-buffer"></div>

<script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let startCoords = null, trackingState = 'STOP', lastPosition = null;
    let trackingInterval = null, mapLoaded = false;
    const raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2();
    let isTweening = false, pathPoints = [];
    
    const targetCamPos = new THREE.Vector3();
    const targetLookAt = new THREE.Vector3();

    // Map Engine - Configured for Street-Level Detail
    const map = new maplibregl.Map({
        container: 'map-buffer',
        style: 'https://tiles.openfreemap.org/styles/dark', 
        center: [-81.6881, 26.2750], 
        zoom: 19, // Deep zoom level to force store and building labels
        interactive: false, 
        preserveDrawingBuffer: true,
        fadeDuration: 0
    });

    map.on('idle', () => { mapLoaded = true; });

    // Scene Setup
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000808, 0.0004);
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 1, 15000);
    camera.position.set(800, 800, 800);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // Tactical Radar Material Setup
    const mapTex = new THREE.CanvasTexture(map.getCanvas());
    
    // ANISOTROPY: This is the secret to making text readable on a floor at an angle
    const maxAnisotropy = renderer.capabilities.getMaxAnisotropy();
    mapTex.anisotropy = maxAnisotropy;
    mapTex.minFilter = THREE.LinearMipmapLinearFilter;
    mapTex.magFilter = THREE.LinearFilter;

    const tacticalPlane = new THREE.Mesh(
        new THREE.CircleGeometry(1200, 64), 
        new THREE.MeshBasicMaterial({ map: mapTex, transparent: true, opacity: 0.9 })
    );
    tacticalPlane.rotation.x = -Math.PI / 2;
    scene.add(tacticalPlane);

    // Physical World Infrastructure
    const grid = new THREE.GridHelper(10000, 40, 0x002222, 0x001111);
    grid.position.y = -2;
    scene.add(grid);

    // Sentry Unit
    const sentry = new THREE.Group();
    const core = new THREE.Mesh(new THREE.OctahedronGeometry(20, 0), new THREE.MeshStandardMaterial({ color: 0x00ffcc, emissive: 0x00ffcc, emissiveIntensity: 2 }));
    const cage = new THREE.Mesh(new THREE.IcosahedronGeometry(30, 1), new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: true, transparent: true, opacity: 0.15 }));
    sentry.add(core, cage);
    sentry.position.y = 60;
    scene.add(sentry);

    function updatePlot(lat, lon) {
        if (!startCoords) startCoords = { lat, lon };
        const z = -(lat - startCoords.lat) * 111111;
        const x = (lon - startCoords.lon) * 111111 * Math.cos(lat * Math.PI / 180);
        
        sentry.position.set(x, sentry.position.y, z);
        tacticalPlane.position.set(x, 0, z); 
        
        map.setCenter([lon, lat]);
        document.getElementById('lat-val').innerText = lat.toFixed(5);
        document.getElementById('lon-val').innerText = lon.toFixed(5);
    }

    window.setTracking = (state) => {
        trackingState = state;
        document.querySelectorAll('button').forEach(b => b.classList.remove('active-btn'));
        document.getElementById(`btn-${state.toLowerCase()}`).classList.add('active-btn');
        if (state === 'START' && !trackingInterval) {
            trackingInterval = setInterval(() => {
                if (trackingState === 'START' && lastPosition) updatePlot(lastPosition.lat, lastPosition.lon);
            }, 1000);
        }
    };

    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
            lastPosition = { lat: pos.coords.latitude, lon: pos.coords.longitude };
        }, null, { enableHighAccuracy: true });
    }

    function animate() {
        requestAnimationFrame(animate);
        if (mapLoaded) mapTex.needsUpdate = true;
        
        sentry.rotation.y += 0.02;
        sentry.position.y = 60 + Math.sin(Date.now() * 0.003) * 10;

        if (isTweening) {
            camera.position.lerp(targetCamPos, 0.07);
            controls.target.lerp(targetLookAt, 0.07);
            if (camera.position.distanceTo(targetCamPos) < 1) isTweening = false;
        }

        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
