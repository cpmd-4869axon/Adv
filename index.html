<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentry Node | V30 Advanced Telemetry</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; background: #010203; overflow: hidden; font-family: 'Courier New', monospace; color: #00ffcc; }
        #map-buffer { position: absolute; width: 1024px; height: 1024px; top: -9999px; visibility: hidden; }
        
        #hud { position: absolute; top: 20px; left: 20px; border: 1px solid #00ffcc; 
               background: rgba(0,10,10,0.92); padding: 15px; z-index: 100; width: 260px; }

        #stream-hud {
            position: absolute; top: 20px; right: 20px; border: 1px solid #00ffcc;
            background: rgba(0,5,5,0.9); padding: 10px; z-index: 100; width: 180px; font-size: 11px;
        }

        /* BIG DATA DISPLAY POPUP */
        #node-terminal { 
            position: absolute; bottom: 40px; right: 20px; display: none; 
            background: rgba(0, 15, 15, 0.95); border: 2px solid #00ffcc; 
            padding: 20px; z-index: 200; width: 320px;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.3);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .terminal-header { font-size: 18px; font-weight: bold; border-bottom: 2px solid #00ffcc; margin-bottom: 15px; padding-bottom: 5px; }
        .term-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; border-bottom: 1px solid #004444; }
        .term-label { color: #008888; }
        .term-val { color: #fff; font-weight: bold; }

        .control-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 10px; }
        button { background: #001a1a; color: #00ffcc; border: 1px solid #004444; padding: 8px; cursor: pointer; font-family: monospace; }
        button:hover { background: #003333; border-color: #00ffcc; }
        .active-btn { background: #00ffcc; color: #000; font-weight: bold; }
    </style>
</head>
<body>

<div id="hud">
    <div style="font-weight: bold; border-bottom: 1px solid #00ffcc; padding-bottom: 5px;">SENTRY_OS_V30</div>
    <div id="coords" style="margin-top:10px; font-size: 10px; color: #008888;">SYS_LOC: SCANNING...</div>
    
    <div class="control-grid">
        <button id="btn-start" onclick="setTracking('START')">START</button>
        <button id="btn-pause" onclick="setTracking('PAUSE')">PAUSE</button>
        <button id="btn-stop" onclick="setTracking('STOP')" class="active-btn">STOP</button>
    </div>

    <div style="margin-top:15px;">
        <button onclick="exportToCSV()" style="border-color:#ffcc00; color:#ffcc00;">EXPORT CSV</button>
        <input type="file" id="csv-import" accept=".csv" onchange="importCSV(event)" style="display:none">
        <button onclick="document.getElementById('csv-import').click()" style="margin-top:5px;">IMPORT CSV</button>
    </div>
</div>

<div id="stream-hud">
    <div>Nodes_Logged: <span id="stream-nodes" style="color:#fff;">0</span></div>
    <div>Active_Time: <span id="stream-time" style="color:#fff;">00:00</span></div>
</div>

<div id="node-terminal">
    <div class="terminal-header">NODE_TELEMETRY</div>
    <div class="term-row"><span class="term-label">SOURCE:</span> <span id="term-src" class="term-val">--</span></div>
    <div class="term-row"><span class="term-label">TIME:</span> <span id="term-time" class="term-val">--</span></div>
    <div class="term-row"><span class="term-label">LATITUDE:</span> <span id="term-lat" class="term-val">--</span></div>
    <div class="term-row"><span class="term-label">LONGITUDE:</span> <span id="term-lon" class="term-val">--</span></div>
    <div style="font-size: 10px; color: #008888; margin-top: 10px;">[ TAP MAP TO CLOSE ]</div>
</div>

<div id="map-buffer"></div>

<script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let startCoords = null, trackingState = 'STOP', lastPosition = null;
    let trackingInterval = null, sessionStartTime = null, lastTapTime = 0;
    const raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2();
    let selectedNode = null, mapLoaded = false;
    window.sessionData = []; 

    const map = new maplibregl.Map({
        container: 'map-buffer',
        style: 'https://tiles.openfreemap.org/styles/dark',
        center: [-81.6881, 26.2750], zoom: 18, interactive: false, preserveDrawingBuffer: true 
    });
    map.on('idle', () => { mapLoaded = true; });

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(50, 70, 90);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    const controls = new OrbitControls(camera, renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const mapTex = new THREE.CanvasTexture(map.getCanvas());
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(800, 800), new THREE.MeshBasicMaterial({ map: mapTex }));
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    const sentry = new THREE.Group();
    const pyr = new THREE.Mesh(new THREE.CylinderGeometry(0, 3, 6, 4), new THREE.MeshStandardMaterial({ color: 0x00ffcc }));
    pyr.rotation.x = Math.PI; sentry.add(pyr);
    sentry.position.y = 12;
    scene.add(sentry);

    const breadcrumbs = new THREE.Group();
    scene.add(breadcrumbs);

    // --- NAVIGATION ---
    window.resetCameraView = (zoomIn = false) => {
        const endPos = zoomIn ? sentry.position.clone().add(new THREE.Vector3(15, 20, 25)) : new THREE.Vector3(50, 70, 90);
        const endTarget = sentry.position.clone();
        
        let progress = 0;
        const startPos = camera.position.clone();
        const startTarget = controls.target.clone();
        
        function glide() {
            progress += 0.05;
            camera.position.lerpVectors(startPos, endPos, progress);
            controls.target.lerpVectors(startTarget, endTarget, progress);
            if (progress < 1) requestAnimationFrame(glide);
        }
        glide();
    };

    // --- DATA HANDLING ---
    window.exportToCSV = () => {
        const header = "timestamp,lat,lon,source\n";
        const rows = window.sessionData.map(d => `${d.t},${d.lat},${d.lon},${d.source}`).join("\n");
        const blob = new Blob([header + rows], { type: 'text/csv' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `SENTRY_DATA_${Date.now()}.csv`;
        link.click();
    };

    window.importCSV = (event) => {
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            const lines = e.target.result.split('\n').slice(1);
            lines.forEach(line => {
                const p = line.split(',');
                if (p.length >= 3) plot(parseFloat(p[1]), parseFloat(p[2]), {t:p[0], source:p[3]||"IMPORTED"}, 0x00ccff);
            });
        };
        reader.readAsText(file);
    };

    function plot(lat, lon, data, color) {
        if (!startCoords) startCoords = { lat, lon };
        const dy = (lat - startCoords.lat) * 111111;
        const dx = (lon - startCoords.lon) * 111111 * Math.cos(lat * Math.PI / 180);
        
        // Sphere with dual materials for wireframe animation
        const geo = new THREE.SphereGeometry(1.5, 16, 16);
        const mat = new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.4 });
        const node = new THREE.Mesh(geo, mat);
        
        node.position.set(dx, 1.5, -dy);
        node.userData = { ...data, lat, lon, baseColor: color, targetScale: 1.0, isWireframe: false };
        
        breadcrumbs.add(node);
        sentry.position.set(dx, sentry.position.y, -dy);
        document.getElementById('stream-nodes').innerText = breadcrumbs.children.length;
    }

    // --- INTERACTION ---
    window.addEventListener('mousedown', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        
        // Triangle Logic
        if (raycaster.intersectObject(pyr).length > 0) {
            const now = Date.now();
            window.resetCameraView(now - lastTapTime < 300);
            lastTapTime = now;
            return;
        }

        const hits = raycaster.intersectObjects(breadcrumbs.children);
        if (hits.length > 0) {
            // DE-SELECT PREVIOUS
            if (selectedNode) {
                selectedNode.userData.targetScale = 1.0;
                selectedNode.material.wireframe = false;
            }
            
            // SELECT NEW
            selectedNode = hits[0].object;
            selectedNode.userData.targetScale = 3.5; // Grow animation
            selectedNode.material.wireframe = true; // Wireframe animation
            
            // POPUP BIG DISPLAY
            document.getElementById('node-terminal').style.display = 'block';
            document.getElementById('term-src').innerText = selectedNode.userData.source;
            document.getElementById('term-time').innerText = selectedNode.userData.t;
            document.getElementById('term-lat').innerText = selectedNode.userData.lat.toFixed(6);
            document.getElementById('term-lon').innerText = selectedNode.userData.lon.toFixed(6);
        } else {
            // DESELECT ALL
            if (selectedNode) {
                selectedNode.userData.targetScale = 1.0;
                selectedNode.material.wireframe = false;
                selectedNode = null;
            }
            document.getElementById('node-terminal').style.display = 'none';
        }
    });

    window.setTracking = (state) => {
        trackingState = state;
        document.querySelectorAll('.control-grid button').forEach(b => b.classList.remove('active-btn'));
        document.getElementById(`btn-${state.toLowerCase()}`).classList.add('active-btn');
        if (state === 'START' && !trackingInterval) {
            sessionStartTime = Date.now();
            trackingInterval = setInterval(() => {
                if (trackingState === 'START' && lastPosition) {
                    const data = { t: new Date().toLocaleTimeString(), lat: lastPosition.lat, lon: lastPosition.lon, source: "LIVE_STREAM" };
                    window.sessionData.push(data);
                    plot(data.lat, data.lon, data, 0xff0055);
                }
            }, 1000);
        }
    };

    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
            lastPosition = { lat: pos.coords.latitude, lon: pos.coords.longitude };
            document.getElementById('coords').innerText = `SYS_LOC: ${lastPosition.lat.toFixed(5)}, ${lastPosition.lon.toFixed(5)}`;
            map.setCenter([lastPosition.lon, lastPosition.lat]);
        }, null, { enableHighAccuracy: true });
    }

    function animate() {
        requestAnimationFrame(animate);
        if (mapLoaded) mapTex.needsUpdate = true;
        sentry.rotation.y += 0.03;
        sentry.position.y = 11 + Math.sin(Date.now() * 0.002) * 2;
        
        breadcrumbs.children.forEach(n => {
            const s = n.userData.targetScale;
            n.scale.lerp(new THREE.Vector3(s, s, s), 0.1);
        });

        if (sessionStartTime && trackingState === 'START') {
            const diff = Math.floor((Date.now() - sessionStartTime) / 1000);
            document.getElementById('stream-time').innerText = `${Math.floor(diff/60).toString().padStart(2,'0')}:${(diff%60).toString().padStart(2,'0')}`;
        }
        controls.update();
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
