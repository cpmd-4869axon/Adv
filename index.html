<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced 3D Spatial Map</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; background: #0b0e14; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #map { position: absolute; width: 1024px; height: 1024px; visibility: hidden; }
        #overlay { position: absolute; top: 20px; left: 20px; color: #00ffcc; background: rgba(0,0,0,0.8); 
                   padding: 15px; border-radius: 8px; border: 1px solid #00ffcc; pointer-events: none; z-index: 10; }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="overlay">
    <div style="font-size: 0.8em; opacity: 0.7;">GEOSPATIAL AVIONICS</div>
    <div id="coords">Locating Satellite...</div>
</div>
<div id="map"></div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    let lat = 0, lon = 0;

    // 1. INITIALIZE MAP (The invisible data source)
    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://demotiles.maplibre.org/style.json', // Vector style
        center: [0, 0],
        zoom: 16,
        interactive: false,
        preserveDrawingBuffer: true // Vital for Three.js texture capture
    });

    // 2. THREE.JS SCENE SETUP
    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x0b0e14, 10, 100);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 15, 20);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 3. THE FLOOR (Dynamic Texture Bridge)
    const mapCanvas = map.getCanvas();
    const texture = new THREE.CanvasTexture(mapCanvas);
    const geometry = new THREE.PlaneGeometry(40, 40);
    const material = new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide });
    const floor = new THREE.Mesh(geometry, material);
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // 4. ADVANCED VISUALS: Pulsing GPS Marker
    const markerGroup = new THREE.Group();
    const coreGeo = new THREE.SphereGeometry(0.4, 32, 32);
    const coreMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc });
    const core = new THREE.Mesh(coreGeo, coreMat);
    
    const ringGeo = new THREE.RingGeometry(0.6, 0.8, 32);
    const ringMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.5, side: THREE.DoubleSide });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = -Math.PI / 2;
    
    markerGroup.add(core, ring);
    markerGroup.position.y = 0.5;
    scene.add(markerGroup);

    // 5. GPS TRACKING
    if ("geolocation" in navigator) {
        navigator.geolocation.watchPosition(pos => {
            lat = pos.coords.latitude;
            lon = pos.coords.longitude;
            document.getElementById('coords').innerHTML = `LAT: ${lat.toFixed(6)}<br>LON: ${lon.toFixed(6)}`;
            
            // Move map "underneath" the 3D view
            map.setCenter([lon, lat]);
        }, null, { enableHighAccuracy: true });
    }

    // 6. ANIMATION LOOP
    function animate(time) {
        requestAnimationFrame(animate);

        // Update the texture from the map canvas every frame
        texture.needsUpdate = true;

        // Visual effects
        ring.scale.set(1 + Math.sin(time * 0.005) * 0.5, 1 + Math.sin(time * 0.005) * 0.5, 1);
        ringMat.opacity = 0.5 - (Math.sin(time * 0.005) * 0.5);
        
        // Slight camera sway for "drone" feel
        camera.position.x = Math.sin(time * 0.0005) * 2;

        renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

</script>
</body>
</html>
