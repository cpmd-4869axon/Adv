<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentry Node | Live Telemetry</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; background: #020406; overflow: hidden; font-family: 'Courier New', monospace; }
        #map-buffer { position: absolute; width: 1024px; height: 1024px; top: -9999px; visibility: hidden; }
        
        #hud { position: absolute; top: 20px; left: 20px; color: #00ffcc; border: 1px solid #00ffcc; 
               background: rgba(0,15,15,0.95); padding: 15px; z-index: 100; width: 260px; }

        #node-popup { 
            position: absolute; display: none; background: rgba(0, 30, 30, 0.9); 
            border: 1px solid #00ffcc; color: #00ffcc; padding: 10px; 
            z-index: 200; pointer-events: none; font-size: 11px;
        }

        .section-label { font-size: 11px; color: #00ffcc; margin-top: 15px; border-bottom: 1px solid #004444; padding-bottom: 3px; }
        .control-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 10px; }
        
        button { background: #002222; color: #00ffcc; border: 1px solid #00ffcc; padding: 8px; 
                         cursor: pointer; font-family: monospace; font-size: 11px; width: 100%; transition: 0.2s; }
        button:hover { background: #004444; }
        button.active-btn { background: #00ffcc; color: #000; font-weight: bold; }
        #btn-wipe { border-color: #ff3333; color: #ff3333; margin-top: 15px; }
    </style>
</head>
<body>

<div id="hud">
    <div style="font-weight: bold; border-bottom: 1px solid #00ffcc; padding-bottom: 5px; font-size: 16px;">SENTRY_OS_V16</div>
    <div id="coords" style="margin-top:10px; font-size: 11px;">GPS: STANDBY</div>
    
    <div class="section-label">TELEMETRY CONTROL</div>
    <div class="control-grid">
        <button id="btn-start" onclick="setTracking('START')">START</button>
        <button id="btn-pause" onclick="setTracking('PAUSE')">PAUSE</button>
        <button id="btn-stop" onclick="setTracking('STOP')" class="active-btn">STOP</button>
    </div>

    <div class="section-label">DATA UPLOAD</div>
    <input type="file" id="csv-upload" multiple accept=".csv" onchange="handleImport(event)" style="display:none">
    <button onclick="document.getElementById('csv-upload').click()">CHOOSE FILES</button>
    
    <button id="btn-wipe" onclick="wipeImportedData()">WIPE IMPORTED DATA</button>
</div>

<div id="node-popup">
    <div id="pop-src" style="font-weight:bold; border-bottom:1px solid #00ffcc;">--</div>
    <div id="pop-time">--</div>
    <div id="pop-lat">--</div>
    <div id="pop-lon">--</div>
</div>

<div id="map-buffer"></div>

<script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let startCoords = null;
    let trackingState = 'STOP';
    let lastPosition = null;
    let trackingInterval = null;
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let selectedNode = null;
    let mapLoaded = false;

    const map = new maplibregl.Map({
        container: 'map-buffer',
        style: 'https://tiles.openfreemap.org/styles/dark',
        center: [-81.6881, 26.2750], zoom: 18,
        interactive: false, preserveDrawingBuffer: true 
    });
    map.on('idle', () => { mapLoaded = true; });

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(40, 60, 80);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    const controls = new OrbitControls(camera, renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const mapTex = new THREE.CanvasTexture(map.getCanvas());
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshBasicMaterial({ map: mapTex }));
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    const sentry = new THREE.Group();
    const pyr = new THREE.Mesh(new THREE.CylinderGeometry(0, 2.5, 5, 4), new THREE.MeshStandardMaterial({ color: 0x00ffcc, flatShading: true }));
    pyr.rotation.x = Math.PI; sentry.add(pyr);
    scene.add(sentry);

    const breadcrumbs = new THREE.Group();
    scene.add(breadcrumbs);

    // --- TRACKING ENGINE ---
    window.setTracking = (state) => {
        trackingState = state;
        document.querySelectorAll('.control-grid button').forEach(b => b.classList.remove('active-btn'));
        document.getElementById(`btn-${state.toLowerCase()}`).classList.add('active-btn');

        if (state === 'START' && !trackingInterval) {
            // Log point every 1 second
            trackingInterval = setInterval(() => {
                if (trackingState === 'START' && lastPosition) {
                    plot(lastPosition.lat, lastPosition.lon, 
                         { t: new Date().toLocaleTimeString(), lat: lastPosition.lat, lon: lastPosition.lon }, 
                         0xff0055, "LIVE SESSION", true);
                }
            }, 1000);
        } else if (state === 'STOP' || state === 'PAUSE') {
            if (state === 'STOP') {
                clearInterval(trackingInterval);
                trackingInterval = null;
            }
        }
    };

    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
            const { latitude: lat, longitude: lon } = pos.coords;
            lastPosition = { lat, lon };
            document.getElementById('coords').innerText = `LAT: ${lat.toFixed(6)} LON: ${lon.toFixed(6)}`;
            map.setCenter([lon, lat]);
        }, err => console.error(err), { enableHighAccuracy: true });
    }

    function plot(lat, lon, data, color, source, isLive) {
        if (!startCoords) startCoords = { lat, lon };
        const dy = (lat - startCoords.lat) * 111111;
        const dx = (lon - startCoords.lon) * 111111 * Math.cos(lat * Math.PI / 180);
        
        const node = new THREE.Mesh(
            new THREE.SphereGeometry(1.0, 16, 16), 
            new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.2 })
        );
        node.position.set(dx, 1.0, -dy);
        node.userData = { ...data, source, color, isLive, targetScale: 1.0 };
        breadcrumbs.add(node);
        
        // Auto-move sentry to latest point
        sentry.position.set(dx, 3.5, -dy);
    }

    // Reuse selection/deselect logic from V15
    window.addEventListener('mousedown', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObjects(breadcrumbs.children);
        const pop = document.getElementById('node-popup');

        if (hits.length > 0) {
            if (selectedNode) { selectedNode.userData.targetScale = 1.0; selectedNode.material.wireframe = false; }
            selectedNode = hits[0].object;
            selectedNode.userData.targetScale = 2.5;
            selectedNode.material.wireframe = true;
            pop.style.display = 'block';
            document.getElementById('pop-src').innerText = selectedNode.userData.source;
            document.getElementById('pop-time').innerText = "T: " + selectedNode.userData.t;
            document.getElementById('pop-lat').innerText = "LAT: " + parseFloat(selectedNode.userData.lat).toFixed(5);
            document.getElementById('pop-lon').innerText = "LON: " + parseFloat(selectedNode.userData.lon).toFixed(5);
        } else {
            if (selectedNode) { selectedNode.userData.targetScale = 1.0; selectedNode.material.wireframe = false; selectedNode = null; }
            pop.style.display = 'none';
        }
    });

    function animate() {
        requestAnimationFrame(animate);
        if (mapLoaded) mapTex.needsUpdate = true;
        sentry.rotation.y += 0.01;
        
        breadcrumbs.children.forEach(node => {
            if (node.scale.x < node.userData.targetScale) node.scale.addScalar(0.15);
            if (node.scale.x > node.userData.targetScale) node.scale.subScalar(0.15);
        });

        if (selectedNode) {
            const vector = selectedNode.position.clone().project(camera);
            const pop = document.getElementById('node-popup');
            pop.style.left = ((vector.x + 1) / 2 * window.innerWidth + 20) + 'px';
            pop.style.top = (-(vector.y - 1) / 2 * window.innerHeight - 40) + 'px';
        }

        controls.update();
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
