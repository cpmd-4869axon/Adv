<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentry OS | V76 Tactical Labels</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        :root { --neon: #00ffcc; --warning: #ffcc00; --alert: #ff0055; --bg: #000808; }
        body { margin: 0; background: var(--bg); overflow: hidden; font-family: 'Courier New', monospace; color: var(--neon); }
        
        body::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            z-index: 1000; background-size: 100% 3px; pointer-events: none; opacity: 0.3;
        }

        /* Increased resolution for label clarity */
        #map-buffer { position: absolute; width: 1024px; height: 1024px; top: -9999px; visibility: hidden; }
        
        .panel { border: 1px solid var(--neon); backdrop-filter: blur(8px); background: rgba(0, 10, 10, 0.9); box-shadow: 0 0 15px rgba(0,255,204,0.2); }
        #hud { position: absolute; top: 20px; left: 20px; padding: 15px; z-index: 100; width: 320px; border-top: 4px solid var(--neon); }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 15px; }
        button { background: #001515; color: var(--neon); border: 1px solid #004444; padding: 10px; cursor: pointer; font-size: 10px; font-weight: bold; transition: 0.2s; }
        button:hover { background: var(--neon); color: #000; }
        .active-btn { background: var(--neon) !important; color: #000 !important; }
        
        #compass { font-size: 42px; text-align: center; margin: 5px 0; color: var(--warning); text-shadow: 0 0 10px var(--warning); }
        .telemetry { font-size: 9px; border-top: 1px solid #003333; padding-top: 10px; margin-top: 10px; line-height: 1.5; }
    </style>
</head>
<body>

<div id="hud" class="panel">
    <div style="font-weight: bold; font-size: 18px; letter-spacing: 3px;">AEGIS_LABELS_V76</div>
    <div id="sys-loc" style="font-size: 9px; color: #00aaaa;">INTEL_LAYER: ENABLED</div>
    
    <div id="compass">N</div>
    
    <div class="btn-grid">
        <button id="btn-start" onclick="setTracking('START')">ENGAGE</button>
        <button id="btn-pause" onclick="setTracking('PAUSE')">HOLD</button>
        <button id="btn-stop" onclick="setTracking('STOP')" class="active-btn">HALT</button>
    </div>

    <div class="telemetry">
        NODES: <span id="node-count" style="color:white;">0</span> | 
        PITCH: <span id="cam-pitch" style="color:white;">45.0</span><br>
        INTEL: <span style="color:var(--neon);">STREET_LEVEL_LABELS_ON</span>
    </div>
</div>

<div id="map-buffer"></div>

<script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let startCoords = null, trackingState = 'STOP', lastPosition = null;
    let trackingInterval = null, mapLoaded = false;
    const raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2();
    let isTweening = false, pathPoints = [];
    
    const targetCamPos = new THREE.Vector3();
    const targetLookAt = new THREE.Vector3();

    // Map Engine with Label Optimization
    const map = new maplibregl.Map({
        container: 'map-buffer',
        style: 'https://tiles.openfreemap.org/styles/dark', // Dark style includes label layers
        center: [-81.6881, 26.2750], 
        zoom: 18.5, // Tighter zoom makes labels larger on the radar
        interactive: false, 
        preserveDrawingBuffer: true 
    });

    map.on('idle', () => { mapLoaded = true; });

    // Scene Setup
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000808, 0.0004);
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 1, 15000);
    camera.position.set(800, 800, 800);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    scene.add(new THREE.AmbientLight(0x00ffff, 0.2));
    const light = new THREE.PointLight(0x00ffcc, 1000000, 3000);
    light.position.set(0, 800, 0);
    scene.add(light);

    // Physical Grid Floor
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(10000, 10000),
        new THREE.MeshStandardMaterial({ color: 0x000505, roughness: 1 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -5;
    scene.add(floor);

    const grid = new THREE.GridHelper(10000, 50, 0x002222, 0x001111);
    grid.position.y = -4;
    scene.add(grid);

    // Tactical Overlay Plane (Higher Res for Text)
    const mapTex = new THREE.CanvasTexture(map.getCanvas());
    mapTex.minFilter = THREE.LinearFilter;
    mapTex.magFilter = THREE.LinearFilter;

    const tacticalPlane = new THREE.Mesh(
        new THREE.CircleGeometry(1000, 64), 
        new THREE.MeshBasicMaterial({ map: mapTex, transparent: true, opacity: 0.85 })
    );
    tacticalPlane.rotation.x = -Math.PI / 2;
    tacticalPlane.position.y = 0;
    scene.add(tacticalPlane);

    // Sentry Unit
    const sentry = new THREE.Group();
    const core = new THREE.Mesh(new THREE.OctahedronGeometry(18, 0), new THREE.MeshStandardMaterial({ color: 0x00ffcc, emissive: 0x00ffcc, emissiveIntensity: 2 }));
    const cage = new THREE.Mesh(new THREE.IcosahedronGeometry(28, 1), new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: true, transparent: true, opacity: 0.15 }));
    sentry.add(core, cage);
    sentry.position.y = 60;
    scene.add(sentry);

    // Neural Path
    const trailGeom = new THREE.BufferGeometry();
    const trailMat = new THREE.LineBasicMaterial({ color: 0xff0044, linewidth: 3 });
    const trailLine = new THREE.Line(trailGeom, trailMat);
    scene.add(trailLine);

    function updatePlot(lat, lon) {
        if (!startCoords) startCoords = { lat, lon };
        const z = -(lat - startCoords.lat) * 111111;
        const x = (lon - startCoords.lon) * 111111 * Math.cos(lat * Math.PI / 180);
        
        pathPoints.push(new THREE.Vector3(x, 2, z));
        trailGeom.setFromPoints(pathPoints);
        
        sentry.position.set(x, sentry.position.y, z);
        tacticalPlane.position.set(x, 0, z); 
        light.position.set(x, 600, z);
        
        map.setCenter([lon, lat]);
        document.getElementById('node-count').innerText = pathPoints.length;
    }

    window.addEventListener('mousedown', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        if (raycaster.intersectObject(core).length > 0) {
            targetLookAt.copy(sentry.position);
            targetCamPos.set(sentry.position.x + 500, 500, sentry.position.z + 500);
            isTweening = true;
        }
    });

    window.setTracking = (state) => {
        trackingState = state;
        document.querySelectorAll('button').forEach(b => b.classList.remove('active-btn'));
        document.getElementById(`btn-${state.toLowerCase()}`).classList.add('active-btn');
        if (state === 'START' && !trackingInterval) {
            trackingInterval = setInterval(() => {
                if (trackingState === 'START' && lastPosition) updatePlot(lastPosition.lat, lastPosition.lon);
            }, 1000);
        }
    };

    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
            lastPosition = { lat: pos.coords.latitude, lon: pos.coords.longitude };
        }, null, { enableHighAccuracy: true });
    }

    function animate() {
        requestAnimationFrame(animate);
        if (mapLoaded) mapTex.needsUpdate = true;
        
        sentry.rotation.y += 0.02;
        cage.rotation.x -= 0.01;
        sentry.position.y = 60 + Math.sin(Date.now() * 0.003) * 10;

        if (isTweening) {
            camera.position.lerp(targetCamPos, 0.07);
            controls.target.lerp(targetLookAt, 0.07);
            if (camera.position.distanceTo(targetCamPos) < 1) isTweening = false;
        }
        
        const dir = new THREE.Vector3();
        camera.getWorldDirection(dir);
        const angle = Math.atan2(dir.x, dir.z) * (180 / Math.PI);
        const sectors = ["N", "NE", "E", "SE", "S", "SW", "W", "NW"];
        document.getElementById('compass').innerText = sectors[Math.round(((angle + 180) % 360) / 45) % 8];
        document.getElementById('cam-pitch').innerText = (Math.asin(-dir.y) * (180 / Math.PI)).toFixed(1);

        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
