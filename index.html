<script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // (Map setup is omitted, assuming MapLibre buffer is correctly initialized as in prior steps)

    // --- 1. SETUP THE SCENE ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);

    // --- 2. ADD LIGHTING (REQUIRED FOR SOLID OBJECTS) ---
    // Ambient light provides soft, overall base illumination
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    // Directional light creates shadows and depth, making the object look solid
    const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
    directionalLight.position.set(5, 10, 7.5); // Shine down from the front-right
    scene.add(directionalLight);

    // --- 3. CAMERA & RENDERER ---
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 8, 15); // Adjust for a clear, 3/4 aerial perspective

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // (Floor map texture setup is omitted, assume it exists at 'floorGeo')
    // const worldFloor = new THREE.Mesh(floorGeo, floorMat);
    // scene.add(worldFloor);

    // --- 4. ADVANCED SENTRY OBJECT (The Solid Triangle) ---
    const sentryGroup = new THREE.Group();
    sentryGroup.position.y = 0; // The whole group starts at ground level
    scene.add(sentryGroup);

    // Geometry: We make the cone geometry 'solid' by defining its faces.
    // CylinderGeometry(0, radius, height, radialSegments) can create a base pyramid.
    // 0 radius on top makes it point, 4 segments makes it a pyramid.
    const sentryGeo = new THREE.CylinderGeometry(0, 1.2, 2.5, 4); // A defined pyramid (triangle) shape
    
    // Material: We must switch from MeshBasicMaterial to one that handles light,
    // like MeshStandardMaterial. Crucially, turn wireframe: false.
    const sentryMat = new THREE.MeshStandardMaterial({ 
        color: 0x00ffcc, // Teal/cyan 
        wireframe: false, // Turn off wireframe to make it solid
        flatShading: true, // Use flat shading for that 'low-poly' tactical look
        roughness: 0.2, // Adds some glossiness
        metalness: 0.1 // Makes it look less like plastic
    });

    const sentryBody = new THREE.Mesh(sentryGeo, sentryMat);
    // Orient it so it looks like it's pointing 'up' from the aerial perspective.
    sentryBody.rotation.x = Math.PI; 
    sentryGroup.add(sentryBody);

    // --- 5. THE PULSING RING ---
    // RingGeometry(innerRadius, outerRadius, thetaSegments) creates a flat ring.
    const ringGeo = new THREE.RingGeometry(1.6, 2, 64);
    
    // Use MeshBasicMaterial as a pulse light doesn't need external shading.
    const ringMat = new THREE.MeshBasicMaterial({ 
        color: 0x00ffcc, // Teal/cyan pulse
        transparent: true, // Required to control opacity pulse
        opacity: 0.5, // Starting pulse opacity
        side: THREE.DoubleSide // Ensure it is visible from all angles
    });

    const pulsingRing = new THREE.Mesh(ringGeo, ringMat);
    
    // Lay it flat on the ground plane
    pulsingRing.rotation.x = -Math.PI / 2; 
    pulsingRing.position.y = 0.05; // Slightly above ground plane to prevent flickering
    sentryGroup.add(pulsingRing);

    // --- 6. ANIMATION LOOP ---
    function animate() {
        requestAnimationFrame(animate);

        // Required for smoothOrbitControls
        controls.update();

        // **Advanced Animations using Math.sin() and clock**
        const time = Date.now() * 0.001; // Current time in seconds

        // 1. Bobbing Motion (Position Y)
        // Adjust the multiplier for speed and the offset (1.5) for default height.
        sentryGroup.position.y = 1.5 + Math.sin(time * 3) * 0.4; // Slower, wider bob

        // 2. Continuous Slow Rotation (Yaw)
        sentryGroup.rotation.y += 0.005;

        // 3. Pulsing Ring Animation (Opacity Pulse)
        // Use time to oscillate opacity between 0.1 and 0.9.
        const pulseCycle = (Math.sin(time * 5) + 1) / 2; // Smooth oscillate between 0 and 1
        pulsingRing.material.opacity = 0.1 + (pulseCycle * 0.8); // Clamp opacity pulse

        renderer.render(scene, camera);
    }

    animate();

    // Standard resize handling
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
