<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentry Node | Interactive Data Plotter</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; background: #020406; overflow: hidden; font-family: 'Courier New', monospace; }
        #map-buffer { position: absolute; width: 1024px; height: 1024px; top: -9999px; visibility: hidden; }
        #hud { position: absolute; top: 20px; left: 20px; color: #00ffcc; border: 1px solid #00ffcc; 
               background: rgba(0,15,15,0.9); padding: 15px; z-index: 100; pointer-events: auto; }
        
        /* The Animated Data Pop-up */
        #node-popup { 
            position: absolute; display: none; background: rgba(0, 40, 40, 0.9); 
            border: 1px solid #00ffcc; color: #00ffcc; padding: 10px; font-size: 11px; 
            z-index: 200; pointer-events: none; border-radius: 2px; box-shadow: 0 0 10px #00ffcc;
            /* Transition for appearance */
            transition: opacity 0.3s ease; opacity: 0; 
        }

        .stat { font-size: 11px; color: #008888; margin-top: 4px; }
        button { background: #00ffcc; border: none; padding: 5px 10px; cursor: pointer; font-family: monospace; font-weight: bold; margin-top: 10px; width: 100%; }
        button:hover { background: #00ccaa; }
    </style>
</head>
<body>

<div id="hud">
    <div style="font-weight: bold;">SENTRY_TRACKER_V6</div>
    <div id="coords">WAITING GPS...</div>
    <div class="stat" id="nodes">NODES PLOTTED: 0</div>
    <button onclick="exportToCSV()">EXPORT TRAJECTORY (CSV)</button>
</div>

<div id="node-popup">
    <div style="font-weight:bold; border-bottom: 1px solid #00ffcc; margin-bottom: 4px;">NODE_DATA</div>
    <div id="pop-time">TIME: --</div>
    <div id="pop-lat">LAT: --</div>
    <div id="pop-lon">LON: --</div>
</div>

<div id="map-buffer"></div>

<script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- SYSTEM STATE ---
    window.gpsHistory = [];
    let startCoords = null;
    let lastLoggedTime = 0;
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let selectedNode = null; // Track current highlighted node

    // --- 1. MAP ENGINE ---
    const map = new maplibregl.Map({
        container: 'map-buffer',
        style: 'https://demotiles.maplibre.org/style.json',
        center: [-81.6881, 26.2750], 
        zoom: 18,
        interactive: false,
        preserveDrawingBuffer: true 
    });

    // --- 2. THREE.JS SCENE ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020406);
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(20, 30, 40);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // Lighting for Solid Objects
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    const sun = new THREE.DirectionalLight(0xffffff, 1.2);
    sun.position.set(10, 20, 10);
    scene.add(sun);

    // --- 3. FLOOR & SENTRY ---
    const mapTex = new THREE.CanvasTexture(map.getCanvas());
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(300, 300), new THREE.MeshBasicMaterial({ map: mapTex }));
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    const sentry = new THREE.Group();
    const pyramid = new THREE.Mesh(new THREE.CylinderGeometry(0, 1.5, 3, 4), new THREE.MeshStandardMaterial({ color: 0x00ffcc, flatShading: true }));
    pyramid.rotation.x = Math.PI; 
    sentry.add(pyramid);
    
    const ring = new THREE.Mesh(new THREE.RingGeometry(2, 2.3, 64), new THREE.MeshBasicMaterial({ color: 0x00ffcc, transparent: true, side: THREE.DoubleSide }));
    ring.rotation.x = -Math.PI / 2;
    sentry.add(ring);
    scene.add(sentry);

    // --- 4. INTERACTIVE BREADCRUMBS ---
    const breadcrumbs = new THREE.Group();
    scene.add(breadcrumbs);
    const sphereGeo = new THREE.SphereGeometry(0.6, 16, 16); // Larger for easy tap
    // material updated to phong to handle emissive colors for highlighting
    const sphereMat = new THREE.MeshPhongMaterial({ color: 0xff0055, emissive: 0x440000 });

    function logData(lat, lon) {
        const now = Date.now();
        if (now - lastLoggedTime >= 1000) {
            lastLoggedTime = now;
            const dataPoint = { timestamp: new Date().toLocaleTimeString(), lat, lon };
            window.gpsHistory.push(dataPoint);

            if (!startCoords) {
                startCoords = { lat, lon };
            } else {
                const dy = (lat - startCoords.lat) * 111111;
                const dx = (lon - startCoords.lon) * 111111 * Math.cos(lat * Math.PI / 180);
                
                const node = new THREE.Mesh(sphereGeo, sphereMat);
                node.position.set(dx, 0.6, -dy);
                node.userData = dataPoint; // Store data directly on the object
                breadcrumbs.add(node);
            }
            document.getElementById('nodes').innerText = `NODES: ${window.gpsHistory.length}`;
            document.getElementById('coords').innerText = `LAT: ${lat.toFixed(6)} LON: ${lon.toFixed(6)}`;
        }
    }

    if ("geolocation" in navigator) {
        navigator.geolocation.watchPosition(pos => {
            const { latitude, longitude } = pos.coords;
            map.setCenter([longitude, latitude]);
            logData(latitude, longitude);
        }, null, { enableHighAccuracy: true });
    }

    // --- 5. INTERACTION LOGIC (RAYCASTING + ANIMATION) ---
    function onSelect(event) {
        // Normalize mouse coordinates
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(breadcrumbs.children);

        const popup = document.getElementById('node-popup');

        if (intersects.length > 0) {
            const target = intersects[0].object;
            const data = target.userData;

            // Display pop-up
            popup.style.display = 'block';
            popup.style.opacity = 1;
            popup.style.left = event.clientX + 10 + 'px';
            popup.style.top = event.clientY + 10 + 'px';
            document.getElementById('pop-time').innerText = `TIME: ${data.timestamp}`;
            document.getElementById('pop-lat').innerText = `LAT: ${data.lat.toFixed(6)}`;
            document.getElementById('pop-lon').innerText = `LON: ${data.lon.toFixed(6)}`;

            // **THE ANIME: ZOOM & COLOR CHANGE**
            // 1. ZOOM: Move camera closer to the node
            const zoomTarget = target.position.clone().add(new THREE.Vector3(5, 8, 8));
            // Basic lerp (linear interpolation) will happen in the animate loop

            // 2. COLOR CHANGE: Flash from Red to Green Glow
            target.material.emissive.setHex(0x00ffcc); // Tactical Green glow
            setTimeout(() => target.material.emissive.setHex(0x440000), 1000); // Revert after 1s
            
            selectedNode = zoomTarget; // Set the zoom camera target

        } else {
            popup.style.opacity = 0;
            setTimeout(() => popup.style.display = 'none', 300);
            selectedNode = null; // Revert to orbit control behavior
        }
    }

    window.addEventListener('mousedown', onSelect);

    window.exportToCSV = () => {
        let csv = "Time,Lat,Lon\n" + window.gpsHistory.map(e => `${e.timestamp},${e.lat},${e.lon}`).join("\n");
        const a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
        a.download = `sentry_data.csv`;
        a.click();
    };

    // --- 6. ANIMATION LOOP ---
    function animate() {
        requestAnimationFrame(animate);
        const time = Date.now() * 0.001;
        if (map.loaded()) mapTex.needsUpdate = true;

        // Bob & Spin
        sentry.position.y = 2 + Math.sin(time * 3) * 0.5;
        sentry.rotation.y += 0.01;

        // Scaling Pulse Ring
        const pulse = (Math.sin(time * 5) + 1) / 2;
        const s = 0.5 + (pulse * 2.0); 
        ring.scale.set(s, s, 1);
        ring.material.opacity = 1 - pulse;

        // **Smooth Zoom Animation**
        if (selectedNode) {
            // Lerp the camera position smoothly toward the selected node
            camera.position.lerp(selectedNode, 0.1); 
            controls.target.lerp(selectedNode.clone().sub(new THREE.Vector3(5,8,8)), 0.1);
        }

        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
