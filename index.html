<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentry OS | V50 Apex</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        :root { --neon: #00ffcc; --warning: #ffcc00; --alert: #ff0055; --bg: #000808; }
        body { margin: 0; background: var(--bg); overflow: hidden; font-family: 'Courier New', monospace; color: var(--neon); }
        #map-buffer { position: absolute; width: 1024px; height: 1024px; top: -9999px; visibility: hidden; }
        
        /* CRT Scanline Overlay */
        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 500; background-size: 100% 4px, 3px 100%; pointer-events: none;
        }

        .panel { background: rgba(0, 10, 10, 0.85); border: 1px solid var(--neon); backdrop-filter: blur(10px); box-shadow: 0 0 20px rgba(0,255,204,0.2); }
        #hud { position: absolute; top: 30px; left: 30px; padding: 25px; z-index: 100; width: 300px; border-radius: 2px; border-top: 4px solid var(--neon); }
        
        .control-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; }
        button { background: #001a1a; color: var(--neon); border: 1px solid #005555; padding: 12px; cursor: pointer; font-family: inherit; font-size: 10px; font-weight: bold; transition: 0.2s; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); }
        button:hover { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }
        .active-btn { background: var(--neon) !important; color: #000 !important; }
        
        #compass { font-size: 32px; text-align: center; margin: 15px 0; color: var(--warning); text-shadow: 0 0 15px var(--warning); }
        .data-stream { font-size: 9px; color: #00aaaa; margin-top: 15px; border-top: 1px solid #003333; padding-top: 10px; }
    </style>
</head>
<body>

<div id="hud" class="panel">
    <div style="font-weight: bold; font-size: 20px; letter-spacing: 4px;">APEX_CORE_V50</div>
    <div id="coords" style="font-size: 10px; color: #00cccc; margin-top:5px;">VECTOR_LOCK: READY</div>
    
    <div id="compass">N</div>
    
    <div class="control-grid">
        <button id="btn-start" onclick="setTracking('START')">SYNC</button>
        <button id="btn-pause" onclick="setTracking('PAUSE')">WAIT</button>
        <button id="btn-stop" onclick="setTracking('STOP')" class="active-btn">KILL</button>
    </div>
    
    <div class="data-stream">
        STATUS: <span id="sys-status" style="color:white;">IDLE</span><br>
        ALTITUDE: <span id="sys-alt" style="color:white;">0.00m</span>
    </div>
</div>

<div id="map-buffer"></div>

<script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let startCoords = null, trackingState = 'STOP', lastPosition = null;
    let trackingInterval = null, mapLoaded = false;
    const raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2();
    
    let isTweening = false;
    const targetCamPos = new THREE.Vector3();
    const targetLookAt = new THREE.Vector3();

    const map = new maplibregl.Map({
        container: 'map-buffer',
        style: 'https://tiles.openfreemap.org/styles/dark',
        center: [-81.6881, 26.2750], zoom: 19, interactive: false, preserveDrawingBuffer: true 
    });
    map.on('idle', () => { mapLoaded = true; });

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000505);
    scene.fog = new THREE.FogExp2(0x000505, 0.0006); 

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 15000);
    // Initial 45 Degree Drop
    camera.position.set(400, 400, 400); 

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.04;

    scene.add(new THREE.AmbientLight(0x00ffff, 0.3));
    const sun = new THREE.DirectionalLight(0x00ffcc, 1.5);
    sun.position.set(200, 600, 200);
    scene.add(sun);
    
    const grid = new THREE.GridHelper(6000, 80, 0x002222, 0x000808);
    scene.add(grid);

    const mapTex = new THREE.CanvasTexture(map.getCanvas());
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(4000, 4000), 
        new THREE.MeshStandardMaterial({ map: mapTex, roughness: 1, metalness: 0 })
    );
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // --- ENHANCED SENTRY ---
    const sentry = new THREE.Group();
    const core = new THREE.Mesh(
        new THREE.OctahedronGeometry(12, 0), 
        new THREE.MeshStandardMaterial({ color: 0x00ffcc, emissive: 0x00ffcc, emissiveIntensity: 4, wireframe: true })
    );
    const inner = new THREE.Mesh(
        new THREE.CylinderGeometry(0, 6, 15, 4),
        new THREE.MeshStandardMaterial({ color: 0x00ffcc, emissive: 0x00ffcc, emissiveIntensity: 10 })
    );
    inner.rotation.x = Math.PI;
    sentry.add(core, inner);
    sentry.position.y = 30;
    scene.add(sentry);

    const breadcrumbs = new THREE.Group();
    scene.add(breadcrumbs);

    // Vector Path System
    const pathMaterial = new THREE.LineBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.5 });
    const pathPoints = [];

    function plot(lat, lon, color) {
        if (!startCoords) startCoords = { lat, lon };
        const z = -(lat - startCoords.lat) * 111111;
        const x = (lon - startCoords.lon) * 111111 * Math.cos(lat * Math.PI / 180);
        
        const node = new THREE.Mesh(
            new THREE.BoxGeometry(4, 4, 4), 
            new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 2 })
        );
        node.position.set(x, 2, z);
        breadcrumbs.add(node);
        sentry.position.set(x, sentry.position.y, z);

        // Update Path
        pathPoints.push(new THREE.Vector3(x, 2, z));
        if(pathPoints.length > 1) {
            const geo = new THREE.BufferGeometry().setFromPoints(pathPoints);
            const line = new THREE.Line(geo, pathMaterial);
            scene.add(line);
        }
    }

    // --- 45 DEGREE STRATEGIC GLIDE ---
    window.addEventListener('mousedown', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);

        const triHit = raycaster.intersectObject(inner);
        if (triHit.length > 0) {
            const zoomDist = 500; // Distance of the pull-back
            targetLookAt.set(sentry.position.x, 0, sentry.position.z);
            // Height = Offset for perfect 45 degree pitch
            targetCamPos.set(sentry.position.x + zoomDist, zoomDist, sentry.position.z + zoomDist);
            isTweening = true;
            return;
        }
    });

    window.setTracking = (state) => {
        trackingState = state;
        document.getElementById('sys-status').innerText = state;
        document.querySelectorAll('button').forEach(b => b.classList.remove('active-btn'));
        document.getElementById(`btn-${state.toLowerCase()}`).classList.add('active-btn');
        if (state === 'START' && !trackingInterval) {
            trackingInterval = setInterval(() => {
                if (trackingState === 'START' && lastPosition) {
                    plot(lastPosition.lat, lastPosition.lon, 0xff0055);
                }
            }, 1000);
        }
    };

    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
            lastPosition = { lat: pos.coords.latitude, lon: pos.coords.longitude };
            document.getElementById('coords').innerText = `FIX: ${lastPosition.lat.toFixed(5)}, ${lastPosition.lon.toFixed(5)}`;
            map.setCenter([lastPosition.lon, lastPosition.lat]);
        }, null, { enableHighAccuracy: true });
    }

    function animate() {
        requestAnimationFrame(animate);
        if (mapLoaded) mapTex.needsUpdate = true;
        
        sentry.rotation.y += 0.02;
        core.rotation.x += 0.05;
        sentry.position.y = 30 + Math.sin(Date.now() * 0.002) * 8;
        document.getElementById('sys-alt').innerText = sentry.position.y.toFixed(2) + "m";

        if (isTweening) {
            camera.position.lerp(targetCamPos, 0.08);
            controls.target.lerp(targetLookAt, 0.08);
            if (camera.position.distanceTo(targetCamPos) < 1) isTweening = false;
        }
        
        const dir = new THREE.Vector3();
        camera.getWorldDirection(dir);
        const angle = Math.atan2(dir.x, dir.z) * (180 / Math.PI);
        const sectors = ["N", "NE", "E", "SE", "S", "SW", "W", "NW"];
        document.getElementById('compass').innerText = sectors[Math.round(((angle + 180) % 360) / 45) % 8];

        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
