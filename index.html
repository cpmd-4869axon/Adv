<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentry Node: World Ground Sync</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; }
        /* Keep the source map hidden but rendering in the background */
        #map-source { position: absolute; width: 1024px; height: 1024px; top: -5000px; }
        #hud { position: absolute; top: 20px; left: 20px; color: #00ffcc; border: 1px solid #00ffcc; 
               background: rgba(0,20,10,0.8); padding: 12px; z-index: 10; pointer-events: none; }
        .data { font-size: 10px; color: #008888; }
    </style>
</head>
<body>

<div id="hud">
    <div>SYSTEM: ACTIVE_SENTRY_NODE</div>
    <div id="status">GEOSPATIAL SYNC: OK</div>
    <div class="data" id="gps-data">LAT: 26.2750 LON: -81.6881</div>
</div>

<div id="map-source"></div>

<script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- 1. THE GROUND MAP ENGINE ---
    const map = new maplibregl.Map({
        container: 'map-source',
        style: 'https://demotiles.maplibre.org/style.json',
        center: [-81.6881, 26.2750], 
        zoom: 17,
        interactive: false,
        preserveDrawingBuffer: true // REQUIRED for Three.js to read the pixels
    });

    // --- 2. THREE.JS SCENE SETUP ---
    const scene = new THREE.Scene();
    
    // Lighting for the Solid Triangle
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    const sunlight = new THREE.DirectionalLight(0xffffff, 1);
    sunlight.position.set(5, 15, 10);
    scene.add(sunlight);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 15, 20);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // --- 3. THE FLOOR PLANE ---
    const mapCanvas = map.getCanvas();
    const floorTexture = new THREE.CanvasTexture(mapCanvas);
    
    // Use a large plane to act as your ground
    const floorGeo = new THREE.PlaneGeometry(60, 60);
    const floorMat = new THREE.MeshBasicMaterial({ map: floorTexture, side: THREE.DoubleSide });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // --- 4. THE SOLID ANIMATED SENTRY ---
    const sentryGroup = new THREE.Group();
    scene.add(sentryGroup);

    // Solid Triangle (Pyramid)
    const triGeo = new THREE.CylinderGeometry(0, 1.2, 2.5, 4); 
    const triMat = new THREE.MeshStandardMaterial({ 
        color: 0x00ffcc, 
        flatShading: true,
        metalness: 0.2,
        roughness: 0.1
    });
    const pyramid = new THREE.Mesh(triGeo, triMat);
    pyramid.rotation.x = Math.PI; // Point it up
    sentryGroup.add(pyramid);

    // Pulsing Ring
    const ringGeo = new THREE.RingGeometry(1.8, 2.2, 64);
    const ringMat = new THREE.MeshBasicMaterial({ 
        color: 0x00ffcc, 
        transparent: true, 
        opacity: 0.5, 
        side: THREE.DoubleSide 
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = -Math.PI / 2;
    ring.position.y = 0.1; // Slightly above floor
    sentryGroup.add(ring);

    // --- 5. GPS SYNC ---
    if ("geolocation" in navigator) {
        navigator.geolocation.watchPosition(pos => {
            const { latitude, longitude } = pos.coords;
            document.getElementById('gps-data').innerText = `LAT: ${latitude.toFixed(4)} LON: ${longitude.toFixed(4)}`;
            // Sync map floor to GPS center
            map.setCenter([longitude, latitude]);
        });
    }

    // --- 6. ANIMATION LOOP ---
    function animate() {
        requestAnimationFrame(animate);
        const time = Date.now() * 0.001;

        // Force texture update from MapLibre
        if (map.loaded()) {
            floorTexture.needsUpdate = true;
        }

        // Bobbing & Rotation
        sentryGroup.position.y = 1.5 + Math.sin(time * 3) * 0.5;
        sentryGroup.rotation.y += 0.01;

        // Ring Pulse
        const pulse = (Math.sin(time * 5) + 1) / 2;
        ringMat.opacity = 0.2 + (pulse * 0.6);
        ring.scale.set(1 + pulse * 0.2, 1 + pulse * 0.2, 1);

        controls.update();
        renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
