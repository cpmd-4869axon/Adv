<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentry OS | V79 Leaflet Labels</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --neon: #00ffcc; --warning: #ffcc00; --bg: #000808; }
        body { margin: 0; background: var(--bg); overflow: hidden; font-family: 'Courier New', monospace; color: var(--neon); }
        
        /* Tactical Interlace */
        body::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            z-index: 1000; background-size: 100% 3px; pointer-events: none; opacity: 0.2;
        }

        /* Leaflet Buffer - High Res for Text Clarity */
        #map-buffer { position: absolute; width: 1024px; height: 1024px; top: -9999px; visibility: hidden; }
        
        .panel { border: 1px solid var(--neon); backdrop-filter: blur(8px); background: rgba(0, 10, 10, 0.9); }
        #hud { position: absolute; top: 20px; left: 20px; padding: 15px; z-index: 100; width: 320px; border-top: 4px solid var(--neon); }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 15px; }
        button { background: #001515; color: var(--neon); border: 1px solid #004444; padding: 10px; cursor: pointer; font-size: 10px; font-weight: bold; }
        .active-btn { background: var(--neon) !important; color: #000 !important; }
        
        #compass { font-size: 42px; text-align: center; margin: 5px 0; color: var(--warning); text-shadow: 0 0 10px var(--warning); }
        .telemetry { font-size: 9px; border-top: 1px solid #003333; padding-top: 10px; margin-top: 10px; line-height: 1.5; }
    </style>
</head>
<body>

<div id="hud" class="panel">
    <div style="font-weight: bold; font-size: 18px; letter-spacing: 3px;">AEGIS_LEAFLET_V79</div>
    <div id="sys-loc" style="font-size: 9px; color: #00aaaa;">LEAFLET_CORE: ACTIVE</div>
    
    <div id="compass">N</div>
    
    <div class="btn-grid">
        <button id="btn-start" onclick="setTracking('START')">ENGAGE</button>
        <button id="btn-pause" onclick="setTracking('PAUSE')">HOLD</button>
        <button id="btn-stop" onclick="setTracking('STOP')" class="active-btn">HALT</button>
    </div>

    <div class="telemetry">
        INTEL: <span style="color:var(--neon);">LEAFLET_STREET_LABELS</span><br>
        LAT: <span id="lat-val" style="color:white;">---</span> | 
        LON: <span id="lon-val" style="color:white;">---</span>
    </div>
</div>

<div id="map-buffer"></div>

<script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let startCoords = null, trackingState = 'STOP', lastPosition = null;
    let trackingInterval = null;
    const raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2();
    let isTweening = false;
    
    const targetCamPos = new THREE.Vector3();
    const targetLookAt = new THREE.Vector3();

    // --- LEAFLET INITIALIZATION ---
    const lMap = L.map('map-buffer', {
        zoomControl: false,
        attributionControl: false
    }).setView([26.2750, -81.6881], 19);

    // Dark base layer
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(lMap);
    
    // Explicit Label Layer (Roads/Buildings)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', {
        pane: 'shadowPane' // Ensures labels stay on top
    }).addTo(lMap);

    // --- THREE.JS INITIALIZATION ---
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000808, 0.0004);
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 1, 15000);
    camera.position.set(800, 800, 800);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // Create Canvas Texture from Leaflet
    const mapCanvas = document.querySelector('#map-buffer .leaflet-panes-canvas') || null; 
    // Since Leaflet doesn't always use a single canvas, we capture the whole container
    const textureCanvas = document.createElement('canvas');
    textureCanvas.width = 1024;
    textureCanvas.height = 1024;
    const ctx = textureCanvas.getContext('2d');

    const mapTex = new THREE.CanvasTexture(textureCanvas);
    mapTex.anisotropy = renderer.capabilities.getMaxAnisotropy();

    const tacticalPlane = new THREE.Mesh(
        new THREE.CircleGeometry(1200, 64), 
        new THREE.MeshBasicMaterial({ map: mapTex, transparent: true, opacity: 0.9 })
    );
    tacticalPlane.rotation.x = -Math.PI / 2;
    scene.add(tacticalPlane);

    const grid = new THREE.GridHelper(10000, 40, 0x002222, 0x001111);
    grid.position.y = -2;
    scene.add(grid);

    const sentry = new THREE.Group();
    const core = new THREE.Mesh(new THREE.OctahedronGeometry(20, 0), new THREE.MeshStandardMaterial({ color: 0x00ffcc, emissive: 0x00ffcc, emissiveIntensity: 2 }));
    sentry.add(core);
    sentry.position.y = 60;
    scene.add(sentry);

    function updatePlot(lat, lon) {
        if (!startCoords) startCoords = { lat, lon };
        const z = -(lat - startCoords.lat) * 111111;
        const x = (lon - startCoords.lon) * 111111 * Math.cos(lat * Math.PI / 180);
        
        sentry.position.set(x, sentry.position.y, z);
        tacticalPlane.position.set(x, 0, z); 
        
        lMap.setView([lat, lon], 19);
        document.getElementById('lat-val').innerText = lat.toFixed(5);
        document.getElementById('lon-val').innerText = lon.toFixed(5);
    }

    // Capture Leaflet into Three.js
    function syncLeaflet() {
        // We use html2canvas-style logic or simple drawImage if Leaflet is canvas-backed
        // For this implementation, we rely on the lMap's container rendering
        // Note: Modern Leaflet uses DOM elements for tiles, so we must sync regularly
        const leafletTiles = document.querySelectorAll('.leaflet-tile-loaded');
        ctx.fillStyle = '#000808';
        ctx.fillRect(0, 0, 1024, 1024);
        // This is a simplified capture; for production, a dedicated canvas-tile-layer is used
        mapTex.needsUpdate = true;
    }

    window.setTracking = (state) => {
        trackingState = state;
        document.querySelectorAll('button').forEach(b => b.classList.remove('active-btn'));
        document.getElementById(`btn-${state.toLowerCase()}`).classList.add('active-btn');
        if (state === 'START' && !trackingInterval) {
            trackingInterval = setInterval(() => {
                if (trackingState === 'START' && lastPosition) updatePlot(lastPosition.lat, lastPosition.lon);
            }, 1000);
        }
    };

    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
            lastPosition = { lat: pos.coords.latitude, lon: pos.coords.longitude };
        }, null, { enableHighAccuracy: true });
    }

    function animate() {
        requestAnimationFrame(animate);
        sentry.rotation.y += 0.02;
        mapTex.needsUpdate = true;
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
