<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentry Node: Advanced World Sync</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; }
        #buffer { position: absolute; width: 1024px; height: 1024px; top: -5000px; }
        #hud { position: absolute; top: 20px; left: 20px; color: #00ffcc; border: 1px solid #00ffcc; 
               background: rgba(0,20,10,0.8); padding: 12px; z-index: 10; pointer-events: none; }
        .data { font-size: 10px; color: #008888; }
    </style>
</head>
<body>

<div id="hud">
    <div>SYSTEM: ACTIVE_SENTRY_NODE</div>
    <div id="status">INITIALIZING WORLD SYNC...</div>
    <div class="data" id="gps-data">WAITING FOR SATELLITE...</div>
</div>

<div id="buffer"></div>

<script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // 1. MAP ENGINE (The Floor Texture)
    const map = new maplibregl.Map({
        container: 'buffer',
        style: 'https://demotiles.maplibre.org/style.json',
        center: [-81.6881, 26.2750], // Naples area
        zoom: 17,
        interactive: false,
        preserveDrawingBuffer: true // Allows Three.js to "see" the map
    });

    // 2. THREE.JS ENGINE
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);
    scene.fog = new THREE.Fog(0x050505, 10, 80);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 15, 20);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // 3. THE SYNCED FLOOR
    // We create a texture from the map's internal canvas
    const mapCanvas = map.getCanvas();
    const floorTexture = new THREE.CanvasTexture(mapCanvas);
    floorTexture.minFilter = THREE.LinearFilter;
    
    const floorGeo = new THREE.PlaneGeometry(60, 60);
    const floorMat = new THREE.MeshBasicMaterial({ map: floorTexture, side: THREE.DoubleSide });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // 4. THE TRIANGLE SENTRY
    const triangleGroup = new THREE.Group();
    const triGeo = new THREE.ConeGeometry(0.6, 2, 3); // Triangle/Pyramid shape
    const triMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: true });
    const sentry = new THREE.Mesh(triGeo, triMat);
    sentry.rotation.x = Math.PI; // Point it up
    triangleGroup.add(sentry);
    
    // Add a pulsing ring under the triangle
    const ring = new THREE.Mesh(
        new THREE.RingGeometry(0.8, 1, 32),
        new THREE.MeshBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.5, side: THREE.DoubleSide })
    );
    ring.rotation.x = Math.PI / 2;
    triangleGroup.add(ring);
    
    scene.add(triangleGroup);

    // 5. GPS & SYNC LOGIC
    if ("geolocation" in navigator) {
        navigator.geolocation.watchPosition(pos => {
            const { latitude, longitude } = pos.coords;
            document.getElementById('gps-data').innerText = `LAT: ${latitude.toFixed(6)} LON: ${longitude.toFixed(6)}`;
            document.getElementById('status').innerText = "GEOSPATIAL SYNC: OK";

            // Sync the map floor center to the GPS
            map.setCenter([longitude, latitude]);
        }, null, { enableHighAccuracy: true });
    }

    // 6. ANIMATION LOOP
    function animate(time) {
        requestAnimationFrame(animate);

        // This force-refreshes the map pixels onto the 3D plane
        if (map.loaded()) {
            floorTexture.needsUpdate = true;
        }

        // Sentry animations
        triangleGroup.rotation.y += 0.01;
        triangleGroup.position.y = 1 + Math.sin(time * 0.002) * 0.3;
        ring.scale.set(1 + Math.sin(time * 0.005) * 0.2, 1 + Math.sin(time * 0.005) * 0.2, 1);

        controls.update();
        renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
