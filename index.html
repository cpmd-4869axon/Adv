<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentry Node | GPS Sync & Map Status</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; background: #020406; overflow: hidden; font-family: 'Courier New', monospace; }
        #map-buffer { position: absolute; width: 1024px; height: 1024px; top: -9999px; visibility: hidden; }
        
        #hud { position: absolute; top: 20px; left: 20px; color: #00ffcc; border: 1px solid #00ffcc; 
               background: rgba(0,15,15,0.95); padding: 15px; z-index: 100; width: 220px; }

        /* Tactical Notification Pop-up */
        #status-toast {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 20, 20, 0.9); border: 1px solid #00ffcc; color: #00ffcc;
            padding: 10px 20px; font-size: 12px; letter-spacing: 2px; z-index: 300;
            transition: opacity 1s ease; opacity: 0; pointer-events: none;
        }

        #node-popup { 
            position: absolute; display: none; background: rgba(0, 40, 40, 0.9); 
            border: 1px solid #00ffcc; color: #00ffcc; padding: 10px; font-size: 11px; 
            z-index: 200; pointer-events: none; border-radius: 2px;
        }

        .section-label { font-size: 10px; color: #00ffcc; margin-top: 10px; border-bottom: 1px solid #004444; padding-bottom: 2px; }
        select, button { background: #002222; color: #00ffcc; border: 1px solid #00ffcc; padding: 5px; 
                         cursor: pointer; font-family: monospace; font-size: 11px; margin-top: 5px; width: 100%; }
    </style>
</head>
<body>

<div id="hud">
    <div style="font-weight: bold; border-bottom: 1px solid #00ffcc; padding-bottom: 5px;">SENTRY_OS_V8</div>
    <div id="coords" style="margin-top:8px;">LAT: 26.2750 LON: -81.6881</div>
    <div class="stat" style="font-size: 11px; color:#008888; margin-top:4px;" id="nodes">ACTIVE NODES: 0</div>
    
    <div class="section-label">MAP INTERFACE</div>
    <select id="mapStyle" onchange="changeMapStyle()">
        <option value="https://tiles.openfreemap.org/styles/dark">Stealth Dark</option>
        <option value="https://demotiles.maplibre.org/style.json">Tactical Vector</option>
    </select>
    <button onclick="exportToCSV()" style="margin-top:10px;">EXPORT TRAJECTORY</button>
</div>

<div id="status-toast">SYSTEM: SYNCING MAP TILES...</div>

<div id="node-popup">
    <div style="font-weight:bold; border-bottom: 1px solid #00ffcc; margin-bottom: 4px;">NODE_DATA</div>
    <div id="pop-time">TIME: --</div>
    <div id="pop-lat">LAT: --</div>
    <div id="pop-lon">LON: --</div>
</div>

<div id="map-buffer"></div>

<script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let startCoords = null;
    let lastLoggedTime = 0;
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let selectedNodeTarget = null;
    let mapLoaded = false;

    // --- 1. MAP ENGINE + LISTENERS ---
    const map = new maplibregl.Map({
        container: 'map-buffer',
        style: 'https://tiles.openfreemap.org/styles/dark',
        center: [-81.6881, 26.2750], 
        zoom: 18,
        interactive: false,
        preserveDrawingBuffer: true 
    });

    const toast = document.getElementById('status-toast');
    toast.style.opacity = '1';

    map.on('idle', () => {
        mapLoaded = true;
        toast.innerText = "SYSTEM: MAP SYNC OK";
        setTimeout(() => { toast.style.opacity = '0'; }, 2000);
    });

    window.changeMapStyle = () => {
        mapLoaded = false;
        toast.innerText = "SYSTEM: SYNCING MAP TILES...";
        toast.style.opacity = '1';
        map.setStyle(document.getElementById('mapStyle').value);
    };

    // --- 2. THREE.JS ENGINE ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(30, 40, 50);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    const controls = new OrbitControls(camera, renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    const sun = new THREE.DirectionalLight(0xffffff, 1.2);
    sun.position.set(20, 40, 20);
    scene.add(sun);

    // --- 3. FLOOR & SENTRY ---
    const mapTex = new THREE.CanvasTexture(map.getCanvas());
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(400, 400), new THREE.MeshBasicMaterial({ map: mapTex }));
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    const sentry = new THREE.Group();
    const pyramid = new THREE.Mesh(new THREE.CylinderGeometry(0, 2, 4, 4), new THREE.MeshStandardMaterial({ color: 0x00ffcc, flatShading: true }));
    pyramid.rotation.x = Math.PI; 
    sentry.add(pyramid);
    const ring = new THREE.Mesh(new THREE.RingGeometry(2.5, 3.2, 64), new THREE.MeshBasicMaterial({ color: 0x00ffcc, transparent: true, side: THREE.DoubleSide }));
    ring.rotation.x = -Math.PI / 2;
    sentry.add(ring);
    scene.add(sentry);

    // --- 4. DATA NODES ---
    const breadcrumbs = new THREE.Group();
    scene.add(breadcrumbs);
    const sphereGeo = new THREE.SphereGeometry(0.8, 16, 16);

    function logAndPlot(lat, lon) {
        const now = Date.now();
        if (now - lastLoggedTime >= 1000) {
            lastLoggedTime = now;
            const dataPoint = { timestamp: new Date().toLocaleTimeString(), lat, lon };
            window.gpsHistory = window.gpsHistory || [];
            window.gpsHistory.push(dataPoint);

            if (!startCoords) {
                startCoords = { lat, lon };
            } else {
                const dy = (lat - startCoords.lat) * 111111;
                const dx = (lon - startCoords.lon) * 111111 * Math.cos(lat * Math.PI / 180);
                const node = new THREE.Mesh(sphereGeo, new THREE.MeshStandardMaterial({ color: 0xff0055, emissive: 0x440000 }));
                node.position.set(dx, 0.8, -dy);
                node.userData = dataPoint;
                breadcrumbs.add(node);
            }
            document.getElementById('nodes').innerText = `ACTIVE NODES: ${breadcrumbs.children.length}`;
            document.getElementById('coords').innerText = `LAT: ${lat.toFixed(6)} LON: ${lon.toFixed(6)}`;
        }
    }

    if ("geolocation" in navigator) {
        navigator.geolocation.watchPosition(pos => {
            const { latitude, longitude } = pos.coords;
            map.setCenter([longitude, latitude]);
            logAndPlot(latitude, longitude);
        }, null, { enableHighAccuracy: true });
    }

    // --- 5. INTERACTION & ANIME ---
    window.addEventListener('mousedown', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(breadcrumbs.children);
        const popup = document.getElementById('node-popup');

        if (intersects.length > 0) {
            const target = intersects[0].object;
            const data = target.userData;
            popup.style.display = 'block';
            popup.style.left = e.clientX + 10 + 'px';
            popup.style.top = e.clientY + 10 + 'px';
            document.getElementById('pop-time').innerText = `TIME: ${data.timestamp}`;
            document.getElementById('pop-lat').innerText = `LAT: ${data.lat.toFixed(6)}`;
            document.getElementById('pop-lon').innerText = `LON: ${data.lon.toFixed(6)}`;

            // Highlight color
            target.material.emissive.setHex(0x00ffcc);
            setTimeout(() => target.material.emissive.setHex(0x440000), 1000);
            
            // Set Zoom Anime target
            selectedNodeTarget = target.position.clone().add(new THREE.Vector3(5, 8, 8));
        } else {
            popup.style.display = 'none';
            selectedNodeTarget = null;
        }
    });

    // --- 6. RENDER LOOP ---
    function animate() {
        requestAnimationFrame(animate);
        const time = Date.now() * 0.001;
        
        // Prevent texture update until map is actually loaded
        if (mapLoaded) mapTex.needsUpdate = true;

        sentry.position.y = 3 + Math.sin(time * 3) * 0.8;
        sentry.rotation.y += 0.015;

        const p = (Math.sin(time * 4) + 1) / 2;
        ring.scale.set(0.6 + p*2, 0.6 + p*2, 1);
        ring.material.opacity = 1 - p;

        if (selectedNodeTarget) {
            camera.position.lerp(selectedNodeTarget, 0.1);
            controls.target.lerp(selectedNodeTarget.clone().sub(new THREE.Vector3(5,8,8)), 0.1);
        }

        controls.update();
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
