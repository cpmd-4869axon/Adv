<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentry Node | Tactical Geospatial HUD</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; background: #020406; overflow: hidden; font-family: 'Courier New', monospace; }
        #map-buffer { position: absolute; width: 1024px; height: 1024px; top: -9999px; visibility: hidden; }
        #hud { position: absolute; top: 20px; left: 20px; color: #00ffcc; border: 1px solid rgba(0, 255, 204, 0.3); 
               background: rgba(0,10,10,0.85); padding: 15px; z-index: 100; pointer-events: none; 
               box-shadow: 0 0 15px rgba(0, 255, 204, 0.2); border-radius: 4px; }
        .glitch { animation: glitch 2s infinite; font-weight: bold; letter-spacing: 2px; }
        @keyframes glitch { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        #coords { font-size: 12px; color: #008888; margin-top: 5px; }
    </style>
</head>
<body>

<div id="hud">
    <div class="glitch">SYSTEM: SENTRY_ACTIVE_NODE_V3</div>
    <div id="status">GEOSPATIAL LINK: SECURE</div>
    <div id="coords">LAT: --.------ | LON: --.------</div>
</div>

<div id="map-buffer"></div>

<script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- 1. GEOSPATIAL ENGINE ---
    const map = new maplibregl.Map({
        container: 'map-buffer',
        style: 'https://demotiles.maplibre.org/style.json', // Vector style for sharp floor
        center: [-81.6881, 26.2750], 
        zoom: 17.5,
        interactive: false,
        preserveDrawingBuffer: true 
    });

    // --- 2. THREE.JS TACTICAL SCENE ---
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x020406, 0.015);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(30, 40, 50);

    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.maxPolarAngle = Math.PI / 2.1; 

    // Lighting
    const ambLight = new THREE.AmbientLight(0x404040, 1); 
    scene.add(ambLight);
    const spotLight = new THREE.SpotLight(0x00ffcc, 2);
    spotLight.position.set(20, 50, 20);
    scene.add(spotLight);

    // --- 3. DYNAMIC WORLD FLOOR ---
    const mapTex = new THREE.CanvasTexture(map.getCanvas());
    mapTex.anisotropy = renderer.capabilities.getMaxAnisotropy();
    
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(200, 200),
        new THREE.MeshBasicMaterial({ map: mapTex })
    );
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // Grid Overlay for "Digital" feel
    const grid = new THREE.GridHelper(200, 40, 0x00ffcc, 0x002222);
    grid.position.y = 0.05;
    scene.add(grid);

    // --- 4. ADVANCED SENTRY & RADAR ---
    const sentryNode = new THREE.Group();
    scene.add(sentryNode);

    // Solid Triangle (Pyramid) with MeshPhong for better highlights
    const pyramid = new THREE.Mesh(
        new THREE.CylinderGeometry(0, 2, 4, 4),
        new THREE.MeshPhongMaterial({ 
            color: 0x00ffcc, 
            flatShading: true, 
            shininess: 100, 
            emissive: 0x003322 
        })
    );
    pyramid.rotation.x = Math.PI; 
    sentryNode.add(pyramid);

    // Dual Pulse Radar System
    const createRing = (radius) => {
        const ring = new THREE.Mesh(
            new THREE.RingGeometry(radius, radius + 0.5, 64),
            new THREE.MeshBasicMaterial({ color: 0x00ffcc, transparent: true, side: THREE.DoubleSide })
        );
        ring.rotation.x = -Math.PI / 2;
        ring.position.y = 0.2;
        return ring;
    };

    const ringA = createRing(3);
    const ringB = createRing(3);
    sentryNode.add(ringA, ringB);

    // --- 5. GPS DATA SYNC ---
    if ("geolocation" in navigator) {
        navigator.geolocation.watchPosition(pos => {
            const { latitude, longitude } = pos.coords;
            document.getElementById('coords').innerText = `LAT: ${latitude.toFixed(6)} | LON: ${longitude.toFixed(6)}`;
            map.setCenter([longitude, latitude]);
        }, null, { enableHighAccuracy: true });
    }

    // --- 6. RENDER LOOP (Advanced Animation) ---
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);
        const elapsed = clock.getElapsedTime();

        // Sync floor map
        if (map.loaded()) mapTex.needsUpdate = true;

        // Sentry: Bobbing and Floating
        sentryNode.position.y = 5 + Math.sin(elapsed * 2) * 1.5;
        sentryNode.rotation.y += 0.01;

        // Radar Pulse A: Growing Big to Small
        const pulseA = (Math.sin(elapsed * 3) + 1) / 2; // 0 to 1
        const scaleA = 0.5 + (pulseA * 4);
        ringA.scale.set(scaleA, scaleA, 1);
        ringA.material.opacity = 1 - (pulseA);

        // Radar Pulse B: Offset pulse for complex feel
        const pulseB = (Math.sin(elapsed * 3 + Math.PI) + 1) / 2;
        const scaleB = 0.5 + (pulseB * 4);
        ringB.scale.set(scaleB, scaleB, 1);
        ringB.material.opacity = 1 - (pulseB);

        controls.update();
        renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
