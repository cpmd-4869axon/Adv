<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D GPS Map Space</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #map-render { width: 1024px; height: 1024px; position: absolute; visibility: hidden; }
        #canvas-container { width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; font-family: sans-serif; background: rgba(0,0,0,0.5); padding: 10px; pointer-events: none; }
    </style>
</head>
<body>

    <div id="ui">Awaiting GPS...</div>
    <div id="map-render"></div> <div id="canvas-container"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. SETUP LEAFLET (The "Ground Texture") ---
        const mapRender = L.map('map-render', {
            zoomControl: false,
            attributionControl: false
        }).setView([0, 0], 18);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapRender);

        // --- 2. SETUP THREE.JS ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Create the Floor (The Map)
        const mapCanvas = document.querySelector('#map-render .leaflet-panes');
        const mapTexture = new THREE.CanvasTexture(document.createElement('canvas')); // Placeholder
        
        const geometry = new THREE.PlaneGeometry(50, 50);
        const material = new THREE.MeshBasicMaterial({ side: THREE.DoubleSide });
        const floor = new THREE.Mesh(geometry, material);
        floor.rotation.x = -Math.PI / 2; // Lay flat
        scene.add(floor);

        // GPS Marker (A simple red sphere)
        const markerGeo = new THREE.SphereGeometry(0.5, 32, 32);
        const markerMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        const gpsMarker = new THREE.Mesh(markerGeo, markerMat);
        gpsMarker.position.y = 1; // Float slightly above map
        scene.add(gpsMarker);

        camera.position.set(0, 20, 30);
        camera.lookAt(0, 0, 0);

        // --- 3. GPS & TEXTURE SYNC ---
        function updateMapTexture() {
            // Use html2canvas or similar for perfect capture, 
            // but for a lightweight 1-file version, we use the Leaflet tile container
            const mapElement = document.getElementById('map-render');
            // Leaflet is DOM-based, so we must wait for tiles to load then "paint" them
            // In a production app, MapBox GL (Canvas-based) is easier to port to Three.js
            // Here, we sync the Leaflet view and refresh the texture.
            mapTexture.needsUpdate = true;
        }

        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition(pos => {
                const { latitude, longitude } = pos.coords;
                document.getElementById('ui').innerHTML = `Lat: ${latitude.toFixed(5)}, Lon: ${longitude.toFixed(5)}`;
                
                // Update Leaflet
                mapRender.setView([latitude, longitude], 18);
                
                // In this simplified version, the marker stays centered 
                // while the map texture moves beneath it.
            }, err => {
                document.getElementById('ui').innerHTML = "GPS Error: " + err.message;
            }, { enableHighAccuracy: true });
        }

        // --- 4. ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            
            // Texture Bridge: This is a hack to get Leaflet DOM into Three.js
            // For a robust 1-file demo, we update the floor color or a mock grid
            // to show movement if the texture sync is blocked by CORS.
            renderer.render(scene, camera);
        }

        animate();

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
