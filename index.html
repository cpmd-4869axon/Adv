<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentry Node | V28 Animated Lock</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; background: #010203; overflow: hidden; font-family: 'Courier New', monospace; color: #00ffcc; }
        #map-buffer { position: absolute; width: 1024px; height: 1024px; top: -9999px; visibility: hidden; }
        
        #hud { position: absolute; top: 20px; left: 20px; border: 1px solid #00ffcc; 
               background: rgba(0,10,10,0.92); padding: 15px; z-index: 100; width: 260px; box-shadow: 0 0 10px rgba(0,255,204,0.2); }

        #stream-hud {
            position: absolute; top: 20px; right: 20px; border: 1px solid #00ffcc;
            background: rgba(0,5,5,0.9); padding: 10px; z-index: 100; width: 180px; font-size: 11px;
        }
        .stream-val { color: #fff; font-weight: bold; float: right; }

        #node-popup { 
            position: absolute; display: none; background: rgba(0, 15, 15, 0.98); 
            border: 2px solid #00ffcc; padding: 15px; z-index: 200; 
            pointer-events: none; width: 240px; box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
            clip-path: polygon(0 0, 100% 0, 100% 85%, 85% 100%, 0 100%);
        }

        .section-label { font-size: 10px; color: #008888; margin-top: 12px; border-bottom: 1px solid #004444; padding-bottom: 2px; text-transform: uppercase; }
        .data-row { display: flex; justify-content: space-between; margin-top: 4px; font-size: 11px; }
        .data-label { color: #008888; }
        .data-val { color: #ffffff; font-weight: bold; }
        
        .control-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 10px; }
        button { background: #001a1a; color: #00ffcc; border: 1px solid #004444; padding: 8px; 
                         cursor: pointer; font-family: monospace; font-size: 11px; width: 100%; transition: 0.2s; }
        button:hover { background: #003333; border-color: #00ffcc; }
        button.active-btn { background: #00ffcc; color: #000; font-weight: bold; border-color: #00ffcc; }
        
        .btn-warn { border-color: #ff3333; color: #ff3333; }
        .btn-warn:hover { background: #330000; border-color: #ff6666; color: #ff6666; }
    </style>
</head>
<body>

<div id="hud">
    <div style="font-weight: bold; border-bottom: 1px solid #00ffcc; padding-bottom: 5px; font-size: 16px; letter-spacing: 2px;">SENTRY_OS_V28</div>
    <div id="coords" style="margin-top:10px; font-size: 10px; color: #008888;">SYS_LOC: ACTIVE</div>
    
    <div class="section-label">TELEMETRY_ENGINE</div>
    <div class="control-grid">
        <button id="btn-start" onclick="setTracking('START')">START</button>
        <button id="btn-pause" onclick="setTracking('PAUSE')">PAUSE</button>
        <button id="btn-stop" onclick="setTracking('STOP')" class="active-btn">STOP</button>
    </div>

    <div class="section-label">ARCHIVE_TOOLS</div>
    <button onclick="exportToCSV()" style="border-color:#ffcc00; color:#ffcc00; margin-top:10px;">EXPORT LOG</button>
    <input type="file" id="csv-import" accept=".csv" onchange="importCSV(event)" style="display:none">
    <button onclick="document.getElementById('csv-import').click()" style="margin-top:5px;">IMPORT DATA</button>

    <div class="section-label">SYSTEM_MAINTENANCE</div>
    <button onclick="clearImports()">CLEAR IMPORTS</button>
    <button class="btn-warn" onclick="systemReset()">SYSTEM RESET</button>
</div>

<div id="stream-hud">
    <div style="border-bottom: 1px solid #004444; margin-bottom: 8px; padding-bottom: 4px; font-weight: bold; color: #00ffcc;">SENTRY_METRICS</div>
    <div>Nodes_Logged: <span id="stream-nodes" class="stream-val">0</span></div>
    <div style="margin-top: 5px;">Active_Time: <span id="stream-time" class="stream-val">00:00</span></div>
</div>

<div id="node-popup">
    <div style="font-weight:bold; border-bottom:1px solid #00ffcc; margin-bottom:8px; font-size: 12px; color: #00ffcc;">NODE_TELEMETRY</div>
    <div class="data-row"><span class="data-label">SOURCE:</span> <span id="pop-src" class="data-val">--</span></div>
    <div class="data-row"><span class="data-label">TIMESTAMP:</span> <span id="pop-time" class="data-val">--</span></div>
    <div class="section-label">Spatial_Data</div>
    <div class="data-row"><span class="data-label">LATITUDE:</span> <span id="pop-lat" class="data-val">--</span></div>
    <div class="data-row"><span class="data-label">LONGITUDE:</span> <span id="pop-lon" class="data-val">--</span></div>
    <div class="section-label">Vector_Context</div>
    <div class="data-row"><span class="data-label">X_COORD:</span> <span id="pop-x" class="data-val">--</span></div>
    <div class="data-row"><span class="data-label">Z_COORD:</span> <span id="pop-z" class="data-val">--</span></div>
</div>

<div id="map-buffer"></div>

<script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let startCoords = null, trackingState = 'STOP', lastPosition = null;
    let trackingInterval = null, sessionStartTime = null;
    const raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2();
    let selectedNode = null, mapLoaded = false;
    window.sessionData = []; 

    const map = new maplibregl.Map({
        container: 'map-buffer',
        style: 'https://tiles.openfreemap.org/styles/dark',
        center: [-81.6881, 26.2750], zoom: 18,
        interactive: false, preserveDrawingBuffer: true 
    });
    map.on('idle', () => { mapLoaded = true; });

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(50, 70, 90);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    const controls = new OrbitControls(camera, renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const mapTex = new THREE.CanvasTexture(map.getCanvas());
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(800, 800), new THREE.MeshBasicMaterial({ map: mapTex }));
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    const sentry = new THREE.Group();
    const pyr = new THREE.Mesh(new THREE.CylinderGeometry(0, 3, 6, 4), new THREE.MeshStandardMaterial({ color: 0x00ffcc, flatShading: true, emissive: 0x00ffcc, emissiveIntensity: 0.2 }));
    pyr.rotation.x = Math.PI; sentry.add(pyr);
    const ring = new THREE.Mesh(new THREE.RingGeometry(3.5, 4, 32), new THREE.MeshBasicMaterial({ color: 0x00ffcc, side: THREE.DoubleSide, transparent: true, opacity: 0.4 }));
    ring.rotation.x = -Math.PI / 2; sentry.add(ring);
    sentry.position.y = 12;
    scene.add(sentry);

    const breadcrumbs = new THREE.Group();
    scene.add(breadcrumbs);

    window.clearImports = () => {
        const toRemove = [];
        breadcrumbs.children.forEach(node => { if (node.userData.source === "CSV_IMPORT") toRemove.push(node); });
        toRemove.forEach(node => breadcrumbs.remove(node));
        document.getElementById('stream-nodes').innerText = breadcrumbs.children.length;
    };

    window.systemReset = () => {
        if (!confirm("RESTORE SYSTEM?")) return;
        while(breadcrumbs.children.length > 0) breadcrumbs.remove(breadcrumbs.children[0]);
        window.sessionData = [];
        sessionStartTime = Date.now();
        document.getElementById('stream-nodes').innerText = "0";
        document.getElementById('stream-time').innerText = "00:00";
        document.getElementById('node-popup').style.display = 'none';
        window.resetCameraView();
    };

    window.resetCameraView = () => {
        const startPos = camera.position.clone(), endPos = sentry.position.clone().add(new THREE.Vector3(30, 50, 70));
        const startTarget = controls.target.clone(), endTarget = sentry.position.clone();
        let startTime = null;
        function glide(time) {
            if (!startTime) startTime = time;
            let progress = (time - startTime) / 800;
            if (progress > 1) progress = 1;
            const ease = 1 - Math.pow(1 - progress, 4);
            camera.position.lerpVectors(startPos, endPos, ease);
            controls.target.lerpVectors(startTarget, endTarget, ease);
            if (progress < 1) requestAnimationFrame(glide);
        }
        requestAnimationFrame(glide);
    };

    window.exportToCSV = () => {
        if (window.sessionData.length === 0) return alert("NO DATA.");
        const csv = "t,lat,lon,src\n" + window.sessionData.map(d => `${d.t},${d.lat},${d.lon},${d.source}`).join("\n");
        const link = document.createElement("a");
        link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
        link.download = `SENTRY_LOG_${Date.now()}.csv`;
        link.click();
    };

    window.importCSV = (event) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const lines = e.target.result.split('\n').slice(1);
            lines.forEach(line => {
                const p = line.split(',');
                if (p.length >= 3) plot(parseFloat(p[1]), parseFloat(p[2]), { t: p[0], source: "CSV_IMPORT" }, 0x00ccff);
            });
        };
        reader.readAsText(event.target.files[0]);
    };

    window.setTracking = (state) => {
        trackingState = state;
        document.querySelectorAll('.control-grid button').forEach(b => b.classList.remove('active-btn'));
        document.getElementById(`btn-${state.toLowerCase()}`).classList.add('active-btn');
        if (state === 'START' && !trackingInterval) {
            sessionStartTime = Date.now();
            trackingInterval = setInterval(() => {
                if (trackingState === 'START' && lastPosition) {
                    const data = { t: new Date().toLocaleTimeString(), lat: lastPosition.lat, lon: lastPosition.lon, source: "LIVE_STREAM" };
                    window.sessionData.push(data);
                    plot(data.lat, data.lon, data, 0xff0055);
                }
            }, 1000);
        }
    };

    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
            const { latitude: lat, longitude: lon } = pos.coords;
            lastPosition = { lat, lon };
            document.getElementById('coords').innerText = `SYS_LOC: ${lat.toFixed(5)}, ${lon.toFixed(5)}`;
            map.setCenter([lon, lat]);
        }, null, { enableHighAccuracy: true });
    }

    function plot(lat, lon, data, color) {
        if (!startCoords) startCoords = { lat, lon };
        const dy = (lat - startCoords.lat) * 111111;
        const dx = (lon - startCoords.lon) * 111111 * Math.cos(lat * Math.PI / 180);
        const node = new THREE.Mesh(new THREE.SphereGeometry(1.5, 16, 16), new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.4 }));
        node.position.set(dx, 1.5, -dy);
        
        // METADATA & ANIMATION DATA
        node.userData = { 
            t: data.t, lat: lat.toFixed(7), lon: lon.toFixed(7), 
            x: dx.toFixed(2), z: (-dy).toFixed(2), 
            source: data.source, baseColor: color, 
            targetScale: 1.0  // Default state
        };
        
        breadcrumbs.add(node);
        sentry.position.set(dx, sentry.position.y, -dy);
        document.getElementById('stream-nodes').innerText = breadcrumbs.children.length;
    }

    window.addEventListener('mousedown', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        
        if (raycaster.intersectObject(pyr).length > 0) { window.resetCameraView(); return; }
        
        const hits = raycaster.intersectObjects(breadcrumbs.children);
        if (hits.length > 0) {
            // DE-SELECT OLD NODE
            if (selectedNode) { 
                selectedNode.userData.targetScale = 1.0; 
                selectedNode.material.color.set(selectedNode.userData.baseColor); 
            }
            
            // SELECT NEW NODE
            selectedNode = hits[0].object;
            selectedNode.userData.targetScale = 2.8; // ANIMATE BIGGER
            selectedNode.material.color.set(0x00ffff); // LOCK COLOR

            const popup = document.getElementById('node-popup');
            popup.style.display = 'block';
            popup.style.left = Math.min(e.clientX + 20, window.innerWidth - 260) + "px";
            popup.style.top = Math.min(e.clientY + 20, window.innerHeight - 200) + "px";
            
            document.getElementById('pop-src').innerText = selectedNode.userData.source;
            document.getElementById('pop-time').innerText = selectedNode.userData.t;
            document.getElementById('pop-lat').innerText = selectedNode.userData.lat;
            document.getElementById('pop-lon').innerText = selectedNode.userData.lon;
            document.getElementById('pop-x').innerText = selectedNode.userData.x + "m";
            document.getElementById('pop-z').innerText = selectedNode.userData.z + "m";
        } else if (selectedNode) {
            // RETURN TO NORMAL STATE
            selectedNode.userData.targetScale = 1.0;
            selectedNode.material.color.set(selectedNode.userData.baseColor);
            selectedNode = null;
            document.getElementById('node-popup').style.display = 'none';
        }
    });

    function animate() {
        requestAnimationFrame(animate);
        if (mapLoaded) mapTex.needsUpdate = true;
        sentry.position.y = 11 + Math.sin(Date.now() * 0.002) * 2;
        sentry.rotation.y += 0.03;
        
        // ANIMATION LOOP FOR NODES
        breadcrumbs.children.forEach(n => {
            const ts = n.userData.targetScale;
            // Smoothly interpolate scale
            n.scale.lerp(new THREE.Vector3(ts, ts, ts), 0.15);
        });

        if (sessionStartTime && trackingState === 'START') {
            const diff = Math.floor((Date.now() - sessionStartTime) / 1000);
            document.getElementById('stream-time').innerText = `${Math.floor(diff/60).toString().padStart(2,'0')}:${(diff%60).toString().padStart(2,'0')}`;
        }
        controls.update();
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
