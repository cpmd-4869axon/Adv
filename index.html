<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentry Node | GPS Data Plotter</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; background: #020406; overflow: hidden; font-family: monospace; }
        #map-buffer { position: absolute; width: 1024px; height: 1024px; top: -9999px; visibility: hidden; }
        #hud { position: absolute; top: 20px; left: 20px; color: #00ffcc; border: 1px solid #00ffcc; 
               background: rgba(0,15,15,0.9); padding: 15px; z-index: 100; pointer-events: none; }
        .stat { font-size: 11px; color: #008888; margin-top: 4px; }
    </style>
</head>
<body>

<div id="hud">
    <div style="font-weight: bold; letter-spacing: 1px;">SENTRY_TRACKER_V4</div>
    <div id="coords">WAITING FOR GPS...</div>
    <div class="stat" id="nodes">NODES PLOTTED: 0</div>
</div>

<div id="map-buffer"></div>

<script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- 1. GEOSPATIAL ENGINE ---
    let startCoords = null;
    const map = new maplibregl.Map({
        container: 'map-buffer',
        style: 'https://demotiles.maplibre.org/style.json',
        center: [-81.6881, 26.2750], 
        zoom: 18,
        interactive: false,
        preserveDrawingBuffer: true 
    });

    // --- 2. THREE.JS SCENE ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020406);
    
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(20, 30, 40);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // Lighting for Solid Objects
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    const sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(10, 20, 10);
    scene.add(sun);

    // --- 3. THE SYNCED FLOOR ---
    const mapTex = new THREE.CanvasTexture(map.getCanvas());
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(200, 200),
        new THREE.MeshBasicMaterial({ map: mapTex })
    );
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // --- 4. THE SENTRY (TRIANGLE) ---
    const sentry = new THREE.Group();
    const pyramid = new THREE.Mesh(
        new THREE.CylinderGeometry(0, 1.5, 3, 4),
        new THREE.MeshStandardMaterial({ color: 0x00ffcc, flatShading: true })
    );
    pyramid.rotation.x = Math.PI; 
    sentry.add(pyramid);

    // Pulsing Ring (Scaling version)
    const ring = new THREE.Mesh(
        new THREE.RingGeometry(2, 2.3, 64),
        new THREE.MeshBasicMaterial({ color: 0x00ffcc, transparent: true, side: THREE.DoubleSide })
    );
    ring.rotation.x = -Math.PI / 2;
    sentry.add(ring);
    scene.add(sentry);

    // --- 5. DATA COLLECTION: BREADCRUMBS ---
    const breadcrumbs = new THREE.Group();
    scene.add(breadcrumbs);

    const sphereGeo = new THREE.SphereGeometry(0.4, 16, 16);
    const sphereMat = new THREE.MeshStandardMaterial({ color: 0xff0055, emissive: 0x330000 });

    function dropBreadcrumb(lat, lon) {
        if (!startCoords) {
            startCoords = { lat, lon };
            return;
        }

        // Calculate relative position (approximate meters)
        // 1 degree lat is ~111,111 meters. 1 degree lon is ~111,111 * cos(lat).
        const dy = (lat - startCoords.lat) * 111111;
        const dx = (lon - startCoords.lon) * 111111 * Math.cos(lat * Math.PI / 180);

        const node = new THREE.Mesh(sphereGeo, sphereMat);
        // Note: dy is mapped to -Z in Three.js coordinates
        node.position.set(dx, 0.5, -dy); 
        breadcrumbs.add(node);
        
        document.getElementById('nodes').innerText = `NODES PLOTTED: ${breadcrumbs.children.length}`;
    }

    // --- 6. GPS WATCH ---
    if ("geolocation" in navigator) {
        navigator.geolocation.watchPosition(pos => {
            const { latitude, longitude } = pos.coords;
            document.getElementById('coords').innerText = `LAT: ${latitude.toFixed(6)} LON: ${longitude.toFixed(6)}`;
            
            map.setCenter([longitude, latitude]);
            dropBreadcrumb(latitude, longitude);

        }, null, { enableHighAccuracy: true });
    }

    // --- 7. ANIMATION ---
    function animate() {
        requestAnimationFrame(animate);
        const time = Date.now() * 0.001;

        if (map.loaded()) mapTex.needsUpdate = true;

        // Bob & Spin
        sentry.position.y = 2 + Math.sin(time * 3) * 0.5;
        sentry.rotation.y += 0.01;

        // Scaling Pulse Ring
        const pulse = (Math.sin(time * 5) + 1) / 2;
        const s = 0.5 + (pulse * 1.5);
        ring.scale.set(s, s, 1);
        ring.material.opacity = 1 - pulse;

        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
