<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentry OS | V81 Matrix Fix</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --neon: #00ffcc; --bg: #000808; }
        body { margin: 0; background: var(--bg); overflow: hidden; font-family: 'Courier New', monospace; }
        
        /* Hidden master canvas for the 3x3 projection */
        #buffer-container { position: absolute; top: -9999px; left: -9999px; }
        #master-canvas { width: 1536px; height: 1536px; }

        .panel { border: 1px solid var(--neon); backdrop-filter: blur(8px); background: rgba(0, 10, 10, 0.9); position: absolute; z-index: 100; padding: 15px; }
        #hud { top: 20px; left: 20px; width: 320px; border-top: 4px solid var(--neon); }
        .telemetry { font-size: 10px; color: var(--neon); margin-top: 10px; border-top: 1px solid #003333; padding-top: 5px; }
    </style>
</head>
<body>

<div id="hud" class="panel">
    <div style="font-weight: bold; letter-spacing: 2px; color:white;">AEGIS_MATRIX_V81</div>
    <div class="telemetry">
        RADAR.MODE: 3x3_PROJECTION<br>
        INTEL: STREET_LEVEL_LABELS_ACTIVE<br>
        STATUS: TEXTURE_SYNC_FIXED
    </div>
</div>

<div id="buffer-container">
    <div id="map-engine" style="width: 1536px; height: 1536px;"></div>
</div>

<script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- SCENE SETUP ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 1, 20000);
    camera.position.set(1500, 1500, 1500);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // --- LEAFLET TO CANVAS ENGINE ---
    // We use a single large Leaflet instance as the "Master Texture"
    const lMap = L.map('map-engine', { 
        zoomControl: false, 
        attributionControl: false,
        preferCanvas: true // CRITICAL: Forces Leaflet to use Canvas for rendering
    }).setView([26.2750, -81.6881], 18);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(lMap);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png').addTo(lMap);

    // Create the Three.js Floor Mesh
    const floorTex = new THREE.CanvasTexture(document.querySelector('#map-engine canvas') || document.createElement('canvas'));
    floorTex.anisotropy = renderer.capabilities.getMaxAnisotropy();

    const floorGeom = new THREE.PlaneGeometry(4000, 4000);
    const floorMat = new THREE.MeshBasicMaterial({ map: floorTex, transparent: true, opacity: 0.9 });
    const floor = new THREE.Mesh(floorGeom, floorMat);
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // Decorative 3x3 Grid Overlay
    const grid = new THREE.GridHelper(4000, 3, 0x00ffcc, 0x004444);
    grid.position.y = 1;
    scene.add(grid);

    // Sentry Core
    const sentry = new THREE.Mesh(
        new THREE.OctahedronGeometry(25, 0),
        new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: true })
    );
    sentry.position.y = 100;
    scene.add(sentry);

    // --- GPS SYNC ---
    function syncGPS(lat, lon) {
        lMap.setView([lat, lon], 18);
    }

    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
            syncGPS(pos.coords.latitude, pos.coords.longitude);
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        
        // Force Three.js to re-read the Leaflet Canvas every frame
        const leafletCanvas = document.querySelector('#map-engine canvas');
        if (leafletCanvas) {
            floorTex.image = leafletCanvas;
            floorTex.needsUpdate = true;
        }

        sentry.rotation.y += 0.01;
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
