<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentry OS | V55 Synapse</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        :root { --neon: #00ffcc; --warning: #ffcc00; --bg: #000808; --panel-bg: rgba(0, 12, 12, 0.9); }
        body { margin: 0; background: var(--bg); overflow: hidden; font-family: 'Courier New', monospace; color: var(--neon); }
        
        /* CRT Effect */
        body::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 1000; background-size: 100% 3px, 2px 100%; pointer-events: none;
        }

        #map-buffer { position: absolute; width: 1024px; height: 1024px; top: -9999px; visibility: hidden; }
        
        /* HUD UI */
        .panel { border: 1px solid var(--neon); backdrop-filter: blur(10px); box-shadow: 0 0 15px rgba(0,255,204,0.1); }
        #hud { position: absolute; top: 20px; left: 20px; padding: 20px; z-index: 100; width: 280px; border-left: 4px solid var(--neon); }
        
        /* Live Mini-Map */
        #mini-map { position: absolute; bottom: 20px; right: 20px; width: 220px; height: 220px; z-index: 100; border: 2px solid var(--neon); border-radius: 50%; overflow: hidden; }

        .control-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 15px; }
        button { background: #001a1a; color: var(--neon); border: 1px solid #005555; padding: 10px; cursor: pointer; font-family: inherit; font-size: 10px; transition: 0.2s; }
        button:hover { background: var(--neon); color: #000; }
        .active-btn { background: var(--neon) !important; color: #000 !important; }
        
        #compass { font-size: 28px; text-align: center; margin: 10px 0; color: var(--warning); text-shadow: 0 0 10px var(--warning); }
        .status-bar { font-size: 9px; margin-top: 10px; opacity: 0.8; line-height: 1.5; }
    </style>
</head>
<body>

<div id="hud" class="panel">
    <div style="font-weight: bold; font-size: 18px; letter-spacing: 3px;">SYNAPSE_OS_V55</div>
    <div id="coords" style="font-size: 10px; color: #00cccc;">UPLINK: ACTIVE</div>
    <div id="compass">N</div>
    
    <div class="control-grid">
        <button id="btn-start" onclick="setTracking('START')">SYNC</button>
        <button id="btn-pause" onclick="setTracking('PAUSE')">HOLD</button>
        <button id="btn-stop" onclick="setTracking('STOP')" class="active-btn">KILL</button>
    </div>

    <div class="status-bar">
        SIGNAL: [||||||||--] 82%<br>
        SENSORS: ONLINE<br>
        ALT: <span id="sys-alt">0.00m</span>
    </div>
</div>

<div id="mini-map"></div>
<div id="map-buffer"></div>

<script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let startCoords = null, trackingState = 'STOP', lastPosition = null;
    let trackingInterval = null, mapLoaded = false;
    const raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2();
    let isTweening = false;
    const targetCamPos = new THREE.Vector3();
    const targetLookAt = new THREE.Vector3();

    // --- DUAL MAP SYSTEM ---
    const map = new maplibregl.Map({
        container: 'map-buffer',
        style: 'https://tiles.openfreemap.org/styles/dark',
        center: [-81.6881, 26.2750], zoom: 18, interactive: false, preserveDrawingBuffer: true 
    });

    const miniMap = new maplibregl.Map({
        container: 'mini-map',
        style: 'https://tiles.openfreemap.org/styles/dark',
        center: [-81.6881, 26.2750], zoom: 15, interactive: false
    });

    map.on('idle', () => { mapLoaded = true; });

    // --- THREE.JS ENGINE ---
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000808, 0.0005);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 10000);
    camera.position.set(500, 500, 500);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // Tactical Lights
    scene.add(new THREE.AmbientLight(0x00ffff, 0.2));
    const scanLight = new THREE.PointLight(0x00ffcc, 2, 1000);
    scene.add(scanLight);

    const grid = new THREE.GridHelper(5000, 60, 0x002222, 0x000505);
    scene.add(grid);

    const mapTex = new THREE.CanvasTexture(map.getCanvas());
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(4000, 4000), 
        new THREE.MeshStandardMaterial({ map: mapTex })
    );
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // Sentry Unit
    const sentry = new THREE.Group();
    const geom = new THREE.OctahedronGeometry(15, 0);
    const mat = new THREE.MeshStandardMaterial({ color: 0x00ffcc, wireframe: true, emissive: 0x00ffcc, emissiveIntensity: 2 });
    const pyramid = new THREE.Mesh(new THREE.CylinderGeometry(0, 8, 20, 4), new THREE.MeshStandardMaterial({ color: 0x00ffcc, emissive: 0x00ffcc }));
    pyramid.rotation.x = Math.PI;
    sentry.add(new THREE.Mesh(geom, mat), pyramid);
    scene.add(sentry);

    const breadcrumbs = new THREE.Group();
    scene.add(breadcrumbs);

    function plot(lat, lon) {
        if (!startCoords) startCoords = { lat, lon };
        const z = -(lat - startCoords.lat) * 111111;
        const x = (lon - startCoords.lon) * 111111 * Math.cos(lat * Math.PI / 180);
        
        const node = new THREE.Mesh(new THREE.SphereGeometry(3, 8, 8), new THREE.MeshBasicMaterial({ color: 0xff0055 }));
        node.position.set(x, 2, z);
        breadcrumbs.add(node);
        sentry.position.set(x, 30, z);
        scanLight.position.set(x, 100, z);
        
        // Update MiniMap
        miniMap.setCenter([lon, lat]);
    }

    // --- CLICK TO ZOOM 45 DEGREE ---
    window.addEventListener('mousedown', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObject(pyramid);
        if (hits.length > 0) {
            targetLookAt.set(sentry.position.x, 0, sentry.position.z);
            targetCamPos.set(sentry.position.x + 400, 400, sentry.position.z + 400); // 45 Degree Lock
            isTweening = true;
        }
    });

    window.setTracking = (state) => {
        trackingState = state;
        document.querySelectorAll('button').forEach(b => b.classList.remove('active-btn'));
        document.getElementById(`btn-${state.toLowerCase()}`).classList.add('active-btn');
        if (state === 'START' && !trackingInterval) {
            trackingInterval = setInterval(() => {
                if (trackingState === 'START' && lastPosition) plot(lastPosition.lat, lastPosition.lon);
            }, 1000);
        }
    };

    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
            lastPosition = { lat: pos.coords.latitude, lon: pos.coords.longitude };
            document.getElementById('coords').innerText = `FIX: ${lastPosition.lat.toFixed(5)}, ${lastPosition.lon.toFixed(5)}`;
            map.setCenter([lastPosition.lon, lastPosition.lat]);
        }, null, { enableHighAccuracy: true });
    }

    function animate() {
        requestAnimationFrame(animate);
        if (mapLoaded) mapTex.needsUpdate = true;
        
        sentry.rotation.y += 0.02;
        sentry.position.y = 35 + Math.sin(Date.now() * 0.002) * 10;
        document.getElementById('sys-alt').innerText = sentry.position.y.toFixed(2) + "m";

        if (isTweening) {
            camera.position.lerp(targetCamPos, 0.05);
            controls.target.lerp(targetLookAt, 0.05);
            if (camera.position.distanceTo(targetCamPos) < 1) isTweening = false;
        }
        
        const dir = new THREE.Vector3();
        camera.getWorldDirection(dir);
        const angle = Math.atan2(dir.x, dir.z) * (180 / Math.PI);
        const sectors = ["N", "NE", "E", "SE", "S", "SW", "W", "NW"];
        document.getElementById('compass').innerText = sectors[Math.round(((angle + 180) % 360) / 45) % 8];

        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
