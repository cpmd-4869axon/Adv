<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Geospatial Sentry</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; background: #050505; font-family: monospace; overflow: hidden; }
        #map-source { position: absolute; width: 1024px; height: 1024px; visibility: hidden; }
        #hud { position: absolute; top: 20px; left: 20px; color: #00ffcc; background: rgba(0,20,20,0.8); 
               padding: 15px; border: 1px solid #00ffcc; pointer-events: none; z-index: 100; text-transform: uppercase; }
        .label { font-size: 10px; opacity: 0.8; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="hud">
    <div class="label">System: Active Sentry Node</div>
    <div id="status">GPS: SEARCHING...</div>
    <div id="stats" style="margin-top:10px; font-size: 11px;">Zoom/Pan/Tilt Enabled</div>
</div>

<div id="map-source"></div>

<script type="importmap">
    { 
        "imports": { 
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        } 
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- 1. THE MAP DATA SOURCE ---
    const map = new maplibregl.Map({
        container: 'map-source',
        style: 'https://demotiles.maplibre.org/style.json', // Vector tiles for clarity
        center: [-81.6881, 26.2750], // Initial fallback coords
        zoom: 17,
        interactive: false,
        preserveDrawingBuffer: true 
    });

    // --- 2. THREE.JS ENGINE ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);
    scene.fog = new THREE.Fog(0x050505, 20, 150);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(25, 25, 25);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // ADD CONTROLS (The core of Pan/Tilt/Zoom)
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.maxPolarAngle = Math.PI / 2.1; // Prevent going under the floor

    // --- 3. 3D OBJECTS ---
    const mapCanvas = map.getCanvas();
    const mapTexture = new THREE.CanvasTexture(mapCanvas);
    
    // The "World" Floor
    const floorGeo = new THREE.PlaneGeometry(100, 100);
    const floorMat = new THREE.MeshBasicMaterial({ map: mapTexture, side: THREE.DoubleSide });
    const worldFloor = new THREE.Mesh(floorGeo, floorMat);
    worldFloor.rotation.x = -Math.PI / 2;
    scene.add(worldFloor);

    // The Sentry Marker (Grouped for animation)
    const markerGroup = new THREE.Group();
    const core = new THREE.Mesh(
        new THREE.CylinderGeometry(0, 0.5, 2, 4), 
        new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: true })
    );
    markerGroup.add(core);
    scene.add(markerGroup);

    // --- 4. DATA COLLECTION & LOGIC ---
    let trailPoints = [];
    const trailGeom = new THREE.BufferGeometry();
    const trailMat = new THREE.LineBasicMaterial({ color: 0x00ffcc });
    const trailLine = new THREE.Line(trailGeom, trailMat);
    scene.add(trailLine);

    if ("geolocation" in navigator) {
        navigator.geolocation.watchPosition(pos => {
            const { latitude, longitude } = pos.coords;
            document.getElementById('status').innerText = `LAT: ${latitude.toFixed(5)} LON: ${longitude.toFixed(5)}`;
            
            // Update Map Source
            map.setCenter([longitude, latitude]);

            // Add to Trail (Data Collection)
            // In a real app, you would convert Lng/Lat to X/Z grid offsets
            // Here, we center the map on the user, so the user stays at 0,0,0
        }, null, { enableHighAccuracy: true });
    }

    // --- 5. RENDER LOOP ---
    function animate() {
        requestAnimationFrame(animate);
        
        // Dynamic Texture Refresh
        mapTexture.needsUpdate = true;
        
        // Marker Animation
        markerGroup.rotation.y += 0.02;
        markerGroup.position.y = 1 + Math.sin(Date.now() * 0.003) * 0.5;

        controls.update();
        renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
