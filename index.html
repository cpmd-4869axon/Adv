<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentry OS | V80 Tactical Matrix</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --neon: #00ffcc; --bg: #000808; }
        body { margin: 0; background: var(--bg); overflow: hidden; font-family: 'Courier New', monospace; }
        
        /* Hidden Buffer for Leaflet Capture */
        #map-capture { position: absolute; width: 1024px; height: 1024px; top: -9999px; }
        
        .panel { position: absolute; top: 20px; left: 20px; padding: 15px; z-index: 100; 
                 border: 1px solid var(--neon); background: rgba(0, 10, 10, 0.9); width: 300px; }
        #compass { font-size: 32px; color: #ffcc00; text-align: center; margin-bottom: 10px; }
        .telemetry { font-size: 10px; color: var(--neon); line-height: 1.4; border-top: 1px solid #004444; padding-top: 10px; }
    </style>
</head>
<body>

<div id="hud" class="panel">
    <div style="font-weight: bold; letter-spacing: 2px; color: white;">AEGIS_MATRIX_V80</div>
    <div id="compass">N</div>
    <div class="telemetry">
        RADAR_MODE: 4x4_TILED_GRID<br>
        INTEL: STREET_LEVEL_LABELS_ACTIVE<br>
        STATUS: <span style="color:white;">STREAMING_MAP_DATA</span>
    </div>
</div>

<div id="map-capture"></div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    // 1. Leaflet Intel Setup
    const lContainer = document.getElementById('map-capture');
    const lMap = L.map(lContainer, { zoomControl: false, attributionControl: false, fadeAnimation: false });
    lMap.setView([26.2750, -81.6881], 19);

    // Using CartoDB Dark Matter with explicit labels
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(lMap);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png').addTo(lMap);

    // 2. Three.js Scene Setup
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 1, 10000);
    camera.position.set(1200, 1200, 1200);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // 3. Create the 4x4 Matrix Floor
    const matrixGroup = new THREE.Group();
    const mapTex = new THREE.CanvasTexture(lContainer); 
    mapTex.anisotropy = renderer.capabilities.getMaxAnisotropy();

    const tileSize = 600; // Size of each of the 16 tiles
    for (let i = 0; i < 4; i++) {
        for (let j = 0; j < 4; j++) {
            const tileGeom = new THREE.PlaneGeometry(tileSize - 5, tileSize - 5);
            const tileMat = new THREE.MeshBasicMaterial({ 
                map: mapTex, 
                transparent: true, 
                opacity: 0.8,
                side: THREE.DoubleSide 
            });
            const tile = new THREE.Mesh(tileGeom, tileMat);
            
            tile.position.set((i - 1.5) * tileSize, 0, (j - 1.5) * tileSize);
            tile.rotation.x = -Math.PI / 2;
            matrixGroup.add(tile);
        }
    }
    scene.add(matrixGroup);

    // 4. Background World Grid
    const worldGrid = new THREE.GridHelper(10000, 50, 0x003333, 0x001111);
    worldGrid.position.y = -5;
    scene.add(worldGrid);

    // 5. Sentry Core
    const sentry = new THREE.Mesh(
        new THREE.OctahedronGeometry(25), 
        new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: true })
    );
    sentry.position.y = 100;
    scene.add(sentry);

    // Animation Loop
    function animate() {
        requestAnimationFrame(animate);
        
        // Ensure Leaflet updates are captured by Three.js
        if (lMap) {
            mapTex.needsUpdate = true;
        }

        sentry.rotation.y += 0.01;
        sentry.position.y = 100 + Math.sin(Date.now() * 0.002) * 20;

        // Camera orbits the center
        const time = Date.now() * 0.0005;
        camera.position.x = Math.cos(time) * 1500;
        camera.position.z = Math.sin(time) * 1500;
        camera.lookAt(0, 0, 0);

        renderer.render(scene, camera);
    }
    animate();

    // Handle Resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

</script>
</body>
</html>
