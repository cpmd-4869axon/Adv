<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentry OS | V60 Horizon</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        :root { --neon: #00ffcc; --warning: #ffcc00; --alert: #ff0055; --bg: #000a0a; }
        body { margin: 0; background: var(--bg); overflow: hidden; font-family: 'Courier New', monospace; color: var(--neon); }
        
        /* Tactical CRT Overlay */
        body::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04));
            z-index: 1000; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        #map-buffer { position: absolute; width: 1024px; height: 1024px; top: -9999px; visibility: hidden; }
        
        .panel { border: 1px solid var(--neon); backdrop-filter: blur(12px); background: rgba(0, 15, 15, 0.85); box-shadow: inset 0 0 10px rgba(0,255,204,0.2); }
        #hud { position: absolute; top: 25px; left: 25px; padding: 20px; z-index: 100; width: 300px; border-radius: 0 15px 0 15px; }
        
        #mini-map { position: absolute; bottom: 30px; right: 30px; width: 240px; height: 240px; z-index: 100; border: 2px solid var(--neon); border-radius: 4px; clip-path: polygon(0 0, 100% 0, 100% 85%, 85% 100%, 0 100%); }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; }
        button { background: #001f1f; color: var(--neon); border: 1px solid #005555; padding: 12px; cursor: pointer; font-family: inherit; font-size: 10px; font-weight: bold; transition: 0.3s; }
        button:hover { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }
        .active-btn { background: var(--neon) !important; color: #000 !important; }
        
        #compass { font-size: 36px; text-align: center; margin: 15px 0; color: var(--warning); font-weight: 900; }
        .telemetry { font-size: 9px; line-height: 1.6; border-top: 1px solid #004444; padding-top: 10px; margin-top: 15px; }
    </style>
</head>
<body>

<div id="hud" class="panel">
    <div style="font-weight: bold; font-size: 20px; letter-spacing: 5px; border-bottom: 2px solid var(--neon); padding-bottom: 5px;">NEURAL_HORIZON_V60</div>
    <div id="sys-loc" style="font-size: 9px; margin-top: 8px; color: #00aaaa;">SCANNING_FOR_UPLINK...</div>
    
    <div id="compass">N</div>
    
    <div class="btn-grid">
        <button id="btn-start" onclick="setTracking('START')">ENGAGE</button>
        <button id="btn-pause" onclick="setTracking('PAUSE')">HOLD</button>
        <button id="btn-stop" onclick="setTracking('STOP')" class="active-btn">HALT</button>
    </div>

    <div class="telemetry">
        NODES_LOGGED: <span id="node-count" style="color:white;">0</span><br>
        SAT_LINK: <span style="color:var(--neon);">OPTIMAL</span><br>
        PITCH: <span id="cam-pitch" style="color:white;">45.00°</span>
    </div>
</div>

<div id="mini-map"></div>
<div id="map-buffer"></div>

<script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let startCoords = null, trackingState = 'STOP', lastPosition = null;
    let trackingInterval = null, mapLoaded = false;
    const raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2();
    let isTweening = false, nodeTotal = 0;
    
    const targetCamPos = new THREE.Vector3();
    const targetLookAt = new THREE.Vector3();

    // Setup Dual-Layer Maps
    const map = new maplibregl.Map({
        container: 'map-buffer',
        style: 'https://tiles.openfreemap.org/styles/dark',
        center: [-81.6881, 26.2750], zoom: 19, interactive: false, preserveDrawingBuffer: true 
    });
    const miniMap = new maplibregl.Map({
        container: 'mini-map',
        style: 'https://tiles.openfreemap.org/styles/dark',
        center: [-81.6881, 26.2750], zoom: 16, interactive: false
    });
    map.on('idle', () => { mapLoaded = true; });

    // Three.js Scene Setup
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000a0a, 0.0004);
    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 1, 20000);
    camera.position.set(600, 600, 600);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    scene.add(new THREE.AmbientLight(0x00ffff, 0.3));
    const spot = new THREE.SpotLight(0x00ffcc, 100000, 2000, 0.5, 1);
    spot.position.set(0, 1000, 0);
    scene.add(spot);
    
    const grid = new THREE.GridHelper(8000, 100, 0x003333, 0x001111);
    scene.add(grid);

    const mapTex = new THREE.CanvasTexture(map.getCanvas());
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(5000, 5000), 
        new THREE.MeshStandardMaterial({ map: mapTex, roughness: 1 })
    );
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // Advanced Sentry Unit
    const sentry = new THREE.Group();
    const frame = new THREE.Mesh(new THREE.IcosahedronGeometry(20, 1), new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: true, transparent: true, opacity: 0.3 }));
    const core = new THREE.Mesh(new THREE.OctahedronGeometry(10, 0), new THREE.MeshStandardMaterial({ color: 0x00ffcc, emissive: 0x00ffcc, emissiveIntensity: 5 }));
    sentry.add(frame, core);
    sentry.position.y = 40;
    scene.add(sentry);

    const breadcrumbs = new THREE.Group();
    scene.add(breadcrumbs);

    function plot(lat, lon) {
        if (!startCoords) startCoords = { lat, lon };
        const z = -(lat - startCoords.lat) * 111111;
        const x = (lon - startCoords.lon) * 111111 * Math.cos(lat * Math.PI / 180);
        
        const node = new THREE.Mesh(new THREE.BoxGeometry(5, 5, 5), new THREE.MeshStandardMaterial({ color: 0xff0055, emissive: 0xff0055 }));
        node.position.set(x, 2, z);
        breadcrumbs.add(node);
        
        sentry.position.set(x, sentry.position.y, z);
        spot.target = sentry;
        spot.position.set(x, 1000, z);
        
        miniMap.setCenter([lon, lat]);
        nodeTotal++;
        document.getElementById('node-count').innerText = nodeTotal;
    }

    // 45-Degree Apex Lock logic
    window.addEventListener('mousedown', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        if (raycaster.intersectObject(core).length > 0) {
            targetLookAt.set(sentry.position.x, 0, sentry.position.z);
            targetCamPos.set(sentry.position.x + 500, 500, sentry.position.z + 500);
            isTweening = true;
        }
    });

    window.setTracking = (state) => {
        trackingState = state;
        document.querySelectorAll('button').forEach(b => b.classList.remove('active-btn'));
        document.getElementById(`btn-${state.toLowerCase()}`).classList.add('active-btn');
        if (state === 'START' && !trackingInterval) {
            trackingInterval = setInterval(() => {
                if (trackingState === 'START' && lastPosition) plot(lastPosition.lat, lastPosition.lon);
            }, 1000);
        }
    };

    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
            lastPosition = { lat: pos.coords.latitude, lon: pos.coords.longitude };
            document.getElementById('sys-loc').innerText = `SAT_FIX: ${lastPosition.lat.toFixed(6)}, ${lastPosition.lon.toFixed(6)}`;
            map.setCenter([lastPosition.lon, lastPosition.lat]);
        }, null, { enableHighAccuracy: true });
    }

    function animate() {
        requestAnimationFrame(animate);
        if (mapLoaded) mapTex.needsUpdate = true;
        
        sentry.rotation.y += 0.03;
        frame.rotation.x -= 0.01;
        sentry.position.y = 40 + Math.sin(Date.now() * 0.003) * 12;

        if (isTweening) {
            camera.position.lerp(targetCamPos, 0.06);
            controls.target.lerp(targetLookAt, 0.06);
            if (camera.position.distanceTo(targetCamPos) < 1) isTweening = false;
        }
        
        // Compass & Pitch Logic
        const dir = new THREE.Vector3();
        camera.getWorldDirection(dir);
        const angle = Math.atan2(dir.x, dir.z) * (180 / Math.PI);
        const sectors = ["N", "NE", "E", "SE", "S", "SW", "W", "NW"];
        document.getElementById('compass').innerText = sectors[Math.round(((angle + 180) % 360) / 45) % 8];
        document.getElementById('cam-pitch').innerText = (Math.asin(-dir.y) * (180 / Math.PI)).toFixed(2) + "°";

        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
