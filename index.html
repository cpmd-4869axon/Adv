<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentry Node | V35 Kinetic Core</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #00ffcc; }
        #map-buffer { position: absolute; width: 1024px; height: 1024px; top: -9999px; visibility: hidden; }
        #hud { position: absolute; top: 20px; left: 20px; border: 1px solid #00ffcc; background: rgba(0,15,15,0.95); padding: 15px; z-index: 100; width: 280px; border-radius: 0 15px 0 15px; }
        #stream-hud { position: absolute; top: 20px; right: 20px; border: 1px solid #00ffcc; background: rgba(0,10,10,0.85); padding: 12px; z-index: 100; width: 200px; font-size: 11px; }
        #node-terminal { 
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: none; 
            background: rgba(0, 5, 5, 0.98); border: 1px solid #00ffcc; padding: 20px; z-index: 200; 
            width: 450px; border-top: 4px solid #00ffcc;
        }
        .term-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .term-row { display: flex; justify-content: space-between; font-size: 12px; border-bottom: 1px solid #003333; padding-bottom: 4px; }
        .label { color: #008888; text-transform: uppercase; font-size: 10px; }
        .value { color: #fff; font-weight: bold; }
        .control-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-top: 12px; }
        button { background: #001a1a; color: #00ffcc; border: 1px solid #005555; padding: 10px; cursor: pointer; font-family: inherit; font-size: 10px; }
        .active-btn { background: #00ffcc; color: #000; font-weight: bold; box-shadow: 0 0 15px #00ffcc; }
        #compass { font-size: 24px; text-align: center; margin-top: 10px; color: #ffcc00; }
    </style>
</head>
<body>

<div id="hud">
    <div style="font-weight: bold; border-bottom: 2px solid #00ffcc; padding-bottom: 6px; font-size: 18px; letter-spacing: 2px;">SENTRY_OS_V35</div>
    <div id="coords" style="margin-top:10px; font-size: 11px; color: #00cccc;">LUMEN_STABILIZED...</div>
    <div id="compass">N</div>
    <div class="control-grid">
        <button id="btn-start" onclick="setTracking('START')">START</button>
        <button id="btn-pause" onclick="setTracking('PAUSE')">PAUSE</button>
        <button id="btn-stop" onclick="setTracking('STOP')" class="active-btn">STOP</button>
    </div>
    <button onclick="exportToCSV()" style="margin-top:10px; width:100%; color:#ffcc00; border:1px solid #ffcc00; background:none; padding:8px;">EXPORT LOG</button>
</div>

<div id="stream-hud">
    <div style="color:#00ffcc; border-bottom:1px solid #004444; margin-bottom:8px; font-weight:bold;">VECTOR_STREAM</div>
    <div class="term-row"><span class="label">Nodes</span> <span id="stream-nodes" class="value">0</span></div>
    <div class="term-row"><span class="label">Status</span> <span id="stream-status" class="value">IDLE</span></div>
</div>

<div id="node-terminal">
    <div style="font-size:14px; font-weight:bold; margin-bottom:15px; color:#00ffcc;">TELEMETRY_INTERROGATION</div>
    <div class="term-grid">
        <div>
            <div class="term-row"><span class="label">Lat</span> <span id="term-lat" class="value">--</span></div>
            <div class="term-row"><span class="label">Lon</span> <span id="term-lon" class="value">--</span></div>
        </div>
        <div>
            <div class="term-row"><span class="label">Time</span> <span id="term-time" class="value">--</span></div>
            <div class="term-row"><span class="label">Src</span> <span id="term-src" class="value">--</span></div>
        </div>
    </div>
</div>

<div id="map-buffer"></div>

<script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let startCoords = null, trackingState = 'STOP', lastPosition = null;
    let trackingInterval = null, mapLoaded = false;
    const raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2();
    let selectedNode = null;
    window.sessionData = [];

    const map = new maplibregl.Map({
        container: 'map-buffer',
        style: 'https://tiles.openfreemap.org/styles/dark',
        center: [-81.6881, 26.2750], zoom: 19, interactive: false, preserveDrawingBuffer: true 
    });
    map.on('idle', () => { mapLoaded = true; });

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 5000);
    camera.position.set(100, 120, 100);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // --- ENHANCED LIGHTING SYSTEM ---
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    
    // Global Overhead Tactical Light
    const sun = new THREE.DirectionalLight(0x00ffcc, 2.5);
    sun.position.set(50, 200, 50);
    scene.add(sun);

    // Dynamic Sentry Spotlight
    const spot = new THREE.SpotLight(0xffffff, 1500);
    spot.angle = Math.PI / 6;
    spot.penumbra = 0.3;
    spot.decay = 2;
    spot.distance = 400;
    scene.add(spot);
    
    const grid = new THREE.GridHelper(2000, 80, 0x003333, 0x001111);
    scene.add(grid);

    const mapTex = new THREE.CanvasTexture(map.getCanvas());
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ map: mapTex, roughness: 0.2 }));
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    const sentry = new THREE.Group();
    const pyr = new THREE.Mesh(
        new THREE.CylinderGeometry(0, 4.5, 9, 4), 
        new THREE.MeshStandardMaterial({ color: 0x00ffcc, emissive: 0x00ffcc, emissiveIntensity: 4 })
    );
    pyr.rotation.x = Math.PI;
    sentry.add(pyr);
    sentry.position.y = 15;
    scene.add(sentry);

    const breadcrumbs = new THREE.Group();
    scene.add(breadcrumbs);

    function plot(lat, lon, data, color) {
        if (!startCoords) startCoords = { lat, lon };
        const z = -(lat - startCoords.lat) * 111111;
        const x = (lon - startCoords.lon) * 111111 * Math.cos(lat * Math.PI / 180);
        
        const node = new THREE.Mesh(
            new THREE.SphereGeometry(2, 16, 16), 
            new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 1 })
        );
        node.position.set(x, 2, z);
        node.userData = { ...data, targetScale: 1.0 };
        breadcrumbs.add(node);
        
        // Update Sentry & Light Position
        sentry.position.set(x, sentry.position.y, z);
        spot.position.set(x, 150, z);
        spot.target = sentry;
        document.getElementById('stream-nodes').innerText = breadcrumbs.children.length;
    }

    // --- KINETIC TRIANGLE INTERACTION ---
    window.addEventListener('mousedown', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);

        const triHit = raycaster.intersectObject(pyr);
        if (triHit.length > 0) {
            // Reset Pan/Tilt and Zoom to Sentry
            controls.reset(); // Resets rotation/pan
            const zoomOffset = new THREE.Vector3(30, 40, 30);
            const targetPos = sentry.position.clone().add(zoomOffset);
            
            // Apply new target and position
            controls.target.copy(sentry.position);
            camera.position.copy(targetPos);
            return;
        }

        const hits = raycaster.intersectObjects(breadcrumbs.children);
        if (hits.length > 0) {
            if (selectedNode) { selectedNode.userData.targetScale = 1.0; selectedNode.material.wireframe = false; }
            selectedNode = hits[0].object;
            selectedNode.userData.targetScale = 4.0;
            selectedNode.material.wireframe = true;
            document.getElementById('node-terminal').style.display = 'block';
            document.getElementById('term-lat').innerText = selectedNode.userData.lat.toFixed(6);
            document.getElementById('term-lon').innerText = selectedNode.userData.lon.toFixed(6);
            document.getElementById('term-time').innerText = selectedNode.userData.t;
            document.getElementById('term-src').innerText = selectedNode.userData.source;
        } else {
            document.getElementById('node-terminal').style.display = 'none';
        }
    });

    window.setTracking = (state) => {
        trackingState = state;
        document.querySelectorAll('.control-grid button').forEach(b => b.classList.remove('active-btn'));
        document.getElementById(`btn-${state.toLowerCase()}`).classList.add('active-btn');
        document.getElementById('stream-status').innerText = state;
        if (state === 'START' && !trackingInterval) {
            trackingInterval = setInterval(() => {
                if (trackingState === 'START' && lastPosition) {
                    const data = { t: new Date().toLocaleTimeString(), lat: lastPosition.lat, lon: lastPosition.lon, source: "LIVE" };
                    window.sessionData.push(data);
                    plot(data.lat, data.lon, data, 0xff0055);
                }
            }, 1000);
        }
    };

    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
            lastPosition = { lat: pos.coords.latitude, lon: pos.coords.longitude };
            document.getElementById('coords').innerText = `LOC: ${lastPosition.lat.toFixed(6)}, ${lastPosition.lon.toFixed(6)}`;
            map.setCenter([lastPosition.lon, lastPosition.lat]);
        }, null, { enableHighAccuracy: true });
    }

    function animate() {
        requestAnimationFrame(animate);
        if (mapLoaded) mapTex.needsUpdate = true;
        sentry.rotation.y += 0.04;
        sentry.position.y = 15 + Math.sin(Date.now() * 0.003) * 2;
        
        // Compass
        const dir = new THREE.Vector3();
        camera.getWorldDirection(dir);
        const angle = Math.atan2(dir.x, dir.z) * (180 / Math.PI);
        const sectors = ["N", "NE", "E", "SE", "S", "SW", "W", "NW"];
        document.getElementById('compass').innerText = sectors[Math.round(((angle + 180) % 360) / 45) % 8];

        breadcrumbs.children.forEach(n => {
            n.scale.lerp(new THREE.Vector3(n.userData.targetScale, n.userData.targetScale, n.userData.targetScale), 0.1);
        });
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.exportToCSV = () => {
        const header = "timestamp,lat,lon,source\n";
        const rows = window.sessionData.map(d => `${d.t},${d.lat},${d.lon},${d.source}`).join("\n");
        const blob = new Blob([header + rows], { type: 'text/csv' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `SENTRY_V35_${Date.now()}.csv`;
        link.click();
    };
</script>
</body>
</html>
