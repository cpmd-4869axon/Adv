<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentry OS | V80 Tactical Grid</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        :root { --neon: #00ffcc; --warning: #ffcc00; --bg: #000808; }
        body { margin: 0; background: var(--bg); overflow: hidden; font-family: 'Courier New', monospace; color: var(--neon); }
        
        /* CRT Interlace */
        body::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            z-index: 1000; background-size: 100% 3px; pointer-events: none; opacity: 0.15;
        }

        #map-buffer { position: absolute; width: 1024px; height: 1024px; top: -9999px; visibility: hidden; }
        
        .panel { border: 1px solid var(--neon); backdrop-filter: blur(8px); background: rgba(0, 10, 10, 0.9); }
        #hud { position: absolute; top: 20px; left: 20px; padding: 15px; z-index: 100; width: 320px; border-top: 4px solid var(--neon); }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 15px; }
        button { background: #001515; color: var(--neon); border: 1px solid #004444; padding: 10px; cursor: pointer; font-size: 10px; font-weight: bold; }
        .active-btn { background: var(--neon) !important; color: #000 !important; }
        
        .telemetry { font-size: 9px; border-top: 1px solid #003333; padding-top: 10px; margin-top: 10px; line-height: 1.5; }
    </style>
</head>
<body>

<div id="hud" class="panel">
    <div style="font-weight: bold; font-size: 18px; letter-spacing: 3px;">AEGIS_GRID_V80</div>
    <div id="sys-loc" style="font-size: 9px; color: #00aaaa;">TACTICAL_GRID: 10x10_ACTIVE</div>
    
    <div class="btn-grid">
        <button id="btn-start" onclick="setTracking('START')">ENGAGE</button>
        <button id="btn-pause" onclick="setTracking('PAUSE')">HOLD</button>
        <button id="btn-stop" onclick="setTracking('STOP')" class="active-btn">HALT</button>
    </div>

    <div class="telemetry">
        INTEL: <span style="color:var(--neon);">STREET_BUILDING_LABELS_ENABLED</span><br>
        COORD: <span id="lat-val" style="color:white;">---</span> | <span id="lon-val" style="color:white;">---</span>
    </div>
</div>

<div id="map-buffer"></div>

<script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let startCoords = null, trackingState = 'STOP', lastPosition = null;
    let mapLoaded = false;
    
    // --- MAP ENGINE ---
    const map = new maplibregl.Map({
        container: 'map-buffer',
        style: 'https://tiles.openfreemap.org/styles/dark',
        center: [-81.6881, 26.2750], 
        zoom: 18.5, 
        interactive: false, 
        preserveDrawingBuffer: true 
    });
    map.on('idle', () => { mapLoaded = true; });

    // --- THREE.JS ENGINE ---
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000808, 0.0003);
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 1, 20000);
    camera.position.set(1200, 1000, 1200);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // Tactical Texture
    const mapTex = new THREE.CanvasTexture(map.getCanvas());
    mapTex.anisotropy = renderer.capabilities.getMaxAnisotropy();

    // 10x10 Grid System
    const gridGroup = new THREE.Group();
    const tileSize = 250; // Each tile is 250 units
    for (let i = 0; i < 10; i++) {
        for (let j = 0; j < 10; j++) {
            const tileGeom = new THREE.PlaneGeometry(tileSize - 2, tileSize - 2);
            const tileMat = new THREE.MeshBasicMaterial({ 
                map: mapTex, 
                transparent: true, 
                opacity: 0.85,
                side: THREE.DoubleSide
            });
            const tile = new THREE.Mesh(tileGeom, tileMat);
            tile.position.set((i - 4.5) * tileSize, 0, (j - 4.5) * tileSize);
            tile.rotation.x = -Math.PI / 2;
            gridGroup.add(tile);
        }
    }
    scene.add(gridGroup);

    // Grid Floor Lighting
    const light = new THREE.PointLight(0x00ffcc, 1500000, 4000);
    scene.add(light);

    // Sentry Core
    const sentry = new THREE.Mesh(
        new THREE.OctahedronGeometry(25, 0), 
        new THREE.MeshStandardMaterial({ color: 0x00ffcc, emissive: 0x00ffcc, emissiveIntensity: 2 })
    );
    sentry.position.y = 100;
    scene.add(sentry);

    function updatePlot(lat, lon) {
        if (!startCoords) startCoords = { lat, lon };
        const z = -(lat - startCoords.lat) * 111111;
        const x = (lon - startCoords.lon) * 111111 * Math.cos(lat * Math.PI / 180);
        
        sentry.position.set(x, sentry.position.y, z);
        gridGroup.position.set(x, 0, z); // Grid follows sentry
        light.position.set(x, 500, z);
        
        map.setCenter([lon, lat]);
        document.getElementById('lat-val').innerText = lat.toFixed(5);
        document.getElementById('lon-val').innerText = lon.toFixed(5);
    }

    window.setTracking = (state) => {
        trackingState = state;
        document.querySelectorAll('button').forEach(b => b.classList.remove('active-btn'));
        document.getElementById(`btn-${state.toLowerCase()}`).classList.add('active-btn');
    };

    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
            lastPosition = { lat: pos.coords.latitude, lon: pos.coords.longitude };
            if (trackingState === 'START') updatePlot(lastPosition.lat, lastPosition.lon);
        }, null, { enableHighAccuracy: true });
    }

    function animate() {
        requestAnimationFrame(animate);
        if (mapLoaded) mapTex.needsUpdate = true;
        sentry.rotation.y += 0.03;
        sentry.position.y = 100 + Math.sin(Date.now() * 0.003) * 15;
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
