<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentry OS | V48 Strategic Glide</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        :root { --neon: #00ffcc; --warning: #ffcc00; --bg: #000a0a; }
        body { margin: 0; background: var(--bg); overflow: hidden; font-family: 'Courier New', monospace; color: var(--neon); }
        #map-buffer { position: absolute; width: 1024px; height: 1024px; top: -9999px; visibility: hidden; }
        
        .panel { background: rgba(0, 15, 15, 0.9); border: 1px solid var(--neon); backdrop-filter: blur(8px); border-radius: 4px; }
        #hud { position: absolute; top: 20px; left: 20px; padding: 20px; z-index: 100; width: 280px; border-left: 5px solid var(--neon); }
        
        .control-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 15px; }
        button { background: #001f1f; color: var(--neon); border: 1px solid #005555; padding: 12px; cursor: pointer; font-family: inherit; font-size: 10px; transition: 0.2s; text-transform: uppercase; }
        button:hover { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }
        .active-btn { background: var(--neon) !important; color: #000 !important; font-weight: bold; }
        
        #compass { font-size: 24px; text-align: center; margin: 10px 0; color: var(--warning); font-weight: bold; text-shadow: 0 0 10px rgba(255,204,0,0.5); }
        .hint { font-size: 9px; color: #008888; text-align: center; margin-top: 10px; line-height: 1.4; }
    </style>
</head>
<body>

<div id="hud" class="panel">
    <div style="font-weight: bold; font-size: 18px; letter-spacing: 2px; border-bottom: 2px solid var(--neon); padding-bottom: 8px;">SENTINEL_V48</div>
    <div id="coords" style="margin-top:12px; font-size: 10px; color: #00cccc;">LENS: STRATEGIC_WIDE</div>
    <div id="compass">N</div>
    
    <div class="control-grid">
        <button id="btn-start" onclick="setTracking('START')">Engage</button>
        <button id="btn-pause" onclick="setTracking('PAUSE')">Hold</button>
        <button id="btn-stop" onclick="setTracking('STOP')" class="active-btn">Halt</button>
    </div>
    <div class="hint">TACTICAL RESET:<br>CLICK CENTER TRIANGLE</div>
</div>

<div id="map-buffer"></div>

<script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let startCoords = null, trackingState = 'STOP', lastPosition = null;
    let trackingInterval = null, mapLoaded = false;
    const raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2();
    
    // Zoom/Tween variables
    let isTweening = false;
    const targetCamPos = new THREE.Vector3();
    const targetLookAt = new THREE.Vector3();

    const map = new maplibregl.Map({
        container: 'map-buffer',
        style: 'https://tiles.openfreemap.org/styles/dark',
        center: [-81.6881, 26.2750], zoom: 19, interactive: false, preserveDrawingBuffer: true 
    });
    map.on('idle', () => { mapLoaded = true; });

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000505);
    scene.fog = new THREE.FogExp2(0x000505, 0.0008); 

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 10000);
    camera.position.set(300, 400, 300); 

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    const sun = new THREE.DirectionalLight(0x00ffff, 1.2);
    sun.position.set(100, 500, 100);
    scene.add(sun);
    
    const grid = new THREE.GridHelper(5000, 100, 0x003333, 0x001111);
    scene.add(grid);

    const mapTex = new THREE.CanvasTexture(map.getCanvas());
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(3000, 3000), 
        new THREE.MeshStandardMaterial({ map: mapTex, roughness: 0.9 })
    );
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    const sentry = new THREE.Group();
    const pyr = new THREE.Mesh(
        new THREE.CylinderGeometry(0, 6, 15, 4), 
        new THREE.MeshStandardMaterial({ color: 0x00ffcc, emissive: 0x00ffcc, emissiveIntensity: 5 })
    );
    pyr.rotation.x = Math.PI;
    sentry.add(pyr);
    sentry.position.y = 25;
    scene.add(sentry);

    const breadcrumbs = new THREE.Group();
    scene.add(breadcrumbs);

    function plot(lat, lon, data, color) {
        if (!startCoords) startCoords = { lat, lon };
        const z = -(lat - startCoords.lat) * 111111;
        const x = (lon - startCoords.lon) * 111111 * Math.cos(lat * Math.PI / 180);
        
        const node = new THREE.Mesh(
            new THREE.SphereGeometry(3, 16, 16), 
            new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 2 })
        );
        node.position.set(x, 3, z);
        breadcrumbs.add(node);
        sentry.position.set(x, sentry.position.y, z);
    }

    // --- FIX: KINETIC ZOOM & CENTER LOGIC ---
    window.addEventListener('mousedown', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);

        const triHit = raycaster.intersectObject(pyr);
        if (triHit.length > 0) {
            // Define Strategic Wide-Angle View
            targetLookAt.set(sentry.position.x, 0, sentry.position.z);
            targetCamPos.set(sentry.position.x + 350, 450, sentry.position.z + 350);
            isTweening = true;
            return;
        }
    });

    window.setTracking = (state) => {
        trackingState = state;
        document.querySelectorAll('button').forEach(b => b.classList.remove('active-btn'));
        document.getElementById(`btn-${state.toLowerCase()}`).classList.add('active-btn');
        if (state === 'START' && !trackingInterval) {
            trackingInterval = setInterval(() => {
                if (trackingState === 'START' && lastPosition) {
                    plot(lastPosition.lat, lastPosition.lon, {}, 0xff3300);
                }
            }, 1000);
        }
    };

    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
            lastPosition = { lat: pos.coords.latitude, lon: pos.coords.longitude };
            document.getElementById('coords').innerText = `SAT_FIX: ${lastPosition.lat.toFixed(5)}, ${lastPosition.lon.toFixed(5)}`;
            map.setCenter([lastPosition.lon, lastPosition.lat]);
        }, null, { enableHighAccuracy: true });
    }

    function animate() {
        requestAnimationFrame(animate);
        if (mapLoaded) mapTex.needsUpdate = true;
        
        sentry.rotation.y += 0.04;
        sentry.position.y = 25 + Math.sin(Date.now() * 0.003) * 6;

        // --- CAMERA GLIDE ENGINE ---
        if (isTweening) {
            camera.position.lerp(targetCamPos, 0.05);
            controls.target.lerp(targetLookAt, 0.05);
            
            // Snap to finish if close enough
            if (camera.position.distanceTo(targetCamPos) < 0.1) {
                isTweening = false;
            }
        }
        
        const dir = new THREE.Vector3();
        camera.getWorldDirection(dir);
        const angle = Math.atan2(dir.x, dir.z) * (180 / Math.PI);
        const sectors = ["N", "NE", "E", "SE", "S", "SW", "W", "NW"];
        document.getElementById('compass').innerText = sectors[Math.round(((angle + 180) % 360) / 45) % 8];

        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
